<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="marble" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
    <radialGradient id="shine" cx="30%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="track" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  
  <!-- Đường đua cong -->
  <path d="M8 48 Q32 20 56 48" stroke="url(#track)" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- Bóng bi -->
  <ellipse cx="32" cy="42" rx="12" ry="4" fill="#000" opacity="0.3"/>
  
  <!-- Quả bi chính -->
  <circle cx="32" cy="32" r="14" fill="url(#marble)" filter="url(#shadow)"/>
  
  <!-- Hiệu ứng sáng -->
  <circle cx="32" cy="32" r="14" fill="url(#shine)"/>
  
  <!-- Viền bi -->
  <circle cx="32" cy="32" r="14" fill="none" stroke="#1e40af" stroke-width="1.5"/>
  
  <!-- Ngôi sao trang trí -->
  <g transform="translate(32,32) rotate(45)">
    <polygon points="0,-6 1.5,-2 6,-2 2.5,1 4,6 0,3 -4,6 -2.5,1 -6,-2 -1.5,-2" fill="#fbbf24" opacity="0.8"/>
  </g>
  
  <!-- Chữ Đ -->
  <text x="32" y="38" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="10" font-weight="bold" fill="#fff" opacity="0.9">Đ</text>
</svg>
