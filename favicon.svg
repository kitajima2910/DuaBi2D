<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#1a1a2e"/>
  
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#e94560" stroke-width="7"/>
  
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="#e94560" stroke-width="2.5" opacity="0.5"/>
  
  <!-- Hub -->
  <circle cx="50" cy="50" r="8" fill="#e94560"/>
  
  <!-- Spokes -->
  <line x1="50" y1="16" x2="50" y2="34" stroke="#e94560" stroke-width="5" stroke-linecap="round"/>
  <line x1="50" y1="66" x2="50" y2="84" stroke="#e94560" stroke-width="5" stroke-linecap="round"/>
  <line x1="16" y1="50" x2="34" y2="50" stroke="#e94560" stroke-width="5" stroke-linecap="round"/>
  <line x1="66" y1="50" x2="84" y2="50" stroke="#e94560" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Diagonal spokes -->
  <line x1="27" y1="27" x2="38" y2="38" stroke="#e94560" stroke-width="4" stroke-linecap="round"/>
  <line x1="73" y1="27" x2="62" y2="38" stroke="#e94560" stroke-width="4" stroke-linecap="round"/>
  <line x1="27" y1="73" x2="38" y2="62" stroke="#e94560" stroke-width="4" stroke-linecap="round"/>
  <line x1="73" y1="73" x2="62" y2="62" stroke="#e94560" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Checkered accent at bottom -->
  <rect x="40" y="87" width="6" height="6" fill="#ffffff" opacity="0.4"/>
  <rect x="46" y="87" width="6" height="6" fill="#e94560" opacity="0.4"/>
  <rect x="52" y="87" width="6" height="6" fill="#ffffff" opacity="0.4"/>
  <rect x="58" y="87" width="6" height="6" fill="#e94560" opacity="0.4"/>
</svg>
