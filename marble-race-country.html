function _getTodayStr() {
    return new Date().toISOString().slice(0, 10);
}

function _getWeekStr() {
    const d = new Date();
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    const monday = new Date(d.setDate(diff));
    return monday.toISOString().slice(0, 10);
}

function careerGetDailyMissions() {
    careerRefreshDailyMissions();
    const p = careerGetProfile();
    return p.missions.daily || [];
}

function careerGetWeeklyMissions() {
    careerRefreshWeeklyMissions();
    const p = careerGetProfile();
    return p.missions.weekly || [];
}

function careerGenerateDailyMissions() {
    const pool = [...CAREER_DAILY_MISSION_POOL];
    const selected = [];
    for (let i = 0; i < 3 && pool.length > 0; i++) {
        const idx = Math.floor(Math.random() * pool.length);
        const mission = { ...pool[idx], progress: 0, completed: false, claimed: false };
        selected.push(mission);
        pool.splice(idx, 1);
    }
    return selected;
}

function careerGenerateWeeklyMissions() {
    const pool = [...CAREER_WEEKLY_MISSION_POOL];
    const selected = [];
    for (let i = 0; i < 3 && pool.length > 0; i++) {
        const idx = Math.floor(Math.random() * pool.length);
        const mission = { ...pool[idx], progress: 0, completed: false, claimed: false };
        selected.push(mission);
        pool.splice(idx, 1);
    }
    return selected;
}

function careerUpdateMissionProgress(missionId, amount) {
    const p = careerGetProfile();
    // Check daily
    for (const m of p.missions.daily || []) {
        if (m.id === missionId && !m.completed) {
            m.progress = Math.min(m.target, (m.progress || 0) + amount);
            if (m.progress >= m.target) m.completed = true;
        }
    }
    // Check weekly
    for (const m of p.missions.weekly || []) {
        if (m.id === missionId && !m.completed) {
            m.progress = Math.min(m.target, (m.progress || 0) + amount);
            if (m.progress >= m.target) m.completed = true;
        }
    }
    // Check progression
    for (const m of CAREER_PROGRESSION_MISSIONS) {
        if (m.id === missionId) {
            if (!p.missions.progression) p.missions.progression = {};
            const prog = p.missions.progression[m.id] || { progress: 0, completed: false, claimed: false };
            prog.progress = Math.min(m.target, (prog.progress || 0) + amount);
            if (prog.progress >= m.target) prog.completed = true;
            p.missions.progression[m.id] = prog;
        }
    }
    careerSaveProfile();
}

function careerClaimMissionReward(missionId, isDaily) {
    const p = careerGetProfile();
    let mission = null;
    if (isDaily) {
        mission = (p.missions.daily || []).find(m => m.id === missionId);
    } else {
        mission = (p.missions.weekly || []).find(m => m.id === missionId);
    }
    if (!mission || !mission.completed || mission.claimed) return false;
    const reward = mission.reward;
    careerAddXP(reward.xp || 0);
    careerAddCoins(reward.coins || 0);
    if (reward.stars) careerAddStars(reward.stars);
    mission.claimed = true;
    careerSaveProfile();
    return true;
}

function careerGetMissionProgress(missionId) {
    const p = careerGetProfile();
    for (const m of p.missions.daily || []) {
        if (m.id === missionId) return { current: m.progress || 0, target: m.target, completed: m.completed, claimed: m.claimed };
    }
    for (const m of p.missions.weekly || []) {
        if (m.id === missionId) return { current: m.progress || 0, target: m.target, completed: m.completed, claimed: m.claimed };
    }
    for (const m of CAREER_PROGRESSION_MISSIONS) {
        if (m.id === missionId) {
            const prog = (p.missions.progression || {})[m.id] || { progress: 0, completed: false, claimed: false };
            return { current: prog.progress, target: m.target, completed: prog.completed, claimed: prog.claimed };
        }
    }
    return { current: 0, target: 1, completed: false, claimed: false };
}

function careerRefreshDailyMissions() {
    const p = careerGetProfile();
    const today = _getTodayStr();
    if (p.missions.dailyDate !== today) {
        p.missions.daily = careerGenerateDailyMissions();
        p.missions.dailyDate = today;
        careerSaveProfile();
    }
}

function careerRefreshWeeklyMissions() {
    const p = careerGetProfile();
    const week = _getWeekStr();
    if (p.missions.weeklyWeek !== week) {
        p.missions.weekly = careerGenerateWeeklyMissions();
        p.missions.weeklyWeek = week;
        careerSaveProfile();
    }
}

function careerCheckAchievements() {
    const p = careerGetProfile();
    let newUnlock = false;
    for (const ach of CAREER_ACHIEVEMENTS) {
        const key = ach.id;
        if (!p.achievements[key] || !p.achievements[key].unlocked) {
            if (ach.check(p)) {
                p.achievements[key] = { unlocked: true, unlockedAt: Date.now() };
                newUnlock = true;
                // Give reward
                careerAddXP(100);
                careerAddCoins(50);
            }
        }
    }
    if (newUnlock) careerSaveProfile();
    return newUnlock;
}

function careerGetAchievementProgress(achievementId) {
    const p = careerGetProfile();
    const ach = CAREER_ACHIEVEMENTS.find(a => a.id === achievementId);
    if (!ach) return { unlocked: false, progress: 0, target: 1 };
    const data = p.achievements[achievementId];
    return { unlocked: !!(data && data.unlocked), progress: 0, target: 1 };
}

// ============================================================
// CAREER MODE — UI & INTEGRATION HELPERS
// ============================================================

function careerInit() {
    careerLoadProfile();
    careerRefreshDailyMissions();
    careerRefreshWeeklyMissions();
    careerUpdatePanel();
}

function careerUpdatePanel() {
    const p = careerGetProfile();
    const league = careerGetLeagueNum();
    const leagueDef = CAREER_LEAGUES[league - 1];
    const dashboard = document.getElementById('careerDashboard');
    if (gameMode.mode !== 'career') {
        dashboard.classList.remove('active');
        return;
    }
    dashboard.classList.add('active');

    // Player flag
    const flagEl = document.getElementById('careerPlayerFlag');
    if (careerHasPlayerCountry()) {
        flagEl.style.backgroundImage = `url(${getFlagDataURL(p.playerCountry, 48)})`;
        flagEl.title = COUNTRIES[p.playerCountry].name;
    } else {
        flagEl.style.backgroundImage = 'none';
        flagEl.style.border = '2px dashed #555';
        flagEl.title = 'Chưa chọn quốc gia';
    }

    document.getElementById('careerLeagueName').textContent = leagueDef.name;
    document.getElementById('careerLeagueTier').textContent = leagueDef.nameVN;

    const xpProg = careerGetLeagueXPProgress();
    document.getElementById('careerXPFill').style.width = xpProg.percent + '%';
    document.getElementById('careerXPText').textContent = `${p.xp} / ${xpProg.needed + (CAREER_LEAGUES[league - 1].xpThreshold)} XP`;
    document.getElementById('careerLevelText').textContent = `Cấp ${league}`;

    document.getElementById('careerStatCoins').textContent = p.coins;
    document.getElementById('careerStatStars').textContent = p.stars;
    document.getElementById('careerStatRaces').textContent = p.stats.races;
    document.getElementById('careerStatWins').textContent = p.stats.wins;

    careerRenderTab('stats');
}

function careerInjectRewardsToResults(rewards) {
    const content = document.getElementById('overlayContent');
    if (!content || !rewards) return;
    const box = document.createElement('div');
    box.className = 'career-rewards-box';
    box.innerHTML = `
        <div class="rewards-title">🏆 Phần Thưởng Sự Nghiệp</div>
        <div class="rewards-row">
            <span class="reward-item"><span class="reward-icon">✨</span> +${rewards.xp} XP</span>
            <span class="reward-item"><span class="reward-icon">💰</span> +${rewards.coins}</span>
            ${rewards.stars > 0 ? `<span class="reward-item"><span class="reward-icon">⭐</span> +${rewards.stars}</span>` : ''}
        </div>
    `;
    // Insert after the podium or at top
    const podium = content.querySelector('.podium');
    if (podium && podium.nextSibling) {
        content.insertBefore(box, podium.nextSibling);
    } else {
        content.appendChild(box);
    }
}

function careerShowPromotion(leagueNum, bonus) {
    const overlay = document.getElementById('overlay');
    const content = document.getElementById('overlayContent');
    const leagueDef = CAREER_LEAGUES[leagueNum - 1];
    content.innerHTML = `
        <div class="career-promotion-overlay">
            <div class="promo-icon">🎉</div>
            <div class="promo-title">Thăng Hạng!</div>
            <div class="promo-desc">Chúc mừng bạn đã lên <strong>${leagueDef.nameVN}</strong>!</div>
            <div class="promo-bonus">+${bonus.xp} XP · +${bonus.coins} 💰 · +${bonus.stars} ⭐</div>
            ${leagueDef.unlockCosmetic ? `<div style="margin-top:8px;font-size:14px;color:#6bcbff;">🔓 Mở khóa trang bị mới!</div>` : ''}
            <button class="btn btn-primary" onclick="careerDismissPromotion()" style="margin-top:12px;width:100%;">Tuyệt vời!</button>
        </div>
    `;
    overlay.classList.add('active');
    if (soundManager) soundManager.playVictoryFanfare();
}

function careerDismissPromotion() {
    document.getElementById('overlay').classList.remove('active');
    careerUpdatePanel();
}

function careerRenderTab(tabName) {
    // Update tab buttons
    document.querySelectorAll('.career-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll(`.career-tab[data-career-tab="${tabName}"]`).forEach(t => t.classList.add('active'));
    document.querySelectorAll('.career-tab-content').forEach(c => c.classList.remove('active'));

    const p = careerGetProfile();
    const league = careerGetLeagueNum();

    let html = '';
    if (tabName === 'stats') {
        html = `<div class="career-overlay-stats">
            <div class="stat-row"><span class="label">Tổng số đua</span><span class="value">${p.stats.races}</span></div>
            <div class="stat-row"><span class="label">Chiến thắng</span><span class="value">${p.stats.wins}</span></div>
            <div class="stat-row"><span class="label">Top 3</span><span class="value">${p.stats.top3}</span></div>
            <div class="stat-row"><span class="label">Giải đấu thắng</span><span class="value">${p.stats.tournamentsWon}</span></div>
            <div class="stat-row"><span class="label">Thời gian tốt nhất</span><span class="value">${p.stats.bestTime < Infinity ? formatTime(p.stats.bestTime) : '--:--'}</span></div>
            <div class="stat-row"><span class="label">Tốc độ cao nhất</span><span class="value">${Math.round(p.stats.bestSpeed)}</span></div>
            <div class="stat-row"><span class="label">Số lần bị loại</span><span class="value">${p.stats.totalEliminations}</span></div>
            <div class="stat-row"><span class="label">Xu</span><span class="value">${p.coins} 💰</span></div>
            <div class="stat-row"><span class="label">Sao</span><span class="value">${p.stars} ⭐</span></div>
        </div>`;
    } else if (tabName === 'garage') {
        html = '<div class="career-garage-grid">';
        const allCosmetics = Object.values(CAREER_COSMETICS).flat();
        for (const item of allCosmetics) {
            const unlocked = p.unlockedCosmetics.includes(item.id);
            const equipped = Object.values(p.equipped).includes(item.id);
            const locked = !unlocked && item.leagueReq > league;
            html += `<div class="career-garage-item ${unlocked ? (equipped ? 'equipped' : '') : (locked ? 'locked' : '')}" onclick="${unlocked ? `careerEquipCosmetic('${item.type}','${item.id}');careerUpdatePanel();` : ''}">
                <div class="item-icon">${locked ? '🔒' : item.icon}</div>
                <div class="item-name">${item.nameVN || item.name}</div>
                ${unlocked ? (equipped ? '<div class="item-badge">Đang dùng</div>' : '<div class="item-badge" style="background:#2a2a4a;color:#999;">Trang bị</div>') : `<div class="item-badge" style="background:#444;">Hạng ${item.leagueReq}</div>`}
            </div>`;
        }
        html += '</div>';
    } else if (tabName === 'missions') {
        const dailies = careerGetDailyMissions();
        const weeklies = careerGetWeeklyMissions();
        html = '<div style="font-size:11px;font-weight:600;color:#ddd;margin-bottom:4px;">📅 Nhiệm Vụ Hàng Ngày</div>';
        for (const m of dailies) {
            const pct = m.target > 0 ? Math.min(100, Math.round((m.progress / m.target) * 100)) : 0;
            html += `<div class="career-mission-card">
                <div class="mission-header"><span class="mission-name">${m.desc}</span><span class="mission-reward">${m.reward.xp}XP</span></div>
                <div class="mission-progress"><div class="mp-fill" style="width:${pct}%"></div></div>
                <div class="mission-desc">${m.progress}/${m.target}</div>
                ${m.completed && !m.claimed ? `<button class="btn btn-success btn-small claim-btn" onclick="careerClaimMissionReward('${m.id}',true);careerUpdatePanel();">Nhận</button>` : (m.claimed ? '<span style="font-size:10px;color:#6bcbff;">✓ Đã nhận</span>' : '')}
            </div>`;
        }
        html += '<div style="font-size:11px;font-weight:600;color:#ddd;margin:8px 0 4px;">📆 Nhiệm Vụ Hàng Tuần</div>';
        for (const m of weeklies) {
            const pct = m.target > 0 ? Math.min(100, Math.round((m.progress / m.target) * 100)) : 0;
            html += `<div class="career-mission-card">
                <div class="mission-header"><span class="mission-name">${m.desc}</span><span class="mission-reward">${m.reward.xp}XP ⭐${m.reward.stars || 0}</span></div>
                <div class="mission-progress"><div class="mp-fill" style="width:${pct}%"></div></div>
                <div class="mission-desc">${m.progress}/${m.target}</div>
                ${m.completed && !m.claimed ? `<button class="btn btn-success btn-small claim-btn" onclick="careerClaimMissionReward('${m.id}',false);careerUpdatePanel();">Nhận</button>` : (m.claimed ? '<span style="font-size:10px;color:#6bcbff;">✓ Đã nhận</span>' : '')}
            </div>`;
        }
    } else if (tabName === 'achievements') {
        for (const ach of CAREER_ACHIEVEMENTS) {
            const data = p.achievements[ach.id] || {};
            const unlocked = !!data.unlocked;
            html += `<div class="career-achievement-item ${unlocked ? 'unlocked' : 'locked'}">
                <div class="ach-icon">${ach.icon}</div>
                <div class="ach-info">
                    <div class="ach-name">${ach.nameVN}</div>
                    <div class="ach-desc">${ach.desc}</div>
                </div>
                <div class="ach-status">${unlocked ? '✅' : '🔒'}</div>
            </div>`;
        }
    }

    const tabEl = document.getElementById('careerTab' + tabName.charAt(0).toUpperCase() + tabName.slice(1));
    if (tabEl) {
        tabEl.innerHTML = html;
        tabEl.classList.add('active');
    }
}

// Tab switching
document.addEventListener('click', (e) => {
    const tab = e.target.closest('.career-tab');
    if (tab && tab.dataset.careerTab) {
        careerRenderTab(tab.dataset.careerTab);
    }
});

function careerShowCountrySelect() {
    const overlay = document.getElementById('overlay');
    const content = document.getElementById('overlayContent');
    let html = '<h2>🏁 Chọn Quốc Gia Của Bạn</h2>';
    html += '<p style="text-align:center;color:#999;font-size:13px;margin-bottom:12px;">Đây sẽ là lá cờ đại diện cho bạn trong Sự Nghiệp!</p>';
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;max-height:400px;overflow-y:auto;">';
    for (let i = 0; i < COUNTRIES.length; i++) {
        const flagURL = getFlagDataURL(i, 48);
        html += `<div onclick="careerSelectCountry(${i})" style="cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);transition:all 0.2s;" 
            onmouseover="this.style.background='rgba(107,107,255,0.2)';this.style.borderColor='#6b6bff'" 
            onmouseout="this.style.background='rgba(255,255,255,0.03)';this.style.borderColor='rgba(255,255,255,0.06)'">
            <div style="width:44px;height:44px;border-radius:50%;background-image:url(${flagURL});background-size:cover;background-position:center;border:2px solid rgba(255,255,255,0.2);"></div>
            <span style="font-size:10px;color:#ccc;text-align:center;word-break:break-word;">${COUNTRIES[i].name}</span>
        </div>`;
    }
    html += '</div>';
    html += '<button class="btn btn-secondary" onclick="document.getElementById(\'overlay\').classList.remove(\'active\')" style="width:100%;margin-top:12px;">Để Sau</button>';
    content.innerHTML = html;
    overlay.classList.add('active');
}

function careerSelectCountry(index) {
    const p = careerGetProfile();
    p.playerCountry = index;
    careerSaveProfile();
    document.getElementById('overlay').classList.remove('active');
    careerUpdatePanel();
}

function careerHasPlayerCountry() {
    const p = careerGetProfile();
    return p.playerCountry !== null && p.playerCountry !== undefined && p.playerCountry >= 0;
}

// Override init to prompt country selection on first time
const _origCareerInit = careerInit;
careerInit = function() {
    _origCareerInit();
    if (!careerHasPlayerCountry()) {
        setTimeout(careerShowCountrySelect, 300);
    }
};

});
