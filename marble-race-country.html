<style>
/* ===== CSS RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
body { background: #0a0a12; font-family: 'Montserrat', 'Segoe UI', system-ui, -apple-system, sans-serif; color: #e0e0e0; display: flex; justify-content: center; align-items: center; }

/* ===== APP LAYOUT ===== */
#app { display: flex; width: 100%; height: 100vh; max-width: 1400px; margin: 0 auto; background: #0f0f1a; overflow: hidden; }

/* ===== LEFT PANEL ===== */
#left-panel { width: 280px; min-width: 280px; height: 100%; background: linear-gradient(180deg, #14141f 0%, #1a1a2e 100%); padding: 20px 16px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; border-right: 2px solid #2a2a4a; z-index: 10; }
#left-panel h1 { font-size: 18px; font-weight: 800; text-align: center; background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcbff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; padding-bottom: 10px; border-bottom: 1px solid #2a2a4a; margin-bottom: 4px; }
#left-panel h2 { font-size: 11px; font-weight: 700; color: #777; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
#left-panel label { font-size: 11px; color: #999; display: block; margin-bottom: 3px; font-weight: 500; letter-spacing: 0.3px; }
#left-panel .section { background: rgba(255,255,255,0.02); border-radius: 8px; padding: 10px 12px; border: 1px solid rgba(255,255,255,0.03); }
#left-panel .section + .section { margin-top: 2px; }
#left-panel .control-group { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.04); }
#left-panel .control-group:first-child { margin-top: 0; padding-top: 0; border-top: none; }
#left-panel .btn-group { display: flex; gap: 4px; flex-wrap: wrap; }
#left-panel .btn-group .btn { flex: 1; min-width: 60px; padding: 6px 8px; font-size: 11px; }
#left-panel .action-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; padding: 0; }
#left-panel .action-row .btn { flex: 1; min-width: 70px; padding: 10px 8px; }

/* ===== MODE SELECT BUTTONS ===== */
.mode-btn { padding: 10px 4px; font-size: 12px; font-weight: 700; background: #22223a; color: #888; border: 1px solid #33335a; border-radius: 6px; cursor: pointer; transition: all 0.2s; text-align: center; }
.mode-btn:hover { background: #2a2a4a; color: #ccc; }
.mode-btn.active { background: #3a3a6a; color: #fff; border-color: #6b6bff; box-shadow: 0 0 12px rgba(107,107,255,0.3); }

/* ===== BUTTONS ===== */
.btn { padding: 8px 16px; font-size: 12px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
.btn-primary { background: linear-gradient(135deg, #6b6bff, #8b5cf6); color: #fff; box-shadow: 0 2px 8px rgba(107,107,255,0.4); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(107,107,255,0.6); }
.btn-primary:active { transform: translateY(1px); }
.btn-secondary { background: #2a2a4a; color: #aaa; border: 1px solid #3a3a6a; }
.btn-secondary:hover { background: #3a3a6a; color: #eee; }
.btn-secondary.active { background: #4a4a8a; color: #fff; border-color: #8888ff; box-shadow: 0 0 8px rgba(136,136,255,0.4); }
.btn-danger { background: linear-gradient(135deg, #ff6b6b, #ee5a24); color: #fff; }
.btn-success { background: linear-gradient(135deg, #00b894, #00cec9); color: #fff; }
.btn-small { padding: 4px 10px; font-size: 10px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

/* ===== SETTINGS CONTROLS ===== */
.slider-container { display: flex; flex-direction: column; gap: 4px; }
.slider-container input[type="range"] { width: 100%; height: 6px; -webkit-appearance: none; background: #2a2a4a; border-radius: 3px; outline: none; }
.slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #6b6bff; cursor: pointer; border: 2px solid #8b8bff; box-shadow: 0 0 8px rgba(107,107,255,0.5); }
.slider-value { text-align: center; font-size: 14px; font-weight: 700; color: #6bcbff; }
.seed-row { display: flex; gap: 4px; align-items: center; }
.seed-row input { flex: 1; padding: 4px 8px; font-size: 12px; background: #1a1a2e; color: #e0e0e0; border: 1px solid #2a2a4a; border-radius: 4px; outline: none; }
.seed-row input:focus { border-color: #6b6bff; }
.seed-row .btn { padding: 4px 8px; font-size: 12px; }

/* ===== GAME CONTAINER ===== */
#game-container { flex: 1; position: relative; overflow: hidden; background: #0a0a12; min-width: 0; }
#gameCanvas { display: block; width: 100%; height: 100%; }
#hud-bar { position: absolute; top: 0; left: 0; right: 0; height: 48px; background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 70%, transparent 100%); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; pointer-events: none; z-index: 5; }
.hud-item { font-size: 11px; font-weight: 600; color: #ccc; display: flex; align-items: center; gap: 6px; }
.hud-item .hud-label { color: #666; font-size: 9px; text-transform: uppercase; }
.hud-item .hud-value { color: #fff; font-weight: 700; }
.hud-fps { color: #6bcbff !important; }
.hud-commentator-box { flex:1; max-width:320px; min-width:100px; }
.hud-commentator { font-size:12px; color:#ffd93d !important; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:280px; transition:opacity 0.3s; }
.leaderboard-mini { display: flex; gap: 8px; font-size: 10px; }
.leaderboard-mini .lb-entry { display: flex; align-items: center; gap: 3px; }
.lb-pos { color: #ffd93d; font-weight: 700; width: 16px; }

/* ===== OVERLAY ===== */
#overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); z-index: 20; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
#overlay.active { display: flex; }
#overlay .overlay-content { background: linear-gradient(180deg, #1a1a2e, #14141f); border: 1px solid #2a2a4a; border-radius: 16px; padding: 28px 24px; max-width: 500px; width: 90%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
#overlay h2 { text-align: center; font-size: 24px; margin-bottom: 16px; background: linear-gradient(135deg, #ffd93d, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 0.5px; }
#overlay h3 { font-size: 14px; color: #777; margin: 12px 0 8px; text-align: center; letter-spacing: 0.3px; font-weight: 600; text-transform: uppercase; }

/* ===== PODIUM ===== */
.podium { display: flex; justify-content: center; align-items: flex-end; gap: 20px; margin: 20px 0 16px; height: 150px; }
.podium-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.podium-item .flag-circle { width: 44px; height: 44px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.5); background-size: cover; background-position: center; }
.podium-item .name { font-size: 12px; font-weight: 700; text-align: center; color: #bbb; letter-spacing: 0; }
.podium-item .time { font-size: 10px; color: #777; font-weight: 500; }
.podium-1 { transform: translateY(-10px); }
.podium-1 .flag-circle { width: 58px; height: 58px; border-color: #ffd93d; border-width: 3px; box-shadow: 0 0 24px rgba(255,217,61,0.35); }
.podium-1 .name { font-size: 14px; color: #ffd93d; }
.podium-2 .flag-circle { border-color: #c0c0c0; }
.podium-3 .flag-circle { border-color: #cd7f32; }
.podium-stand { width: 64px; padding: 4px 0; background: #2a2a4a; border-radius: 6px 6px 0 0; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; }
.podium-1 .podium-stand { height: 58px; background: linear-gradient(180deg, #ffd93d, #b8860b); font-size: 26px; }
.podium-2 .podium-stand { height: 40px; background: linear-gradient(180deg, #c0c0c0, #808080); }
.podium-3 .podium-stand { height: 30px; background: linear-gradient(180deg, #cd7f32, #8b4513); }

/* ===== RESULTS TABLE ===== */
.results-table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 8px 0; }
.results-table th { background: rgba(255,255,255,0.04); color: #777; padding: 7px 10px; text-align: left; font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #2a2a4a; }
.results-table td { padding: 6px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.results-table tr:last-child td { border-bottom: none; }
.results-table tr:nth-child(even) { background: rgba(255,255,255,0.02); }
.results-table .pos { color: #ffd93d; font-weight: 700; width: 28px; font-size: 13px; text-align: center; }
.results-table .flag-dot { display: inline-block; width: 18px; height: 18px; border-radius: 50%; vertical-align: middle; margin-right: 8px; border: 1.5px solid rgba(255,255,255,0.3); box-shadow: 0 0 4px rgba(0,0,0,0.3); }

/* ===== COUNTDOWN OVERLAY ===== */
#countdown { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 15; justify-content: center; align-items: center; pointer-events: none; }
#countdown.active { display: flex; }
#countdown-text { font-size: 120px; font-weight: 900; color: #fff; text-shadow: 0 0 40px rgba(107,107,255,0.8), 0 0 80px rgba(107,107,255,0.4); animation: countPulse 0.8s ease-out; }
@keyframes countPulse { 0% { transform: scale(1.8); opacity: 0; } 50% { opacity: 1; } 100% { transform: scale(1); opacity: 1; } }

/* ===== SCROLLBAR ===== */
#left-panel::-webkit-scrollbar,
#overlay .overlay-content::-webkit-scrollbar { width: 4px; }
#left-panel::-webkit-scrollbar-track,
#overlay .overlay-content::-webkit-scrollbar-track { background: transparent; }
#left-panel::-webkit-scrollbar-thumb,
#overlay .overlay-content::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 3px; }
#overlay .overlay-content::-webkit-scrollbar-thumb:hover { background: #5a5a8a; }
/* Firefox scrollbar */
#overlay .overlay-content { scrollbar-width: thin; scrollbar-color: #3a3a5a transparent; }

/* ===== RESPONSIVE ===== */
@media (max-width: 700px) {
  #left-panel { width: 200px; min-width: 200px; padding: 12px 10px; gap: 4px; }
  #left-panel h1 { font-size: 14px; padding-bottom: 8px; }
  #left-panel .section { padding: 8px 10px; }
  #left-panel h2 { font-size: 10px; margin-bottom: 4px; }
  .mode-btn { font-size: 10px; padding: 6px 3px; }
  .btn { font-size: 10px; padding: 6px 10px; }
  #left-panel .action-row .btn { padding: 8px 6px; font-size: 10px; }
  #hud-bar { height: 38px; padding: 0 8px; }
  .hud-item { font-size: 9px; }
  .leaderboard-mini { gap: 4px; }
  #countdown-text { font-size: 72px; }
  #overlay .overlay-content { padding: 20px 16px; }
  #overlay h2 { font-size: 20px; margin-bottom: 12px; }
  .podium { height: 120px; gap: 12px; margin: 12px 0; }
  .podium-item .flag-circle { width: 32px; height: 32px; }
  .podium-1 .flag-circle { width: 44px; height: 44px; }
  .podium-1 .name { font-size: 12px; }
  .podium-stand { width: 52px; font-size: 16px; }
  .podium-1 .podium-stand { height: 44px; font-size: 20px; }
  .podium-2 .podium-stand { height: 32px; }
  .podium-3 .podium-stand { height: 24px; }
  .results-table { font-size: 11px; }
  .results-table th { padding: 5px 8px; font-size: 9px; }
  .results-table td { padding: 5px 8px; }
}

@media (max-width: 480px) {
  #app { flex-direction: column; }
  #left-panel { width: 100%; min-width: unset; height: auto; max-height: 40vh; flex-direction: row; flex-wrap: wrap; padding: 8px 10px; gap: 4px; border-right: none; border-bottom: 2px solid #2a2a4a; }
  #left-panel h1 { width: 100%; font-size: 14px; padding-bottom: 6px; margin-bottom: 2px; }
  #left-panel .section { flex: 1; min-width: 140px; padding: 8px 10px; }
  #left-panel .section + .section { margin-top: 0; }
  #left-panel .action-row { margin-top: 2px; }
  #left-panel .action-row .btn { padding: 8px 6px; }
  .control-group { margin-top: 6px; padding-top: 6px; }
  #game-container { height: 60vh; }
  #hud-bar { height: 32px; }
  .hud-item { font-size: 8px; }
  .leaderboard-mini { display: none; }
}

@media (orientation: portrait) and (min-width: 481px) {
  #app { flex-direction: column; }
  #left-panel { width: 100%; min-width: unset; height: auto; max-height: 35vh; flex-direction: row; flex-wrap: wrap; padding: 10px 14px; gap: 4px; border-right: none; border-bottom: 2px solid #2a2a4a; }
  #left-panel h1 { width: 100%; font-size: 16px; padding-bottom: 8px; }
  #left-panel .section { flex: 1; min-width: 160px; padding: 8px 10px; }
  #left-panel .section + .section { margin-top: 0; }
  #left-panel .action-row { margin-top: 2px; }
  #game-container { height: 65vh; }
}

/* ===== CAREER MODE - DASHBOARD ===== */
.career-dashboard { display:none; }
.career-dashboard.active { display:block; }
.career-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.career-header .league-badge { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,#ffd93d,#ff6b6b); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; color:#1a1a2e; }
.career-header .league-name { font-size:13px; font-weight:700; color:#fff; flex:1; }
.career-header .league-tier { font-size:10px; color:#ffd93d; font-weight:600; }

.career-xp-bar { height:8px; background:#2a2a4a; border-radius:4px; overflow:hidden; margin:4px 0 6px; position:relative; }
.career-xp-bar .xp-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,#6b6bff,#ffd93d); background-size:200% 100%; animation:xpShimmer 2s linear infinite; transition:width 0.5s ease; }
@keyframes xpShimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.career-xp-text { font-size:9px; color:#999; display:flex; justify-content:space-between; }

.career-stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:3px; margin:6px 0; }
.career-stat-item { background:rgba(255,255,255,0.03); border-radius:4px; padding:4px 6px; text-align:center; }
.career-stat-item .stat-val { font-size:12px; font-weight:700; color:#fff; }
.career-stat-item .stat-lbl { font-size:8px; color:#888; text-transform:uppercase; letter-spacing:0.5px; }

.career-tab-bar { display:flex; gap:2px; margin:6px 0 0; }
.career-tab { flex:1; padding:5px 2px; font-size:9px; font-weight:600; background:#1a1a2e; color:#777; border:1px solid #2a2a4a; border-radius:4px; cursor:pointer; text-align:center; transition:all 0.2s; }
.career-tab:hover { background:#2a2a4a; color:#ccc; }
.career-tab.active { background:#3a3a6a; color:#fff; border-color:#6b6bff; box-shadow:0 0 8px rgba(107,107,255,0.3); }
.career-tab-content { display:none; }
.career-tab-content.active { display:block; }

/* ===== CAREER OVERLAY SCREENS ===== */
.career-overlay-stats .stat-row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:13px; }
.career-overlay-stats .stat-row .label { color:#999; }
.career-overlay-stats .stat-row .value { color:#fff; font-weight:600; }

.career-garage-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin:8px 0; }
.career-garage-item { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:6px; padding:8px 4px; text-align:center; cursor:pointer; transition:all 0.2s; }
.career-garage-item:hover { background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.12); }
.career-garage-item.locked { opacity:0.35; cursor:not-allowed; filter:grayscale(0.6); }
.career-garage-item.equipped { border-color:#ffd93d; box-shadow:0 0 8px rgba(255,217,61,0.25); }
.career-garage-item .item-icon { font-size:22px; margin-bottom:3px; }
.career-garage-item .item-name { font-size:9px; color:#bbb; }
.career-garage-item .item-badge { font-size:8px; background:#6b6bff; color:#fff; border-radius:3px; padding:1px 4px; display:inline-block; margin-top:2px; }
.career-garage-item .lock-icon { font-size:14px; }

.career-mission-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:6px; padding:8px 10px; margin-bottom:6px; }
.career-mission-card .mission-header { display:flex; justify-content:space-between; align-items:center; }
.career-mission-card .mission-name { font-size:12px; font-weight:600; color:#ddd; }
.career-mission-card .mission-reward { font-size:10px; color:#ffd93d; }
.career-mission-card .mission-progress { margin-top:4px; height:4px; background:#2a2a4a; border-radius:2px; }
.career-mission-card .mission-progress .mp-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,#6b6bff,#6bcbff); transition:width 0.3s; }
.career-mission-card .mission-desc { font-size:10px; color:#888; margin-top:2px; }
.career-mission-card .claim-btn { margin-top:4px; padding:3px 10px; font-size:9px; }

.career-achievement-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
.career-achievement-item .ach-icon { font-size:22px; width:30px; text-align:center; }
.career-achievement-item .ach-info { flex:1; }
.career-achievement-item .ach-name { font-size:12px; font-weight:600; color:#ddd; }
.career-achievement-item .ach-desc { font-size:10px; color:#888; }
.career-achievement-item .ach-status { font-size:10px; color:#6bcbff; }
.career-achievement-item.locked .ach-icon { filter:grayscale(1); opacity:0.4; }
.career-achievement-item.locked .ach-name { color:#666; }
.career-achievement-item.unlocked .ach-status { color:#ffd93d; }

/* ===== CAREER REWARDS ANIMATION ===== */
.career-rewards-box { background:linear-gradient(135deg,rgba(107,107,255,0.15),rgba(255,217,61,0.08)); border:1px solid rgba(255,217,61,0.2); border-radius:8px; padding:10px 12px; margin:8px 0; text-align:center; }
.career-rewards-box .rewards-title { font-size:11px; color:#ffd93d; font-weight:600; margin-bottom:4px; }
.career-rewards-box .rewards-row { display:flex; justify-content:center; gap:12px; }
.career-rewards-box .reward-item { display:flex; align-items:center; gap:3px; font-size:13px; font-weight:700; color:#fff; }
.career-rewards-box .reward-item .reward-icon { font-size:16px; }

.career-promotion-overlay { text-align:center; padding:16px; }
.career-promotion-overlay .promo-icon { font-size:48px; margin-bottom:8px; }
.career-promotion-overlay .promo-title { font-size:22px; font-weight:800; background:linear-gradient(135deg,#ffd93d,#ff6b6b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.career-promotion-overlay .promo-desc { font-size:13px; color:#999; margin:8px 0; }
.career-promotion-overlay .promo-bonus { font-size:15px; color:#ffd93d; font-weight:700; }

.career-lock-indicator { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:18px; color:rgba(255,255,255,0.5); text-shadow:0 1px 4px rgba(0,0,0,0.8); }

/* ===== CAREER MODE BUTTON ===== */

<script>
// ============================================================
// MARBLE RACE COUNTRY — Complete Game Implementation
// ============================================================
// Sections:
//  1. CONFIGURATION
//  2. SEEDED PRNG (Mulberry32)
//  3. VECTOR MATH (Vec2)
//  4. COUNTRY DATA & FLAG RENDERER
//  5. SOUND MANAGER (Web Audio API)
//  6. PHYSICS ENGINE (Custom)
//  7. TRACK GENERATOR
//  8. MARBLE SYSTEM
//  9. PARTICLE SYSTEM
//  10. CAMERA SYSTEM
//  11. GAME MODES
//  12. GAME STATE MACHINE
//  13. UI RENDERING
//  14. MAIN GAME LOOP
//  15. INPUT HANDLING
//  16. BOOTSTRAP
// ============================================================

// ============================================================
// SECTION 1: CONFIGURATION
// ============================================================
const CONFIG = {
    PHYSICS_DT: 1 / 60,
    GRAVITY: 350,
    MARBLE_RADIUS: 14,
    TRACK_WIDTH: 800,
    TRACK_LENGTH: 8000,
    WALL_THICKNESS: 10,
    BOUNCE_DAMPING: 0.5,
    FRICTION_AIR: 0.999,
    FRICTION_ROLLING: 0.98,
    MAX_SPEED: 300,
    SOUND_ENABLED: true,
    PARTICLE_ENABLED: true,
    GRID_CELL_SIZE: 64,
    MAX_PARTICLES: 500,
    CAMERA_SMOOTH: 0.055,
    CHECKPOINT_INTERVAL: 400,
    COUNTDOWN_SECONDS: 3,
};

// ============================================================
// SECTION 2: SEEDED PRNG (Mulberry32)
// ============================================================
function createRNG(seed) {
    let s = seed >>> 0;
    return {
        next: function() {
            s |= 0;
            s = s + 0x6D2B79F5 | 0;
            let t = Math.imul(s ^ s >>> 15, 1 | s);
            t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        },
        nextRange: function(min, max) {
            return min + this.next() * (max - min);
        },
        nextInt: function(min, max) {
            return Math.floor(this.nextRange(min, max + 1));
        },
        nextGaussian: function(mean, std) {
            let u1 = this.next(), u2 = this.next();
            let z = Math.sqrt(-2 * Math.log(u1 || 0.0001)) * Math.cos(2 * Math.PI * u2);
            return mean + z * std;
        }
    };
}

// ============================================================
// SECTION 3: VECTOR MATH (Vec2)
// ============================================================
class Vec2 {
    constructor(x = 0, y = 0) { this.x = x; this.y = y; }
    add(v) { return new Vec2(this.x + v.x, this.y + v.y); }
    sub(v) { return new Vec2(this.x - v.x, this.y - v.y); }
    scale(s) { return new Vec2(this.x * s, this.y * s); }
    dot(v) { return this.x * v.x + this.y * v.y; }
    cross(v) { return this.x * v.y - this.y * v.x; }
    length() { return Math.sqrt(this.x * this.x + this.y * this.y); }
    lengthSq() { return this.x * this.x + this.y * this.y; }
    normalize() { const l = this.length() || 1; return new Vec2(this.x / l, this.y / l); }
    dist(v) { return this.sub(v).length(); }
    angle() { return Math.atan2(this.y, this.x); }
    rotate(a) { const c = Math.cos(a), s = Math.sin(a); return new Vec2(this.x * c - this.y * s, this.x * s + this.y * c); }
    clone() { return new Vec2(this.x, this.y); }
    static fromAngle(a, len = 1) { return new Vec2(Math.cos(a) * len, Math.sin(a) * len); }
}

// ============================================================
// SECTION 4: COUNTRY DATA & FLAG RENDERER
// ============================================================
const COUNTRIES = [
    { name: "USA", colors: ["#B22234","#FFFFFF","#3C3B6E"], pattern: "stripes-vertical" },
    { name: "UK", colors: ["#012169","#FFFFFF","#C8102E"], pattern: "union-jack" },
    { name: "Germany", colors: ["#000000","#DD0000","#FFCC00"], pattern: "stripes-horizontal" },
    { name: "France", colors: ["#002395","#FFFFFF","#ED2939"], pattern: "stripes-vertical" },
    { name: "Italy", colors: ["#009246","#FFFFFF","#CE2B37"], pattern: "stripes-vertical" },
    { name: "Spain", colors: ["#C60B1E","#FFC400","#C60B1E"], pattern: "stripes-horizontal" },
    { name: "Brazil", colors: ["#009739","#FFDF00","#002776"], pattern: "circle" },
    { name: "Japan", colors: ["#FFFFFF","#BC002D"], pattern: "circle" },
    { name: "China", colors: ["#DE2910","#FFDE00"], pattern: "china" },
    { name: "India", colors: ["#FF9933","#FFFFFF","#138808"], pattern: "stripes-horizontal" },
    { name: "Canada", colors: ["#FF0000","#FFFFFF","#FF0000"], pattern: "stripes-vertical" },
    { name: "Australia", colors: ["#00008B","#FF0000","#FFFFFF"], pattern: "star" },
    { name: "Russia", colors: ["#FFFFFF","#0033A0","#DA291C"], pattern: "stripes-horizontal" },
    { name: "South Korea", colors: ["#FFFFFF","#003478","#CD2E3A"], pattern: "circle" },
    { name: "Netherlands", colors: ["#AE1C28","#FFFFFF","#21468B"], pattern: "stripes-horizontal" },
    { name: "Switzerland", colors: ["#FF0000","#FFFFFF"], pattern: "cross" },
    { name: "Sweden", colors: ["#005BA1","#FECC00"], pattern: "cross" },
    { name: "Norway", colors: ["#BA0C2F","#FFFFFF","#003087"], pattern: "cross" },
    { name: "Denmark", colors: ["#C8102E","#FFFFFF"], pattern: "cross" },
    { name: "Finland", colors: ["#FFFFFF","#003580"], pattern: "cross" },
    { name: "Poland", colors: ["#FFFFFF","#DC143C"], pattern: "stripes-horizontal" },
    { name: "Czech Republic", colors: ["#11457E","#FFFFFF","#D7141A"], pattern: "triangle" },
    { name: "Austria", colors: ["#ED2939","#FFFFFF","#ED2939"], pattern: "stripes-horizontal" },
    { name: "Hungary", colors: ["#CE2B37","#FFFFFF","#477050"], pattern: "stripes-horizontal" },
    { name: "Greece", colors: ["#0D5EAF","#FFFFFF"], pattern: "cross" },
    { name: "Portugal", colors: ["#006600","#FF0000","#FFD700"], pattern: "stripes-vertical" },
    { name: "Belgium", colors: ["#000000","#FDDA24","#EF3340"], pattern: "stripes-vertical" },
    { name: "Turkey", colors: ["#E30A17","#FFFFFF"], pattern: "turkish" },
    { name: "Argentina", colors: ["#74ACDF","#FFFFFF","#74ACDF"], pattern: "stripes-horizontal" },
    { name: "Mexico", colors: ["#006341","#FFFFFF","#CE1126"], pattern: "stripes-vertical" },
    { name: "Thailand", colors: ["#ED1C24","#FFFFFF","#241D4F","#FFFFFF","#ED1C24"], pattern: "stripes-horizontal" },
    { name: "Egypt", colors: ["#CE1126","#FFFFFF","#000000"], pattern: "stripes-horizontal" },
    { name: "Saudi Arabia", colors: ["#006C35","#FFFFFF"], pattern: "plain" },
    { name: "Nigeria", colors: ["#008751","#FFFFFF","#008751"], pattern: "stripes-vertical" },
    { name: "South Africa", colors: ["#DE3831","#002395","#FFFFFF","#FFB612","#007A4D"], pattern: "triangle" },
    { name: "Ireland", colors: ["#169B62","#FFFFFF","#FF883E"], pattern: "stripes-vertical" },
    { name: "Ukraine", colors: ["#0057B7","#FFDD00"], pattern: "stripes-horizontal" },
    { name: "Romania", colors: ["#002B7F","#FCD116","#CE1126"], pattern: "stripes-vertical" },
    { name: "Vietnam", colors: ["#DA251D","#FFFF00"], pattern: "star" },
    { name: "Chile", colors: ["#FFFFFF","#0039A6","#DA291C"], pattern: "triangle" },
];

const flagTextureCache = new Map();

function renderFlagTexture(country, size) {
    const key = country.name + size;
    if (flagTextureCache.has(key)) return flagTextureCache.get(key);
    const canvas = document.createElement('canvas');
    canvas.width = size * 2;
    canvas.height = size * 2;
    const ctx = canvas.getContext('2d');
    const s = size * 2;
    const h = s, w = s;
    const colors = country.colors;
    const cx = w / 2, cy = h / 2;

    switch (country.pattern) {
        case 'stripes-horizontal': {
            const stripeH = h / colors.length;
            colors.forEach((c, i) => {
                ctx.fillStyle = c;
                ctx.fillRect(0, i * stripeH, w, stripeH + 1);
            });
            break;
        }
        case 'stripes-vertical': {
            const stripeW = w / colors.length;
            colors.forEach((c, i) => {
                ctx.fillStyle = c;
                ctx.fillRect(i * stripeW, 0, stripeW + 1, h);
            });
            break;
        }
        case 'cross': {
            ctx.fillStyle = colors[0];
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = colors[1];
            const cw = w * 0.2, ch = h * 0.2;
            ctx.fillRect(cx - cw / 2, 0, cw, h);
            ctx.fillRect(0, cy - ch / 2, w, ch);
            if (colors[2]) {
                ctx.fillStyle = colors[2];
                ctx.fillRect(cx - cw / 3, 0, cw * 0.66, h);
                ctx.fillRect(0, cy - ch / 3, w, ch * 0.66);
            }
            break;
        }
        case 'circle': {
            ctx.fillStyle = colors[0];
            ctx.fillRect(0, 0, w, h);
            const r = w * 0.35;
            ctx.fillStyle = colors[1];
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fill();
            break;
        }
        case 'triangle': {
            // Triangle pattern (like Czech, South Africa)
            ctx.fillStyle = colors[0];
            ctx.fillRect(0, 0, w, h);
            if (colors.length >= 3) {
                ctx.fillStyle = colors[1];
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(w, 0);
                ctx.lineTo(w * 0.5, h * 0.5);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = colors[2];
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(w * 0.3, 0);
                ctx.lineTo(0, h * 0.5);
                ctx.closePath();
                ctx.fill();
            }
            break;
        }
        case 'china': {
            // China flag: red bg + 1 large star + 4 small stars in arc
            ctx.fillStyle = colors[0];
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = colors[1];
            const bigR = w * 0.2;
            // Large star in top-left area
            drawStar(ctx, w * 0.2, h * 0.25, 5, bigR, bigR * 0.4);
            // 4 small stars in an arc to the right
            const smallR = bigR * 0.4;
            const positions = [
                [w * 0.38, h * 0.12],
                [w * 0.46, h * 0.22],
                [w * 0.42, h * 0.35],
                [w * 0.34, h * 0.42],
            ];
            for (const [sx, sy] of positions) {
                drawStar(ctx, sx, sy, 5, smallR, smallR * 0.4);
            }
            break;
        }
        case 'turkish': {
            // Turkey: red bg + white crescent + star
            ctx.fillStyle = colors[0];
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = colors[1];
            // Crescent: two overlapping circles with composite
            const cr = w * 0.3;
            ctx.beginPath();
            ctx.arc(cx - w * 0.05, cy, cr, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(cx + w * 0.08, cy, cr * 0.78, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            // Star next to crescent
            ctx.fillStyle = colors[1];
            const tStarR = w * 0.1;
            drawStar(ctx, cx + w * 0.14, cy - h * 0.03, 5, tStarR, tStarR * 0.4);
            break;
        }
        case 'star': {
            ctx.fillStyle = colors[0];
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = colors[1];
            const starR = w * 0.3;
            drawStar(ctx, cx, cy, 5, starR, starR * 0.4);
            break;
        }
        case 'diagonal': {
            // Diagonal split
            ctx.fillStyle = colors[0];
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = colors[1];
            ctx.beginPath();
            ctx.moveTo(0, h);
            ctx.lineTo(w, h);
            ctx.lineTo(w, 0);
            ctx.closePath();
            ctx.fill();
            if (colors[2]) {
                ctx.fillStyle = colors[2];
                ctx.beginPath();
                ctx.moveTo(0, h * 0.7);
                ctx.lineTo(w * 0.3, h);
                ctx.lineTo(0, h);
                ctx.closePath();
                ctx.fill();
            }
            break;
        }
        case 'checker': {
            const n = 4;
            const cs = w / n;
            ctx.fillStyle = colors[0];
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = colors[1];
            for (let r = 0; r < n; r++) {
                for (let c = 0; c < n; c++) {
                    if ((r + c) % 2 === 0) {
                        ctx.fillRect(c * cs, r * cs, cs, cs);
                    }
                }
            }
            break;
        }
        case 'union-jack': {
            ctx.fillStyle = colors[0];
            ctx.fillRect(0, 0, w, h);
            // White diagonal cross
            ctx.fillStyle = colors[1];
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(Math.PI / 4);
            ctx.fillRect(-w * 0.25, -h * 0.15, w * 0.5, h * 0.3);
            ctx.rotate(-Math.PI / 2);
            ctx.fillRect(-w * 0.25, -h * 0.15, w * 0.5, h * 0.3);
            ctx.restore();
            // Red diagonal cross
            ctx.fillStyle = colors[2];
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(Math.PI / 4);
            ctx.fillRect(-w * 0.25, -h * 0.07, w * 0.5, h * 0.14);
            ctx.rotate(-Math.PI / 2);
            ctx.fillRect(-w * 0.25, -h * 0.07, w * 0.5, h * 0.14);
            ctx.restore();
            // White cross
            ctx.fillStyle = colors[1];
            ctx.fillRect(cx - w * 0.06, 0, w * 0.12, h);
            ctx.fillRect(0, cy - h * 0.06, w, h * 0.12);
            // Red cross
            ctx.fillStyle = colors[2];
            ctx.fillRect(cx - w * 0.03, 0, w * 0.06, h);
            ctx.fillRect(0, cy - h * 0.03, w, h * 0.06);
            break;
        }
        case 'plain':
        default: {
            ctx.fillStyle = colors[0];
            ctx.fillRect(0, 0, w, h);
            if (colors[1]) {
                // Add some detail
                ctx.fillStyle = colors[1];
                ctx.font = `${w * 0.5}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
            }
            break;
        }
    }

    // Border
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.strokeRect(1, 1, w - 2, h - 2);

    // Clip to circle version
    const circleCanvas = document.createElement('canvas');
    circleCanvas.width = size;
    circleCanvas.height = size;
    const cctx = circleCanvas.getContext('2d');
    cctx.beginPath();
    cctx.arc(size / 2, size / 2, size / 2 - 1, 0, Math.PI * 2);
    cctx.clip();
    cctx.drawImage(canvas, 0, 0, s, s, 0, 0, size, size);

    flagTextureCache.set(key, circleCanvas);
    return circleCanvas;
}

function drawStar(ctx, cx, cy, points, outerR, innerR) {
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
        const r = i % 2 === 0 ? outerR : innerR;
        const a = (i * Math.PI / points) - Math.PI / 2;
        const x = cx + r * Math.cos(a);
        const y = cy + r * Math.sin(a);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
}

// ============================================================
// SECTION 5: SOUND MANAGER (Web Audio API)
// ============================================================
class SoundManager {
    constructor() {
        this.ctx = null;
        this.masterVolume = 0.75;
        this.initialized = false;
        this.noiseBuffer = null;
        this.crowdNodes = [];
        this.crowdActive = false;
        this.crowdChantTimer = null;
        this.crowdChantEnabled = false;
    }

    init() {
        if (this.initialized) return;
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.masterGain = this.ctx.createGain();
            this.masterGain.gain.value = this.masterVolume;
            this.masterGain.connect(this.ctx.destination);
            // Pre-generate noise buffers
            this.noiseBuffer = this._createNoiseBuffer(1.0);
            this.initialized = true;
        } catch (e) {
            console.warn('Audio not available');
        }
    }

    _createNoiseBuffer(duration) {
        const sr = this.ctx.sampleRate;
        const len = sr * duration;
        const buf = this.ctx.createBuffer(1, len, sr);
        const data = buf.getChannelData(0);
        for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
        return buf;
    }

    resume() {
        if (this.ctx && this.ctx.state === 'suspended') {
            this.ctx.resume();
        }
    }

    setVolume(v) {
        this.masterVolume = v;
        if (this.masterGain) this.masterGain.gain.value = v;
    }

    _playTone(freq, duration, type = 'sine', volume = 0.3) {
        if (!this.initialized) return;
        this.resume();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(volume, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    }

    // ─── CROWD AMBIENCE ───────────────────────────────────────
    startCrowd() {
        if (!this.initialized || this.crowdActive) return;
        this.resume();
        this.crowdActive = true;
        this.crowdNodes = [];

        // Layer 1: Deep rumble (low-frequency crowd murmur)
        const noise1 = this.ctx.createBufferSource();
        noise1.buffer = this._createNoiseBuffer(4);
        noise1.loop = true;
        const bp1 = this.ctx.createBiquadFilter();
        bp1.type = 'bandpass';
        bp1.frequency.value = 180;
        bp1.Q.value = 0.6;
        const gain1 = this.ctx.createGain();
        gain1.gain.value = 0.55;
        noise1.connect(bp1).connect(gain1).connect(this.masterGain);
        noise1.start();
        this.crowdNodes.push({ src: noise1, gain: gain1, base: 0.55 });

        // Layer 2: Mid crowd chatter
        const noise2 = this.ctx.createBufferSource();
        noise2.buffer = this._createNoiseBuffer(2);
        noise2.loop = true;
        const bp2 = this.ctx.createBiquadFilter();
        bp2.type = 'bandpass';
        bp2.frequency.value = 480;
        bp2.Q.value = 0.4;
        const gain2 = this.ctx.createGain();
        gain2.gain.value = 0.35;
        noise2.connect(bp2).connect(gain2).connect(this.masterGain);
        noise2.start();
        this.crowdNodes.push({ src: noise2, gain: gain2, base: 0.35 });

        // Slow volume pulse to avoid "static" feeling
        this._pulseCrowd();
        // Start crowd vocal chants
        this.startCrowdChants();
    }

    _pulseCrowd() {
        if (!this.crowdActive) return;
        const now = this.ctx.currentTime;
        for (const n of this.crowdNodes) {
            const b = n.base;
            // Oscillate between 50% and 110% of base volume (up AND down)
            const target = b * (0.5 + Math.random() * 0.6);
            n.gain.gain.linearRampToValueAtTime(target, now + 0.4 + Math.random() * 0.4);
        }
        setTimeout(() => { if (this.crowdActive) this._pulseCrowd(); }, 500 + Math.random() * 400);
    }

    stopCrowd() {
        this.crowdActive = false;
        this.stopCrowdChants();
        for (const n of this.crowdNodes) {
            try {
                n.gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.3);
                setTimeout(() => { try { n.src.stop(); } catch(e) {} }, 350);
            } catch(e) {}
        }
        this.crowdNodes = [];
    }

    // ─── CROWD CHANTS (TTS) ───────────────────────────────────
    _crowdChantsGeneric() {
        return [
            "Let's go! Let's go!", "Go! Go! Go!", "Come on! Come on!",
            "Woo!", "Yeah!", "Alright!", "Let's go!", "Whoo!",
            "Come on!", "Yeah baby!"
        ];
    }

    _crowdChantsExcited() {
        return [
            "Oh! So close!", "Come on, push!", "This is intense!",
            "Amazing race!", "Incredible!", "Ohhh!", "Nice move!",
            "Look at that!", "Oh my god!", "No way!"
        ];
    }

    _crowdChantsFinish() {
        return [
            "He did it!", "Yes! Yes! Yes!", "Woo! Champion!",
            "What a race!", "Amazing finish!", "Number one!"
        ];
    }

    startCrowdChants() {
        if (!this.initialized || this.crowdChantEnabled) return;
        this.crowdChantEnabled = true;
        this.resume();
        // First chant after a short delay
        this.crowdChantTimer = setTimeout(() => this._scheduleNextChant(), 2000 + Math.random() * 2000);
    }

    stopCrowdChants() {
        this.crowdChantEnabled = false;
        if (this.crowdChantTimer) {
            clearTimeout(this.crowdChantTimer);
            this.crowdChantTimer = null;
        }
    }

    _scheduleNextChant() {
        if (!this.crowdChantEnabled) return;
        this._sayRandomChant();
        // Next chant in 4-10 seconds
        this.crowdChantTimer = setTimeout(() => this._scheduleNextChant(), 4000 + Math.random() * 6000);
    }

    _sayRandomChant() {
        if (!this.initialized || !window.speechSynthesis) return;
        // Don't interrupt BLV (commentator)
        if (window.speechSynthesis.speaking) return;
        const category = Math.random();
        let phrases;
        if (category < 0.6) phrases = this._crowdChantsGeneric();
        else if (category < 0.85) phrases = this._crowdChantsExcited();
        else phrases = this._crowdChantsFinish();
        const text = phrases[Math.floor(Math.random() * phrases.length)];
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 1.5 + Math.random() * 0.3;
        u.pitch = 0.9 + Math.random() * 0.4;
        u.volume = 1;
        // Find an English voice
        const voices = window.speechSynthesis.getVoices();
        const en = voices.find(v => v.lang.startsWith('en') && v.name.includes('Natural'))
            || voices.find(v => v.lang.startsWith('en') && v.name.includes('Online'))
            || voices.find(v => v.lang.startsWith('en'));
        if (en) u.voice = en;
        window.speechSynthesis.speak(u);
    }

    // ─── CROWD REACTIONS ──────────────────────────────────────

    playApplause(duration = 2.5) {
        if (!this.initialized) return;
        this.resume();
        const now = this.ctx.currentTime;
        // Multiple noise bursts with randomized timing = applause
        for (let i = 0; i < 30; i++) {
            const t = now + (i / 30) * duration + Math.random() * 0.06;
            const src = this.ctx.createBufferSource();
            src.buffer = this._createNoiseBuffer(0.04 + Math.random() * 0.06);
            const bp = this.ctx.createBiquadFilter();
            bp.type = 'bandpass';
            bp.frequency.value = 2000 + Math.random() * 3000;
            bp.Q.value = 2 + Math.random() * 3;
            const g = this.ctx.createGain();
            const vol = (0.45 + Math.random() * 0.25) * (1 - (i / 30) * 0.5);
            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(vol, t + 0.01);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.08 + Math.random() * 0.1);
            src.connect(bp).connect(g).connect(this.masterGain);
            src.start(t);
            src.stop(t + 0.15);
        }
    }

    playCheer(intensity = 1.0) {
        if (!this.initialized) return;
        this.resume();
        const now = this.ctx.currentTime;
        // Rising whoosh + noise = crowd cheer
        const osc = this.ctx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(800 * intensity, now + 0.6);
        const gOsc = this.ctx.createGain();
        gOsc.gain.setValueAtTime(0.3 * intensity, now);
        gOsc.gain.linearRampToValueAtTime(0.55 * intensity, now + 0.15);
        gOsc.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
        osc.connect(gOsc).connect(this.masterGain);
        osc.start(now);
        osc.stop(now + 0.9);

        // Noise burst layered on top
        const src = this.ctx.createBufferSource();
        src.buffer = this._createNoiseBuffer(0.5);
        const bp = this.ctx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 1000 + 800 * intensity;
        bp.Q.value = 0.5;
        const gNoise = this.ctx.createGain();
        gNoise.gain.setValueAtTime(0.35 * intensity, now);
        gNoise.gain.linearRampToValueAtTime(0.6 * intensity, now + 0.1);
        gNoise.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
        src.connect(bp).connect(gNoise).connect(this.masterGain);
        src.start(now);
        src.stop(now + 0.8);
    }

    playVictoryFanfare() {
        if (!this.initialized) return;
        this.resume();
        const now = this.ctx.currentTime;
        // Epic brass-like fanfare: ascending arpeggio
        const notes = [523, 659, 784, 1047, 1319];
        notes.forEach((freq, i) => {
            const t = now + i * 0.13;
            const osc = this.ctx.createOscillator();
            osc.type = 'triangle';
            osc.frequency.value = freq;
            const g = this.ctx.createGain();
            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(0.5, t + 0.03);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
            osc.connect(g).connect(this.masterGain);
            osc.start(t);
            osc.stop(t + 0.4);
        });
        // Follow with applause
        setTimeout(() => { if (this.initialized) this.playApplause(3.0); }, 700);
    }

    playExcited() {
        // Quick excited crowd burst for overtakes / close action
        this.playCheer(0.6);
    }

    playGasps() {
        // Crowd disappointment / shock
        if (!this.initialized) return;
        this.resume();
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(200, now + 0.4);
        const g = this.ctx.createGain();
        g.gain.setValueAtTime(0.35, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.connect(g).connect(this.masterGain);
        osc.start(now);
        osc.stop(now + 0.6);
    }

    playBounce(volume = 0.15) {
        const freq = 200 + Math.random() * 300;
        this._playTone(freq, 0.08, 'sine', volume * 0.6);
        this._playTone(freq * 0.5, 0.06, 'triangle', volume * 0.3);
    }

    playCheckpoint() {
        this._playTone(523, 0.1, 'sine', 0.2);
        setTimeout(() => {
            if (this.initialized) this._playTone(659, 0.1, 'sine', 0.2);
        }, 80);
    }

    playFinish() {
        const notes = [523, 659, 784, 1047];
        notes.forEach((f, i) => {
            setTimeout(() => this._playTone(f, 0.2, 'sine', 0.25), i * 150);
        });
    }

    playClick() {
        this._playTone(800, 0.05, 'square', 0.1);
    }

    playElimination() {
        this._playTone(300, 0.3, 'sawtooth', 0.15);
        this._playTone(200, 0.4, 'sawtooth', 0.1);
    }

    playCountdown() {
        this._playTone(440, 0.15, 'sine', 0.2);
    }

    playGo() {
        this._playTone(880, 0.3, 'sine', 0.3);
    }
}

// ============================================================
// SECTION 6: PHYSICS ENGINE (Custom)
// ============================================================

class SpatialGrid {
    constructor(cellSize) {
        this.cellSize = cellSize;
        this.cells = new Map();
    }

    clear() {
        this.cells.clear();
    }

    _key(x, y) {
        return Math.floor(x / this.cellSize) + ',' + Math.floor(y / this.cellSize);
    }

    insert(body) {
        const key = this._key(body.x, body.y);
        if (!this.cells.has(key)) this.cells.set(key, []);
        this.cells.get(key).push(body);
    }

    getNearby(body) {
        const results = [];
        const cx = Math.floor(body.x / this.cellSize);
        const cy = Math.floor(body.y / this.cellSize);
        for (let dx = -1; dx <= 1; dx++) {
            for (let dy = -1; dy <= 1; dy++) {
                const key = (cx + dx) + ',' + (cy + dy);
                if (this.cells.has(key)) {
                    results.push(...this.cells.get(key));
                }
            }
        }
        return results;
    }

    getAll() {
        const all = [];
        for (const arr of this.cells.values()) all.push(...arr);
        return all;
    }
}

class PhysicsEngine {
    constructor() {
        this.bodies = [];
        this.staticBodies = [];
        this.grid = new SpatialGrid(CONFIG.GRID_CELL_SIZE);
        this.wallSegments = [];
    }

    addBody(body) {
        this.bodies.push(body);
        return body;
    }

    addStaticBody(body) {
        body.isStatic = true;
        this.staticBodies.push(body);
        return body;
    }

    setWalls(segments) {
        this.wallSegments = segments;
    }

    fixedUpdate(dt) {
        // Apply gravity
        for (const b of this.bodies) {
            if (b.isStatic || b.finished || b.eliminated) continue;
            b.vy += CONFIG.GRAVITY * dt;
            b.vx *= CONFIG.FRICTION_AIR;
            b.vy *= CONFIG.FRICTION_AIR;
            const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
            if (speed > CONFIG.MAX_SPEED) {
                b.vx = (b.vx / speed) * CONFIG.MAX_SPEED;
                b.vy = (b.vy / speed) * CONFIG.MAX_SPEED;
            }
        }

        // Move bodies (Euler)
        for (const b of this.bodies) {
            if (b.isStatic || b.finished || b.eliminated) continue;
            b.x += b.vx * dt;
            b.y += b.vy * dt;
            b.rotation += b.vx * dt * 0.05;
        }

        // Build spatial grid
        this.grid.clear();
        for (const b of this.bodies) {
            if (!b.isStatic && !b.finished && !b.eliminated) {
                this.grid.insert(b);
            }
        }
        for (const b of this.staticBodies) {
            this.grid.insert(b);
        }

        // Marble-wall collisions
        for (const b of this.bodies) {
            if (b.isStatic || b.finished || b.eliminated) continue;
            this._resolveWallCollisions(b);
        }

        // Marble-static body collisions
        for (const b of this.bodies) {
            if (b.isStatic || b.finished || b.eliminated) continue;
            const nearby = this.grid.getNearby(b);
            for (const other of nearby) {
                if (other === b) continue;
                if (!other.isStatic) continue;
                this._resolveCircleCircle(b, other, other.type === 'bumper');
            }
        }

        // Marble-marble collisions
        for (let i = 0; i < this.bodies.length; i++) {
            const a = this.bodies[i];
            if (a.isStatic || a.finished || a.eliminated) continue;
            const nearby = this.grid.getNearby(a);
            for (const b of nearby) {
                if (b === a || b.isStatic || b.finished || b.eliminated) continue;
                // Only process each pair once (using index)
                if (this.bodies.indexOf(b) > i) continue;
                this._resolveCircleCircle(a, b);
            }
        }

        // Apply rolling friction
        for (const b of this.bodies) {
            if (b.isStatic || b.finished || b.eliminated) continue;
            b.vx *= (1 - b.friction * dt * 10);
            b.vy *= (1 - b.friction * dt * 10);
        }

        // Gentle global friction to help damp micro-bouncing
        for (const b of this.bodies) {
            if (b.isStatic || b.finished || b.eliminated) continue;
            // FRICTION_ROLLING = fraction of speed retained per second → frame-rate independent
            const f = Math.pow(CONFIG.FRICTION_ROLLING, dt);
            b.vx *= f;
            b.vy *= f;
        }

        // Speed threshold: kill tiny velocities to prevent perpetual jitter
        for (const b of this.bodies) {
            if (b.isStatic || b.finished || b.eliminated) continue;
            const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
            if (spd < 3) { b.vx = 0; b.vy = 0; }
        }

        // Stuck detection: strong kick if same spot >2s
        const now = performance.now();
        for (const b of this.bodies) {
            if (b.isStatic || b.finished || b.eliminated) continue;
            if (!b._stuckData) b._stuckData = { lastX: b.x, lastY: b.y, timer: 0, lastTime: now };
            const sd = b._stuckData;
            const moved = Math.abs(b.x - sd.lastX) + Math.abs(b.y - sd.lastY);
            if (moved < 2) {
                sd.timer += (now - sd.lastTime) / 1000;
                if (sd.timer > 2.0) {
                    b.vx += (Math.random() - 0.5) * 400;
                    b.vy -= 200 + Math.random() * 150; // strong upward burst
                    sd.timer = 0;
                }
            } else {
                sd.timer = 0;
            }
            sd.lastX = b.x; sd.lastY = b.y; sd.lastTime = now;
        }
    }

    _resolveWallCollisions(body) {
        const r = body.radius;
        const physDt = CONFIG.PHYSICS_DT;
        for (const seg of this.wallSegments) {
            // Y-range pre-check: skip segments far from marble (tối ưu lag)
            const minSegY = Math.min(seg.y1, seg.y2);
            const maxSegY = Math.max(seg.y1, seg.y2);
            if (maxSegY < body.y - r - 15) continue;
            if (minSegY > body.y + r + 15) break;

            const ax = seg.x1, ay = seg.y1, bx = seg.x2, by = seg.y2;
            const dx = bx - ax, dy = by - ay;
            const lenSq = dx * dx + dy * dy;
            if (lenSq < 0.001) continue;
            let t = ((body.x - ax) * dx + (body.y - ay) * dy) / lenSq;
            t = Math.max(0, Math.min(1, t));
            const cx = ax + t * dx, cy = ay + t * dy;
            const distX = body.x - cx, distY = body.y - cy;
            const dist = Math.sqrt(distX * distX + distY * distY);
            if (dist < r && dist > 0) {
                const overlap = r - dist;
                const nx = distX / dist, ny = distY / dist;
                body.x += nx * overlap;
                body.y += ny * overlap;
                const relV = body.vx * nx + body.vy * ny;
                if (relV < 0) {
                    const speed = Math.abs(relV);
                    if (speed < 60) {
                        const tanX = -ny, tanY = nx;
                        const tanV = body.vx * tanX + body.vy * tanY;
                        body.vx = tanV * tanX;
                        body.vy = tanV * tanY;
                        const gPush = CONFIG.GRAVITY * physDt * ny;
                        body.vx -= gPush * nx;
                        body.vy -= gPush * ny;
                        body.vx += speed * 0.3 * tanX;
                        body.vy += speed * 0.3 * tanY;
                    } else {
                        const luck = body.luck || 0.5;
                        const angle = (Math.random() - 0.5) * 0.15 * (1.2 - luck * 0.4);
                        const ca = Math.cos(angle), sa = Math.sin(angle);
                        const rnx = nx * ca - ny * sa;
                        const rny = nx * sa + ny * ca;
                        body.vx -= (1 + CONFIG.BOUNCE_DAMPING) * relV * rnx;
                        body.vy -= (1 + CONFIG.BOUNCE_DAMPING) * relV * rny;
                        if (speed > 50 && soundManager) {
                            soundManager.playBounce(Math.min(speed / 500, 0.5));
                        }
                    }
                }
            }
        }
    }

    _resolveCircleCircle(a, b, isBumper = false) {
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const sumR = a.radius + b.radius;
        if (dist >= sumR || dist < 0.001) return;
        const overlap = sumR - dist;
        const nx = dx / dist, ny = dy / dist;
        const totalMass = (a.isStatic ? 0 : 1 / a.mass) + (b.isStatic ? 0 : 1 / b.mass);
        if (!a.isStatic) {
            const pushA = overlap * (b.isStatic ? 1 : (1 / a.mass) / totalMass);
            a.x -= nx * pushA;
            a.y -= ny * pushA;
        }
        if (!b.isStatic) {
            const pushB = overlap * (a.isStatic ? 1 : (1 / b.mass) / totalMass);
            b.x += nx * pushB;
            b.y += ny * pushB;
        }

        const relVx = (a.isStatic ? 0 : a.vx) - (b.isStatic ? 0 : b.vx);
        const relVy = (a.isStatic ? 0 : a.vy) - (b.isStatic ? 0 : b.vy);
        const relVn = relVx * nx + relVy * ny;
        if (relVn < 0) return; // separating

        const bounce = isBumper ? 1.2 : Math.min(a.bounce || 0.5, b.bounce || 0.5);
        const j = (1 + bounce) * relVn / totalMass;
        const isMarbleVsStatic = a.isStatic !== b.isStatic;
        const luck = (!a.isStatic ? (a.luck || 0.5) : (b.luck || 0.5));

        if (relVn < 20 && isMarbleVsStatic) {
            // RESTING trên vật cản: trượt ngang, không nảy
            const tanX = -ny, tanY = nx;
            const vTanA = a.isStatic ? 0 : (a.vx * tanX + a.vy * tanY);
            const vTanB = b.isStatic ? 0 : (b.vx * tanX + b.vy * tanY);
            if (!a.isStatic) {
                a.vx = vTanA * tanX + relVn * 0.4 * tanX;
                a.vy = vTanA * tanY + relVn * 0.4 * tanY;
            }
            if (!b.isStatic) {
                b.vx = vTanB * tanX + relVn * 0.4 * tanX;
                b.vy = vTanB * tanY + relVn * 0.4 * tanY;
            }
        } else {
            // DYNAMIC BOUNCE — nảy với perturbation
            const spread = isBumper ? 0.3 : 0.15;
            const rAngle = (Math.random() - 0.5) * spread * (1.3 - luck * 0.6);
            const ca = Math.cos(rAngle), sa = Math.sin(rAngle);
            const rnx = nx * ca - ny * sa;
            const rny = nx * sa + ny * ca;
            if (!a.isStatic) {
                a.vx -= j * rnx / a.mass;
                a.vy -= j * rny / a.mass;
            }
            if (!b.isStatic) {
                b.vx += j * rnx / b.mass;
                b.vy += j * rny / b.mass;
            }
        }

        if (isBumper) {
            if (soundManager) soundManager.playBounce(0.4);
            if (particleSystem && CONFIG.PARTICLE_ENABLED) {
                particleSystem.emit((a.x + b.x) / 2, (a.y + b.y) / 2, 5, {
                    color: '#ffd93d', speed: 100, life: 0.5, size: 3
                });
            }
        }
    }
}

// SECTION 7: TRACK GENERATOR

function generateTrack(seed) {
    const rng = createRNG(seed);
    const track = {
        walls: { left: [], right: [] },
        obstacles: [],
        checkpoints: [],
        finishLine: 0,
        startZone: { yStart: 100, yEnd: 300 },
        wallSegments: [],
        decorations: [],
    };

    const trackLen = CONFIG.TRACK_LENGTH;
    const baseWidth = CONFIG.TRACK_WIDTH;
    const segments = 40;
    const segH = trackLen / segments;

    // Generate smooth wall profiles
    let leftX = -baseWidth / 2;
    let rightX = baseWidth / 2;

    const leftWalls = [];
    const rightWalls = [];
    let prevLeft = leftX;
    let prevRight = rightX;

    for (let i = 0; i <= segments; i++) {
        const y = i * segH;
        const t = i / segments;

        // Sinusoidal variation — tăng biên độ theo track width để wall vẫn uốn lượn
        const variation = rng.nextRange(-100, 100) * (1 - Math.abs(t - 0.5) * 0.8);
        const widthVar = rng.nextRange(-80, 80) * (1 - Math.abs(t - 0.5));

        const smoothFactor = 0.3;
        let targetLeft = -baseWidth / 2 + variation - widthVar / 2;
        let targetRight = baseWidth / 2 + variation + widthVar / 2;

        // Ensure minimum width (rộng hơn để bi không bị kẹt)
        const minWidth = 300;
        if (targetRight - targetLeft < minWidth) {
            const center = (targetLeft + targetRight) / 2;
            targetLeft = center - minWidth / 2;
            targetRight = center + minWidth / 2;
        }

        const lx = prevLeft + (targetLeft - prevLeft) * smoothFactor + rng.nextRange(-5, 5);
        const rx = prevRight + (targetRight - prevRight) * smoothFactor + rng.nextRange(-5, 5);

        leftWalls.push({ x: lx, y });
        rightWalls.push({ x: rx, y });
        prevLeft = lx;
        prevRight = rx;
    }

    track.walls.left = leftWalls;
    track.walls.right = rightWalls;

    // Build wall segments for collision
    for (let i = 0; i < leftWalls.length - 1; i++) {
        track.wallSegments.push({
            x1: leftWalls[i].x, y1: leftWalls[i].y,
            x2: leftWalls[i + 1].x, y2: leftWalls[i + 1].y,
            isLeft: true
        });
        track.wallSegments.push({
            x1: rightWalls[i].x, y1: rightWalls[i].y,
            x2: rightWalls[i + 1].x, y2: rightWalls[i + 1].y,
            isLeft: false
        });
    }

    // Add a bottom wall across the bottom
    const lastL = leftWalls[leftWalls.length - 1];
    const lastR = rightWalls[rightWalls.length - 1];
    track.wallSegments.push({
        x1: lastL.x, y1: lastL.y,
        x2: lastR.x, y2: lastR.y
    });

    // Generate obstacles for each segment
    for (let i = 2; i < segments - 1; i++) {
        const y = i * segH;
        const lw = leftWalls[i];
        const rw = rightWalls[i];
        const segWidth = rw.x - lw.x;
        const midX = (lw.x + rw.x) / 2;

        const typeRoll = rng.next();
        const obstacleType = typeRoll < 0.10 ? 'funnel' :
                             typeRoll < 0.22 ? 'pegs' :
                             typeRoll < 0.32 ? 'spinner' :
                             typeRoll < 0.40 ? 'pendulum' :
                             typeRoll < 0.52 ? 'bumpers' :
                             typeRoll < 0.60 ? 'jump-pad' :
                             typeRoll < 0.67 ? 'moving-platform' :
                             typeRoll < 0.74 ? 'split-path' :
                             typeRoll < 0.82 ? 'rotating-gate' :
                             typeRoll < 0.90 ? 'scurve' :
                             typeRoll < 0.96 ? 'gravity-drop' :
                             'checkpoint';

        const segMidY = y + segH / 2;

        switch (obstacleType) {
            case 'funnel': {
                const gap = rng.nextRange(80, 200);
                const funnelTop = segWidth * 0.8;
                track.obstacles.push({
                    type: 'funnel', y: segMidY, segW: segWidth,
                    gap: gap, midX: midX, height: segH * 0.6
                });
                // Add funnel wall segments
                const fY0 = segMidY - segH * 0.3;
                const fY1 = segMidY;
                const fY2 = segMidY + segH * 0.3;
                const gapHalf = gap / 2;
                track.wallSegments.push({ x1: lw.x + segWidth * 0.1, y1: fY0, x2: midX - gapHalf, y2: fY1 });
                track.wallSegments.push({ x1: rw.x - segWidth * 0.1, y1: fY0, x2: midX + gapHalf, y2: fY1 });
                track.wallSegments.push({ x1: midX - gapHalf, y1: fY1, x2: lw.x + segWidth * 0.1, y2: fY2 });
                track.wallSegments.push({ x1: midX + gapHalf, y1: fY1, x2: rw.x - segWidth * 0.1, y2: fY2 });
                break;
            }
            case 'pegs': {
                const numPegs = rng.nextInt(8, 18);
                for (let p = 0; p < numPegs; p++) {
                    const px = lw.x + rng.nextRange(30, segWidth - 30);
                    const py = segMidY - segH * 0.4 + rng.nextRange(0, segH * 0.8);
                    track.obstacles.push({
                        type: 'peg', x: px, y: py, radius: rng.nextRange(10, 22)
                    });
                }
                break;
            }
            case 'spinner': {
                track.obstacles.push({
                    type: 'spinner', x: midX, y: segMidY, radius: segWidth * 0.35,
                    arms: rng.nextInt(3, 6), speed: rng.nextRange(2, 5) * (rng.next() > 0.5 ? 1 : -1),
                    angle: rng.nextRange(0, Math.PI * 2)
                });
                break;
            }
            case 'pendulum': {
                track.obstacles.push({
                    type: 'pendulum', x: midX, y: segMidY - segH * 0.3,
                    length: segH * 0.45, ballRadius: 16, swingSpeed: rng.nextRange(2, 4.5),
                    angle: rng.nextRange(-0.8, 0.8)
                });
                break;
            }
            case 'bumpers': {
                const numBump = rng.nextInt(4, 8);
                for (let p = 0; p < numBump; p++) {
                    track.obstacles.push({
                        type: 'bumper', x: lw.x + rng.nextRange(40, segWidth - 40),
                        y: segMidY - segH * 0.35 + rng.nextRange(0, segH * 0.7),
                        radius: rng.nextRange(16, 30), bounce: 1.3
                    });
                }
                break;
            }
            case 'jump-pad': {
                track.obstacles.push({
                    type: 'jump-pad', x: midX, y: segMidY,
                    width: segWidth * 0.35, boost: rng.nextRange(-500, -800)
                });
                break;
            }
            case 'moving-platform': {
                track.obstacles.push({
                    type: 'moving-platform', x: midX, y: segMidY,
                    width: segWidth * 0.5, height: 12,
                    travel: segWidth * 0.35, speed: rng.nextRange(60, 140),
                    phase: rng.nextRange(0, Math.PI * 2)
                });
                break;
            }
            case 'split-path': {
                const numPaths = rng.nextInt(2, 3);
                const paths = [];
                const pathWidth = segWidth / numPaths;
                for (let p = 0; p < numPaths; p++) {
                    const pLx = lw.x + p * pathWidth + 10;
                    const pRx = lw.x + (p + 1) * pathWidth - 10;
                    paths.push({ left: pLx, right: pRx });
                    // Add wall segments for split
                    if (p > 0) {
                        track.wallSegments.push({ x1: pLx - 5, y1: segMidY - segH * 0.4, x2: pLx - 5, y2: segMidY + segH * 0.4 });
                    }
                }
                track.obstacles.push({
                    type: 'split-path', y: segMidY, height: segH * 0.8,
                    paths: paths, numPaths: numPaths, midX: midX
                });
                break;
            }
            case 'rotating-gate': {
                track.obstacles.push({
                    type: 'rotating-gate', x: midX, y: segMidY,
                    width: segWidth * 0.6, bars: rng.nextInt(2, 5),
                    speed: rng.nextRange(2, 5), angle: rng.nextRange(0, Math.PI)
                });
                break;
            }
            case 'scurve': {
                track.obstacles.push({
                    type: 'scurve', y: segMidY, height: segH * 0.8,
                    amplitude: segWidth * 0.25, frequency: 2.5, midX: midX
                });
                // Add S-curve wall override segments
                const steps = 10;
                for (let s = 0; s < steps; s++) {
                    const t0 = s / steps, t1 = (s + 1) / steps;
                    const y0 = segMidY - segH * 0.4 + t0 * segH * 0.8;
                    const y1 = segMidY - segH * 0.4 + t1 * segH * 0.8;
                    const a0 = Math.sin(t0 * Math.PI * 2 * 2) * segWidth * 0.25;
                    const a1 = Math.sin(t1 * Math.PI * 2 * 2) * segWidth * 0.25;
                    const l0 = lw.x + a0 + 10, r0 = rw.x + a0 - 10;
                    const l1 = lw.x + a1 + 10, r1 = rw.x + a1 - 10;
                    // Add wall segments that override existing ones
                    track.wallSegments.push({ x1: l0, y1: y0, x2: l1, y2: y1 });
                    track.wallSegments.push({ x1: r0, y1: y0, x2: r1, y2: y1 });
                }
                break;
            }
            case 'gravity-drop': {
                track.obstacles.push({
                    type: 'gravity-drop', y: segMidY, height: segH * 0.6,
                    width: segWidth, midX: midX, boost: 600
                });
                break;
            }
            case 'checkpoint': {
                track.checkpoints.push({
                    y: segMidY, name: `CP${track.checkpoints.length + 1}`, index: track.checkpoints.length
                });
                break;
            }
        }
    }

    // Add checkpoints along the track
    const numCP = 8;
    for (let i = 0; i < numCP; i++) {
        const cpY = (i + 1) * (trackLen / (numCP + 1));
        if (!track.checkpoints.find(cp => Math.abs(cp.y - cpY) < 100)) {
            track.checkpoints.push({
                y: cpY, name: `CP${track.checkpoints.length + 1}`, index: track.checkpoints.length
            });
        }
    }
    track.checkpoints.sort((a, b) => a.y - b.y);
    track.checkpoints.forEach((cp, i) => { cp.index = i; cp.name = `CP${i + 1}`; });

    track.finishLine = trackLen - 50;

    // Add finish lane decorations
    track.decorations.push({ type: 'finish-line', y: track.finishLine });

    // Add start zone
    const cols = Math.min(10, CONFIG.MARBLE_RADIUS); // approximate
    const rows = 2; // max rows cho 12 bi × 10 cột
    const gridH = rows * CONFIG.MARBLE_RADIUS * 3 + 30;
    track.startZone = { yStart: 80, yEnd: 80 + gridH };
    track.startGrid = { cols: 10, yBase: CONFIG.TRACK_LENGTH * 0.02, height: gridH };

    return track;
}
