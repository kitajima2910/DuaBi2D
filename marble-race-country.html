let nextMarbleId = 0;

function createMarble(countryIndex, x, y, rng) {
    const country = COUNTRIES[countryIndex];
    return {
        id: nextMarbleId++,
        countryIndex: countryIndex,
        name: country.name,
        x: x,
        y: y,
        vx: 0,
        vy: 0,
        radius: CONFIG.MARBLE_RADIUS,
        mass: rng.nextRange(0.8, 1.2),
        bounce: rng.nextRange(0.3, 0.7),
        friction: rng.nextRange(0.015, 0.035),
        grip: rng.nextRange(0.7, 1.0),
        luck: rng.nextRange(0.3, 1.0),
        rotation: 0,
        trail: [],
        finished: false,
        eliminated: false,
        checkpointTimes: [],
        finishTime: null,
        place: null,
        maxSpeedReached: 0,
        collisions: 0,
        texture: null,
    };
}

function initMarbles(count, seed) {
    const rng = createRNG(seed * 7 + 13);
    const marbles = [];
    const selectedIndices = [];
    // Pick unique countries (or allow repeats if count > countries length)
    const pool = [...Array(COUNTRIES.length).keys()];
    for (let i = 0; i < count; i++) {
        let idx;
        if (pool.length > 0 && i < COUNTRIES.length) {
            const pi = rng.nextInt(0, pool.length - 1);
            idx = pool[pi];
            pool.splice(pi, 1);
        } else {
            idx = rng.nextInt(0, COUNTRIES.length - 1);
        }
        selectedIndices.push(idx);
    }

    // Shuffle for start positions
    for (let i = selectedIndices.length - 1; i > 0; i--) {
        const j = rng.nextInt(0, i);
        [selectedIndices[i], selectedIndices[j]] = [selectedIndices[j], selectedIndices[i]];
    }

    // Starting grid: arrange marbles in neat rows, centered on track
    const trackWidth = CONFIG.TRACK_WIDTH;
    const marbleR = CONFIG.MARBLE_RADIUS;
    const cols = Math.min(15, count);                   // max 15 per row (track rộng hơn)
    const rows = Math.ceil(count / cols);
    const cellW = Math.min(trackWidth / cols, marbleR * 3.2);
    const cellH = marbleR * 3;
    const gridW = cols * cellW;
    const startX = -gridW / 2 + cellW / 2;
    const startY = CONFIG.TRACK_LENGTH * 0.02;          // top of track

    for (let i = 0; i < count; i++) {
        const row = Math.floor(i / cols);
        const col = i % cols;
        const x = startX + col * cellW + rng.nextRange(-2, 2);
        const y = startY + row * cellH + (col % 2) * 6; // stagger alternate cols
        const marble = createMarble(selectedIndices[i], x, y, rng);
        marble.texture = renderFlagTexture(COUNTRIES[selectedIndices[i]], CONFIG.MARBLE_RADIUS * 2);
        marbles.push(marble);
    }
    return marbles;
}

// ============================================================
// SECTION 9: PARTICLE SYSTEM
// ============================================================

class Particle {
    constructor() {
        this.x = 0; this.y = 0; this.vx = 0; this.vy = 0;
        this.life = 0; this.maxLife = 1; this.size = 4;
        this.color = '#ffffff'; this.gravity = 0;
        this.type = 'rect'; this.alpha = 1;
        this.active = false;
    }
}

class ParticleSystem {
    constructor(maxParticles = CONFIG.MAX_PARTICLES) {
        this.particles = [];
        for (let i = 0; i < maxParticles; i++) {
            this.particles.push(new Particle());
        }
        this.maxParticles = maxParticles;
    }

    emit(x, y, count, config) {
        const c = config || {};
        const color = c.color || '#ffffff';
        const speed = c.speed || 100;
        const life = c.life || 0.5;
        const size = c.size || 3;
        const gravity = c.gravity || 0;
        const type = c.type || 'rect';

        for (let i = 0; i < count; i++) {
            const p = this._getInactive();
            if (!p) break;
            const angle = Math.random() * Math.PI * 2;
            const spd = speed * (0.3 + Math.random() * 0.7);
            p.x = x + (Math.random() - 0.5) * 10;
            p.y = y + (Math.random() - 0.5) * 10;
            p.vx = Math.cos(angle) * spd;
            p.vy = Math.sin(angle) * spd;
            p.life = life * (0.5 + Math.random() * 0.5);
            p.maxLife = p.life;
            p.size = size * (0.5 + Math.random() * 0.5);
            p.color = color;
            p.gravity = gravity;
            p.type = type;
            p.alpha = 1;
            p.active = true;
        }
    }

    _getInactive() {
        for (const p of this.particles) {
            if (!p.active) return p;
        }
        // Recycle oldest
        return this.particles[0];
    }

    update(dt) {
        for (const p of this.particles) {
            if (!p.active) continue;
            p.life -= dt;
            if (p.life <= 0) { p.active = false; continue; }
            p.vy += p.gravity * dt;
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.alpha = Math.max(0, p.life / p.maxLife);
        }
    }

    render(ctx, camera) {
        for (const p of this.particles) {
            if (!p.active) continue;
            const sx = camera.screenX(p.x);
            const sy = camera.screenY(p.y);
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            if (p.type === 'circle') {
                ctx.beginPath();
                ctx.arc(sx, sy, p.size, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillRect(sx - p.size / 2, sy - p.size / 2, p.size, p.size);
            }
        }
        ctx.globalAlpha = 1;
    }

    emitTrail(marble, camera) {
        if (!CONFIG.PARTICLE_ENABLED) return;
        const speed = Math.sqrt(marble.vx * marble.vx + marble.vy * marble.vy);
        if (speed > 100 && Math.random() < 0.3) {
            this.emit(marble.x, marble.y, 1, {
                color: COUNTRIES[marble.countryIndex].colors[0],
                speed: 20, life: 0.4, size: 2, gravity: 20
            });
        }
    }

    emitCollision(x, y, intensity = 1) {
        if (!CONFIG.PARTICLE_ENABLED) return;
        this.emit(x, y, Math.floor(5 * intensity), {
            color: '#ffd93d', speed: 150 * intensity, life: 0.4, size: 3, gravity: 100
        });
        this.emit(x, y, Math.floor(3 * intensity), {
            color: '#ff6b6b', speed: 100 * intensity, life: 0.3, size: 2, gravity: 50
        });
    }

    emitConfetti(x, y, count = 30) {
        if (!CONFIG.PARTICLE_ENABLED) return;
        const colors = ['#ff6b6b', '#ffd93d', '#6bcbff', '#00b894', '#a29bfe', '#fd79a8', '#fdcb6e'];
        for (let i = 0; i < count; i++) {
            const p = this._getInactive();
            if (!p) break;
            const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI;
            const spd = 100 + Math.random() * 200;
            p.x = x + (Math.random() - 0.5) * 50;
            p.y = y;
            p.vx = Math.cos(angle) * spd;
            p.vy = Math.sin(angle) * spd;
            p.life = 1.5 + Math.random() * 1.5;
            p.maxLife = p.life;
            p.size = 4 + Math.random() * 4;
            p.color = colors[Math.floor(Math.random() * colors.length)];
            p.gravity = 200;
            p.type = 'rect';
            p.alpha = 1;
            p.active = true;
        }
    }
}

// ============================================================
// SECTION 10: CAMERA SYSTEM
// ============================================================

class Camera {
    constructor() {
        this.x = 0;
        this.y = 0;
        this.targetX = 0;
        this.targetY = 0;
        this.shakeX = 0;
        this.shakeY = 0;
        this.shakeIntensity = 0;
        this.zoom = 1;
    }

    update(dt, marbles, canvasW, canvasH) {
        // During countdown: lock camera on the starting grid
        if (gameState === GameState.COUNTDOWN && marbles.length > 0) {
            // Find the center of the starting grid
            let sumY = 0, count = 0;
            for (const m of marbles) {
                if (!m.eliminated) { sumY += m.y; count++; }
            }
            const avgY = count > 0 ? sumY / count : marbles[0].y;
            this.targetX = 0;
            this.targetY = avgY - canvasH * 0.45;
            this.targetY = Math.max(this.targetY, -100);
        } else {
            // Find leading marble (most progress = highest y)
            let leadY = -Infinity;
            let leadX = 0;
            let found = false;
            for (const m of marbles) {
                if (m.finished || m.eliminated) continue;
                if (m.y > leadY) {
                    leadY = m.y;
                    leadX = m.x;
                    found = true;
                }
            }
            if (!found) {
                for (const m of marbles) {
                    if (m.y > leadY) { leadY = m.y; leadX = m.x; }
                }
            }
            this.targetX = 0;
            this.targetY = leadY - canvasH * 0.4;
        }

        // Clamp (cho phép camera xuống sát cuối track)
        this.targetY = Math.max(this.targetY, -200);
        this.targetY = Math.min(this.targetY, CONFIG.TRACK_LENGTH + 50);

        // Smooth lerp
        const smooth = CONFIG.CAMERA_SMOOTH;
        this.x += (this.targetX - this.x) * smooth;
        this.y += (this.targetY - this.y) * smooth;

        // Camera shake decay
        if (this.shakeIntensity > 0) {
            this.shakeX = (Math.random() - 0.5) * this.shakeIntensity;
            this.shakeY = (Math.random() - 0.5) * this.shakeIntensity;
            this.shakeIntensity *= 0.9;
            if (this.shakeIntensity < 0.5) this.shakeIntensity = 0;
        } else {
            this.shakeX = 0;
            this.shakeY = 0;
        }
    }

    shake(intensity) {
        this.shakeIntensity = Math.max(this.shakeIntensity, intensity);
    }

    screenX(x) {
        return x - this.x + this.shakeX;
    }

    screenY(y) {
        return y - this.y + this.shakeY;
    }

    isVisible(x, y, margin = 100) {
        const sx = x - this.x;
        const sy = y - this.y;
        // Canvas render applies ctx.translate(canvasW/2, 0), so screenX = canvasW/2 + sx
        return sx > -canvasW / 2 - margin && sx < canvasW / 2 + margin
            && sy > -margin && sy < canvasH + margin;
    }
}

// ============================================================
// SECTION 11: GAME MODES
// ============================================================

class GameMode {
    constructor() {
        this.mode = 'tournament';
        this.tournamentStandings = [];
        this.currentRace = 0;
        this.totalRaces = 4;
        this.survivorCheckpoint = 0;
    }

    setMode(mode) {
        this.mode = mode;
        this.currentRace = 0;
        this.survivorCheckpoint = 0;
        if (mode === 'tournament') {
            this.tournamentStandings = [];
        }
    }

    getPointsForPlace(place, total) {
        if (this.mode === 'survival') {
            return place === 1 ? 1 : 0;
        }
        const pointsTable = [25, 18, 15, 12, 10, 8, 6, 5, 4, 3, 2, 1];
        return pointsTable[place - 1] || 0;
    }

    updateTournament(marbles) {
        if (this.mode !== 'tournament' && this.mode !== 'career') return;
        const sorted = [...marbles].filter(m => m.finishTime !== null).sort((a, b) => a.finishTime - b.finishTime);
        sorted.forEach((m, i) => {
            let entry = this.tournamentStandings.find(e => e.id === m.id);
            if (!entry) {
                entry = { id: m.id, name: m.name, countryIndex: m.countryIndex, points: 0, best: Infinity };
                this.tournamentStandings.push(entry);
            }
            entry.points += this.getPointsForPlace(i + 1, sorted.length);
            if (m.finishTime < entry.best) entry.best = m.finishTime;
        });
    }

    getEliminatedMarbles(marbles, checkpointIndex) {
        if (this.mode !== 'survival') return [];
        const active = marbles.filter(m => !m.eliminated && !m.finished);
        if (active.length <= 1) return [];
        // Find marbles that passed the checkpoint but are slowest
        const passed = active.filter(m => m.checkpointTimes.length > checkpointIndex);
        if (passed.length < 2) return [];
        passed.sort((a, b) => (a.finishTime || a.y) - (b.finishTime || b.y));
        return [passed[passed.length - 1]]; // Eliminate last
    }
}

// Will be integrated into main game
function formatTime(seconds) {
    if (seconds === null || seconds === undefined) return '--:--';
    const mins = Math.floor(seconds / 60);
    const secs = (seconds % 60).toFixed(2);
    return `${mins}:${secs.padStart(5, '0')}`;
}

let fpsTimer = 0;
let currentFps = 60;
let countdownTimer = 0;
let countdownValue = 4;
let countdownActive = false;
let raceStartTime = 0;
let raceTime = 0;
let leaderboardCache = [];
let lastCommentatorChange = 0;
let lastCrowdReaction = 0;
let commentatorText = 'Ready!';
let blvEnabled = true;
let blvSpeechTimer = null;
let canvasW = 800, canvasH = 600;
let renderAlpha = 0;
let animationId = null;
let isRunning = false;

function initGame() {
    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');
    soundManager = new SoundManager();
    particleSystem = new ParticleSystem();
    camera = new Camera();
    gameMode = new GameMode();

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    setupUI();
    resetGameState();

    // BLV — pre-load English voices
    if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => updateBLVStatus();
    }
    updateBLVStatus();

    isRunning = true;
    lastTime = performance.now();
    if (animationId) cancelAnimationFrame(animationId);
    gameLoop(lastTime);
}

function resizeCanvas() {
    const container = document.getElementById('game-container');
    const rect = container.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvasW = rect.width;
    canvasH = rect.height;
    canvas.width = canvasW * dpr;
    canvas.height = canvasH * dpr;
    canvas.style.width = canvasW + 'px';
    canvas.style.height = canvasH + 'px';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
}

function resetGameState() {
    gameState = GameState.MENU;
    accumulator = 0;
    countdownActive = false;
    raceStartTime = 0;
    raceTime = 0;
    nextMarbleId = 0;
    leaderboardCache = [];
    if (soundManager) soundManager.stopCrowd();
    updateUI();
}

function startRace() {
    // Đóng overlay và countdown nếu đang hiện
    document.getElementById('overlay').classList.remove('active');
    document.getElementById('countdown').classList.remove('active');
    document.getElementById('pauseBtn').textContent = 'TẠM DỪNG';
    document.getElementById('pauseBtn').disabled = false;
    document.getElementById('pauseBtn').textContent = 'TẠM DỪNG';

    // Career mode: override settings
    if (gameMode.mode === 'career') {
        const league = CAREER_LEAGUES[careerGetLeagueNum() - 1];
        document.getElementById('marbleCount').value = league.marbleCount;
        document.getElementById('marbleCountDisplay').textContent = league.marbleCount;
        const seedBase = league.seedMin + (careerGetProfile().currentTournament % (league.seedMax - league.seedMin));
        document.getElementById('trackSeed').value = Math.min(seedBase + gameMode.currentRace, league.seedMax);
        document.getElementById('marbleCount').disabled = true;
        document.getElementById('trackSeed').disabled = true;
        document.getElementById('randomSeedBtn').disabled = true;
    } else {
        document.getElementById('marbleCount').disabled = false;
        document.getElementById('trackSeed').disabled = false;
        document.getElementById('randomSeedBtn').disabled = false;
    }

    // Re-read count and seed in case career mode overrode them
    const finalCount = parseInt(document.getElementById('marbleCount').value);
    const finalSeed = parseInt(document.getElementById('trackSeed').value) || 42;

    soundManager.init();
    soundManager.resume();

    physicsEngine = new PhysicsEngine();
    particleSystem = new ParticleSystem();
    camera = new Camera();

    // Generate track
    track = generateTrack(finalSeed);

    // Create marbles
    marbles = initMarbles(finalCount, finalSeed);

    // Position camera on the starting grid immediately
    if (marbles.length > 0) {
        let sumY = 0, cnt = 0;
        for (const m of marbles) { sumY += m.y; cnt++; }
        const avgY = cnt > 0 ? sumY / cnt : marbles[0].y;
        camera.targetY = avgY - (canvasH || 600) * 0.45;
        camera.targetY = Math.max(camera.targetY, -100);
        camera.y = camera.targetY; // snap immediately, no lerp delay
        camera.x = 0;
        camera.targetX = 0;
    }

    // Add marbles to physics
    for (const m of marbles) {
        physicsEngine.addBody(m);
    }

    // Add obstacles to physics
    for (const obs of track.obstacles) {
        if (obs.type === 'peg') {
            physicsEngine.addStaticBody({
                x: obs.x, y: obs.y, radius: obs.radius,
                isStatic: true, type: 'peg', mass: 9999,
                bounce: 0.6, finished: false, eliminated: false,
                vx: 0, vy: 0, rotation: 0,
            });
        } else if (obs.type === 'bumper') {
            physicsEngine.addStaticBody({
                x: obs.x, y: obs.y, radius: obs.radius,
                isStatic: true, type: 'bumper', mass: 9999,
                bounce: obs.bounce || 1.2, finished: false, eliminated: false,
                vx: 0, vy: 0, rotation: 0,
            });
        } else if (obs.type === 'spinner') {
            obs._bodies = [];
            for (let i = 0; i < obs.arms; i++) {
                const a = obs.angle + (i * Math.PI * 2 / obs.arms);
                const body = {
                    x: obs.x + Math.cos(a) * obs.radius,
                    y: obs.y + Math.sin(a) * obs.radius,
                    radius: 8, isStatic: true, type: 'spinner', mass: 9999,
                    bounce: 0.6, finished: false, eliminated: false,
                    vx: 0, vy: 0, rotation: 0,
                };
                physicsEngine.addStaticBody(body);
                obs._bodies.push(body);
            }
        } else if (obs.type === 'pendulum') {
            obs._body = {
                x: obs.x + Math.sin(obs.angle) * obs.length,
                y: obs.y + Math.cos(obs.angle) * obs.length,
                radius: obs.ballRadius, isStatic: true, type: 'pendulum', mass: 9999,
                bounce: 0.4, finished: false, eliminated: false,
                vx: 0, vy: 0, rotation: 0,
            };
            physicsEngine.addStaticBody(obs._body);
        } else if (obs.type === 'moving-platform') {
            obs._bodies = [];
            const count = Math.max(2, Math.floor(obs.width / 30));
            for (let i = 0; i < count; i++) {
                const bx = obs.x - obs.width / 2 + obs.width * ((i + 0.5) / count);
                const body = {
                    x: bx, y: obs.y, radius: obs.height / 2,
                    isStatic: true, type: 'platform', mass: 9999,
                    bounce: 0.3, finished: false, eliminated: false,
                    vx: 0, vy: 0, rotation: 0,
                };
                physicsEngine.addStaticBody(body);
                obs._bodies.push(body);
            }
        } else if (obs.type === 'rotating-gate') {
            obs._bodies = [];
            for (let i = 0; i < obs.bars; i++) {
                const a = obs.angle + (i * Math.PI / obs.bars);
                const len = obs.width / 2;
                const body = {
                    x: obs.x + Math.cos(a) * len * 0.6,
                    y: obs.y + Math.sin(a) * len * 0.6,
                    radius: 6, isStatic: true, type: 'gate', mass: 9999,
                    bounce: 0.5, finished: false, eliminated: false,
                    vx: 0, vy: 0, rotation: 0,
                };
                physicsEngine.addStaticBody(body);
                obs._bodies.push(body);
            }
        } else if (obs.type === 'funnel') {
            obs._bodies = [];
            const halfH = obs.height / 2;
            const w = obs.segW * 0.4;
            const gap = obs.gap;
            const topY = obs.y - halfH;
            const botY = obs.y + halfH;
            const ctrY = obs.y;
            const lx = obs.midX - w;
            const rx = obs.midX + w;
            const clx = obs.midX - gap / 2;
            const crx = obs.midX + gap / 2;
            // 4 diagonal segments: bodies with small radius, dense spacing for overlap
            // Body radius 4 → đệm chỉ 4px, marble gần như chạm sát wall funnel
            // Số body tự động theo độ dài segment để đảm bảo spacing ≤ 2*radius (overlap)
            const bodyRadius = 4;
            const segs = [
                { x1: lx, y1: topY, x2: clx, y2: ctrY },  // upper-left
                { x1: clx, y1: ctrY, x2: lx, y2: botY },   // lower-left
                { x1: rx, y1: topY, x2: crx, y2: ctrY },   // upper-right
                { x1: crx, y1: ctrY, x2: rx, y2: botY },   // lower-right
            ];
            for (const seg of segs) {
                const dx = seg.x2 - seg.x1, dy = seg.y2 - seg.y1;
                const segLen = Math.sqrt(dx * dx + dy * dy);
                const step = bodyRadius * 2; // 8px spacing → overlap
                const count = Math.max(3, Math.ceil(segLen / step));
                for (let i = 0; i < count; i++) {
                    const t = (i + 0.5) / count;
                    const body = {
                        x: seg.x1 + dx * t,
                        y: seg.y1 + dy * t,
                        radius: bodyRadius, isStatic: true, type: 'funnel', mass: 9999,
                        bounce: 0.3, finished: false, eliminated: false,
                        vx: 0, vy: 0, rotation: 0,
                    };
                    physicsEngine.addStaticBody(body);
                    obs._bodies.push(body);
                }
            }
        }
    }

    // Set wall segments for physics
    physicsEngine.setWalls(track.wallSegments);

    // Career mode: mark player marble
    if (gameMode.mode === 'career' && marbles.length > 0) {
        const p = careerGetProfile();
        // Override player marble's country to chosen one
        if (careerHasPlayerCountry()) {
            const pm = marbles[0];
            const ci = p.playerCountry;
            pm.countryIndex = ci;
            pm.name = COUNTRIES[ci].name;
            pm.texture = renderFlagTexture(COUNTRIES[ci], CONFIG.MARBLE_RADIUS * 2);
        }
        marbles.forEach((m, i) => {
            if (i === 0) {
                m.isPlayer = true;
                const eq = p.equipped;
                m.equippedFlagSkin = eq.flagSkin;
                m.equippedTrail = eq.marbleTrail;
            }
        });
    }

    // Start countdown
    gameState = GameState.COUNTDOWN;
    countdownTimer = CONFIG.COUNTDOWN_SECONDS;
    countdownValue = CONFIG.COUNTDOWN_SECONDS;
    countdownActive = true;
    raceStartTime = performance.now();

    updateUI();
    showCountdown(CONFIG.COUNTDOWN_SECONDS);
}

function showCountdown(value) {
    const el = document.getElementById('countdown-text');
    if (value <= 0) {
        el.textContent = 'GO!';
        el.style.color = '#00ff88';
        soundManager.playGo();
    } else {
        el.textContent = value;
        el.style.color = '#fff';
        soundManager.playCountdown();
    }
    document.getElementById('countdown').classList.add('active');
}

function fixedUpdate(dt) {
    if (gameState !== GameState.RACING) return;

    // Save previous positions for render interpolation
    for (const m of marbles) {
        if (m.finished || m.eliminated) continue;
        m.prevX = m.x;
        m.prevY = m.y;
    }

    // Update moving obstacles
    const now = performance.now();
    for (const obs of track.obstacles) {
        if (obs.type === 'spinner' && obs._bodies) {
            obs.angle += obs.speed * dt;
            for (let i = 0; i < obs._bodies.length; i++) {
                const a = obs.angle + (i * Math.PI * 2 / obs.arms);
                obs._bodies[i].x = obs.x + Math.cos(a) * obs.radius;
                obs._bodies[i].y = obs.y + Math.sin(a) * obs.radius;
            }
        }
        if (obs.type === 'pendulum' && obs._body) {
            obs.angle = Math.sin(now * 0.001 * obs.swingSpeed) * 0.8;
            obs._body.x = obs.x + Math.sin(obs.angle) * obs.length;
            obs._body.y = obs.y + Math.cos(obs.angle) * obs.length;
        }
        if (obs.type === 'moving-platform' && obs._bodies) {
            const prevX = obs.x;
            const t = Math.sin(now * 0.001 * obs.speed * 0.1 + obs.phase);
            obs.x += t * obs.travel * dt * 0.5;
            const dx = obs.x - prevX;
            for (const b of obs._bodies) b.x += dx;
        }
        if (obs.type === 'rotating-gate' && obs._bodies) {
            obs.angle += obs.speed * dt;
            const len = obs.width / 2;
            for (let i = 0; i < obs._bodies.length; i++) {
                const a = obs.angle + (i * Math.PI / obs.bars);
                obs._bodies[i].x = obs.x + Math.cos(a) * len * 0.6;
                obs._bodies[i].y = obs.y + Math.sin(a) * len * 0.6;
            }
        }
    }

    // Apply special obstacle effects on marbles
    for (const m of marbles) {
        if (m.finished || m.eliminated) continue;
        for (const obs of track.obstacles) {
            if (obs.type === 'jump-pad') {
                const dx = m.x - obs.x, dy = m.y - obs.y;
                if (Math.abs(dx) < obs.width / 2 + m.radius && Math.abs(dy) < 25 && m.vy > 0) {
                    if (!m._jumpPadData) m._jumpPadData = {};
                    const key = obs.x.toFixed(0) + '_' + obs.y.toFixed(0);
                    if (!m._jumpPadData[key]) m._jumpPadData[key] = { count: 0, lastTime: 0 };
                    const d = m._jumpPadData[key];
                    const now = performance.now();
                    if (now - d.lastTime > 400) {
                        d.count++;
                        d.lastTime = now;
                        if (d.count >= 3) {
                            // Lần thứ 3: bật mạnh ngang để thoát
                            const dir = obs.x > 0 ? -1 : 1;
                            m.vx = dir * (200 + Math.random() * 150);
                            m.vy = -250;
                            d.count = 0;
                            particleSystem.emit(m.x, obs.y, 15, { color: '#ffd93d', speed: 150, life: 0.6, size: 5 });
                        } else {
                            m.vy = obs.boost;
                            m.vx += (Math.random() - 0.5) * 40;
                            particleSystem.emit(m.x, obs.y, 8, { color: '#00ff88', speed: 80, life: 0.4, size: 3 });
                        }
                    }
                }
            }
            if (obs.type === 'gravity-drop') {
                const halfH = obs.height / 2;
                if (m.y > obs.y - halfH && m.y < obs.y + halfH) {
                    const dx = m.x - obs.midX;
                    if (Math.abs(dx) < obs.width / 2) {
                        m.vy += obs.boost * dt;
                        // Particles để thấy rõ hiệu ứng
                        if (Math.random() < 0.15 && CONFIG.PARTICLE_ENABLED) {
                            particleSystem.emit(m.x, m.y, 1, {
                                color: '#ff6b6b', speed: 30, life: 0.3, size: 3, gravity: 100
                            });
                        }
                    }
                }
            }
        }
    }

    // Physics step
    physicsEngine.fixedUpdate(dt);

    // Update trails (max 8 points for performance)
    for (const m of marbles) {
        if (m.finished || m.eliminated) continue;
        m.trail.push({ x: m.x, y: m.y });
        if (m.trail.length > 6) m.trail.shift();
        const speed = Math.sqrt(m.vx * m.vx + m.vy * m.vy);
        if (speed > m.maxSpeedReached) m.maxSpeedReached = speed;

        // Particle trail
        particleSystem.emitTrail(m, camera);
    }

    // Checkpoint detection
    for (const m of marbles) {
        if (m.finished || m.eliminated) continue;
        for (const cp of track.checkpoints) {
            if (m.checkpointTimes.length <= cp.index) {
                if (Math.abs(m.y - cp.y) < 20) {
                    m.checkpointTimes.push(raceTime);
                    if (soundManager) soundManager.playCheckpoint();

                    // Survival mode elimination check
                    if (gameMode.mode === 'survival' && m.checkpointTimes.length === 1) {
                        // Don't eliminate on first checkpoint
                    }
                }
            }
        }
    }

    // Finish line detection
    for (const m of marbles) {
        if (m.finished || m.eliminated) continue;
        if (m.y >= track.finishLine) {
            m.finished = true;
            m.finishTime = raceTime;
            if (soundManager) {
                soundManager.playFinish();
                soundManager.playCheer(0.7);
            }
            particleSystem.emitConfetti(m.x, m.y, 20);
        }
    }

    // Survival mode: eliminate last place at each checkpoint
    if (gameMode.mode === 'survival') {
        const active = marbles.filter(m => !m.eliminated && !m.finished);
        if (active.length <= 1 && marbles.filter(m => m.finished).length > 0) {
            // Last marble standing
        }
        // Check if we should eliminate
        for (const cp of track.checkpoints) {
            const passed = active.filter(m => m.checkpointTimes.length > cp.index);
            if (passed.length >= 2) {
                // Find slowest
                passed.sort((a, b) => a.checkpointTimes[cp.index] - b.checkpointTimes[cp.index]);
                const slowest = passed[passed.length - 1];
                if (!slowest.eliminated && !slowest.finished) {
                    slowest.eliminated = true;
                    if (soundManager) {
                        soundManager.playElimination();
                        soundManager.playGasps();
                    }
                    particleSystem.emit(slowest.x, slowest.y, 15, {
                        color: '#ff0000', speed: 150, life: 0.6, size: 4
                    });
                }
            }
        }
    }

    // Check if race is finished
    const finished = marbles.filter(m => m.finished);
    const active = marbles.filter(m => !m.eliminated && !m.finished);

    if (gameState === GameState.RACING) {
        if (active.length === 0 || finished.length === marbles.length) {
            endRace();
        }
        // Tournament: finish after all marbles finish or top 50%
        if (gameMode.mode === 'tournament' && finished.length >= marbles.length * 0.5) {
            // Force finish remaining
            for (const m of active) {
                m.finished = true;
                m.finishTime = raceTime + 10;
            }
            endRace();
        }
    }

    // Update marble rotation
    for (const m of marbles) {
        if (!m.eliminated) m.rotation += m.vx * dt * 0.05;
    }
}

function endRace() {
    gameState = GameState.FINISHED;

    // Sort by finish time
    const sorted = [...marbles].filter(m => m.finishTime !== null).sort((a, b) => a.finishTime - b.finishTime);
    sorted.forEach((m, i) => { m.place = i + 1; });

    // Assign places
    let place = 1;
    for (const m of sorted) { m.place = place++; }
    const dnfs = marbles.filter(m => m.finishTime === null);
    for (const m of dnfs) { m.place = place++; }

    // Update tournament
    gameMode.updateTournament(marbles);

    // Show results
    showResults();
    updateUI();
    // Crowd celebration!
    if (soundManager) {
        soundManager.stopCrowd();
        soundManager.playVictoryFanfare();
    }

    // Career mode rewards & progression
    if (gameMode.mode === 'career') {
        careerRefreshDailyMissions();
        careerRefreshWeeklyMissions();

        const playerMarble = marbles.find(m => m.isPlayer);
        if (playerMarble) {
            const place = playerMarble.place || (marbles.filter(m2 => m2.finishTime !== null && m2.finishTime < playerMarble.finishTime).length + 1);
            const rewards = careerCalculateRaceRewards(place, careerGetLeagueNum());
            careerAddXP(rewards.xp);
            careerAddCoins(rewards.coins);
            careerAddStars(rewards.stars);
            careerRecordRace(place, playerMarble.finishTime, playerMarble.maxSpeed || 0, playerMarble.eliminated);

            // Update missions
            careerUpdateMissionProgress('daily_complete_race', 1);
            if (place <= 3) careerUpdateMissionProgress('daily_top3', 1);
            if (place <= 5) careerUpdateMissionProgress('daily_top5', 1);

            careerSaveProfile();

            // Show career rewards in the results overlay
            setTimeout(() => careerInjectRewardsToResults(rewards), 100);
        }
    }
}

function pauseRace() {
    if (gameState === GameState.RACING) {
        gameState = GameState.PAUSED;
        document.getElementById('pauseBtn').textContent = 'TIẾP TỤC';
    } else if (gameState === GameState.PAUSED) {
        gameState = GameState.RACING;
        accumulator = 0;
        document.getElementById('pauseBtn').textContent = 'TẠM DỪNG';
    }
}

function restartRace() {
    document.getElementById('overlay').classList.remove('active');
    document.getElementById('countdown').classList.remove('active');
    document.getElementById('pauseBtn').textContent = 'TẠM DỪNG';
    document.getElementById('pauseBtn').disabled = false;
    startRace();
}

function render() {
    ctx.clearRect(0, 0, canvasW, canvasH);

    // Background gradient
    const grad = ctx.createLinearGradient(0, 0, 0, canvasH);
    grad.addColorStop(0, '#0a0a2e');
    grad.addColorStop(0.5, '#0f0f1a');
    grad.addColorStop(1, '#1a0a0a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvasW, canvasH);

    // Guard: no active race → show menu prompt
    if (!track || !marbles || marbles.length === 0) {
        ctx.fillStyle = '#444';
        ctx.font = '26px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🏁 ĐUA BI QUỐC TẾ', canvasW / 2, canvasH / 2 - 24);
        ctx.font = '15px sans-serif';
        ctx.fillStyle = '#777';
        ctx.fillText('Chọn cài đặt bên trái và nhấn BẮT ĐẦU', canvasW / 2, canvasH / 2 + 16);
        return;
    }

    ctx.save();
    // screenX/screenY handle camera offset + shake; only shift origin to canvas centre
    ctx.translate(canvasW / 2, 0);

    // Draw track background (world coordinates)
    drawTrack();
    // Draw obstacles (world coordinates)
    drawObstacles();
    // Draw finish line (world coordinates)
    drawFinishLine();
    // Draw marbles (world coordinates)
    drawMarbles();
    // Draw particles (world coordinates)
    particleSystem.render(ctx, camera);

    ctx.restore();

    // Draw HUD (no transform)
    drawHUD();
}

function drawTrack() {
    const w = track.walls;
    const L = w.left, R = w.right;
    const ctx2 = ctx;

    // Find visible wall range
    let i0 = 0, i1 = L.length;
    for (let i = 0; i < L.length; i++) {
        const sy = L[i].y - camera.y;
        if (sy > -100 && i0 === 0) i0 = Math.max(0, i - 1);
        if (sy > canvasH + 100) { i1 = i + 1; break; }
    }

    // === Track floor (single fill) ===
    ctx2.fillStyle = '#1a1a2e';
    ctx2.beginPath();
    ctx2.moveTo(camera.screenX(L[i0].x), camera.screenY(L[i0].y));
    for (let i = i0 + 1; i < i1; i++) ctx2.lineTo(camera.screenX(L[i].x), camera.screenY(L[i].y));
    for (let i = i1 - 1; i >= i0; i--) ctx2.lineTo(camera.screenX(R[i].x), camera.screenY(R[i].y));
    ctx2.closePath();
    ctx2.fill();

    // === Left wall (single stroke) ===
    ctx2.strokeStyle = '#4a4a7a';
    ctx2.lineWidth = CONFIG.WALL_THICKNESS;
    ctx2.beginPath();
    for (let i = i0; i < i1; i++) {
        const sx = camera.screenX(L[i].x), sy = camera.screenY(L[i].y);
        i === i0 ? ctx2.moveTo(sx, sy) : ctx2.lineTo(sx, sy);
    }
    ctx2.stroke();

    // === Right wall (single stroke) ===
    ctx2.beginPath();
    for (let i = i0; i < i1; i++) {
        const sx = camera.screenX(R[i].x), sy = camera.screenY(R[i].y);
        i === i0 ? ctx2.moveTo(sx, sy) : ctx2.lineTo(sx, sy);
    }
    ctx2.stroke();

    // === Horizontal grid lines (batch — 1 stroke) ===
    ctx2.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx2.lineWidth = 1;
    ctx2.beginPath();
    const vy0 = camera.y - 20, vy1 = camera.y + canvasH + 20;
    for (let y = Math.max(0, Math.floor(vy0 / 100) * 100); y < Math.min(CONFIG.TRACK_LENGTH, vy1); y += 100) {
        const sy = camera.screenY(y);
        ctx2.moveTo(0, sy);
        ctx2.lineTo(canvasW, sy);
    }
    ctx2.stroke();

    // === Start grid (only if visible) ===
    if (track.startGrid) {
        const sg = track.startGrid;
        const gTop = sg.yBase - 20, gBot = sg.yBase + sg.height + 20;
        const syt = camera.screenY(gTop), syb = camera.screenY(gBot);
        if (syb > -50 && syt < canvasH + 50) {
            // Track width at start
            let lw = -CONFIG.TRACK_WIDTH / 2, rw = CONFIG.TRACK_WIDTH / 2;
            for (let i = 0; i < L.length; i++) {
                if (L[i].y >= sg.yBase) { lw = L[i].x; rw = R[i].x; break; }
            }
            const sl = camera.screenX(lw), sr = camera.screenX(rw);
            // Lane dividers (batch)
            const nLane = sg.cols || 10;
            ctx2.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx2.lineWidth = 1;
            ctx2.setLineDash([3, 6]);
            ctx2.beginPath();
            for (let c = 1; c < nLane; c++) {
                const cx = sl + (sr - sl) * (c / nLane);
                ctx2.moveTo(cx, syt);
                ctx2.lineTo(cx, syb);
            }
            ctx2.stroke();
            ctx2.setLineDash([]);
            // Start line
            ctx2.strokeStyle = '#ffd93d';
            ctx2.lineWidth = 3;
            ctx2.setLineDash([6, 6]);
            ctx2.beginPath();
            ctx2.moveTo(sl, syb);
            ctx2.lineTo(sr, syb);
            ctx2.stroke();
            ctx2.setLineDash([]);
            // Label
            const startLabel = 'XUẤT PHÁT';
            ctx2.font = 'bold 14px sans-serif';
            ctx2.textAlign = 'center';
            const tw = ctx2.measureText(startLabel).width + 20;
            ctx2.fillStyle = 'rgba(0,0,0,0.7)';
            ctx2.fillRect((sl + sr) / 2 - tw / 2, syb + 6, tw, 22);
            ctx2.fillStyle = '#ffd93d';
            ctx2.fillText(startLabel, (sl + sr) / 2, syb + 22);
        }
    }

    // === Bottom extension (nếu camera show dưới track) ===
    const lastY = Math.max(L[L.length - 1].y, R[R.length - 1].y);
    if (camera.y + canvasH > lastY) {
        const botY = lastY;
        const syBot = camera.screenY(botY);
        ctx2.fillStyle = '#1a1a2e';
        ctx2.fillRect(camera.screenX(L[L.length - 1].x), syBot,
                       camera.screenX(R[R.length - 1].x) - camera.screenX(L[L.length - 1].x),
                       canvasH + 50 - syBot);
        // Extended walls
        ctx2.strokeStyle = '#4a4a7a';
        ctx2.lineWidth = CONFIG.WALL_THICKNESS;
        ctx2.beginPath();
        ctx2.moveTo(camera.screenX(L[L.length - 1].x), syBot);
        ctx2.lineTo(camera.screenX(L[L.length - 1].x), canvasH + 50);
        ctx2.stroke();
        ctx2.beginPath();
        ctx2.moveTo(camera.screenX(R[R.length - 1].x), syBot);
        ctx2.lineTo(camera.screenX(R[R.length - 1].x), canvasH + 50);
        ctx2.stroke();
    }
}

function drawObstacles() {
    const ctx2 = ctx;
    for (const obs of track.obstacles) {
        const ox = obs.x || 0, oy = obs.y || 0;
        if (!camera.isVisible(ox, oy, 150)) continue;
        const sx = camera.screenX(ox);
        const sy = camera.screenY(oy);

        switch (obs.type) {
            case 'peg': {
                ctx2.fillStyle = '#6b6bff';
                ctx2.beginPath();
                ctx2.arc(sx, sy, obs.radius, 0, Math.PI * 2);
                ctx2.fill();
                ctx2.strokeStyle = '#8b8bff';
                ctx2.lineWidth = 2;
                ctx2.stroke();
                // Highlight
                ctx2.fillStyle = 'rgba(255,255,255,0.2)';
                ctx2.beginPath();
                ctx2.arc(sx - obs.radius * 0.2, sy - obs.radius * 0.2, obs.radius * 0.3, 0, Math.PI * 2);
                ctx2.fill();
                break;
            }
            case 'bumper': {
                ctx2.fillStyle = '#ff6b6b';
                ctx2.beginPath();
                ctx2.arc(sx, sy, obs.radius, 0, Math.PI * 2);
                ctx2.fill();
                ctx2.strokeStyle = '#ff4444';
                ctx2.lineWidth = 3;
                ctx2.stroke();
                // Bumper inner circle
                ctx2.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx2.lineWidth = 1;
                ctx2.beginPath();
                ctx2.arc(sx, sy, obs.radius * 0.6, 0, Math.PI * 2);
                ctx2.stroke();
                break;
            }
            case 'funnel': {
                const halfH = obs.height / 2;
                const gap = obs.gap;
                const w = obs.segW * 0.4;
                ctx2.fillStyle = '#2a2a5a';
                ctx2.beginPath();
                ctx2.moveTo(camera.screenX(obs.midX - w), camera.screenY(obs.y - halfH));
                ctx2.lineTo(camera.screenX(obs.midX - gap / 2), camera.screenY(obs.y));
                ctx2.lineTo(camera.screenX(obs.midX - w), camera.screenY(obs.y + halfH));
                ctx2.closePath();
                ctx2.fill();
                ctx2.strokeStyle = '#4a4a8a';
                ctx2.lineWidth = 3;
                ctx2.stroke();
                ctx2.beginPath();
                ctx2.moveTo(camera.screenX(obs.midX + w), camera.screenY(obs.y - halfH));
                ctx2.lineTo(camera.screenX(obs.midX + gap / 2), camera.screenY(obs.y));
                ctx2.lineTo(camera.screenX(obs.midX + w), camera.screenY(obs.y + halfH));
                ctx2.closePath();
                ctx2.fill();
                ctx2.stroke();
                // Arrow indicators
                ctx2.fillStyle = '#ffd93d';
                ctx2.font = '20px sans-serif';
                ctx2.textAlign = 'center';
                ctx2.fillText('▼', camera.screenX(obs.midX), camera.screenY(obs.y + 6));
                break;
            }
            case 'spinner': {
                const r = obs.radius;
                ctx2.strokeStyle = '#8b8bff';
                ctx2.lineWidth = 4;
                ctx2.beginPath();
                ctx2.arc(sx, sy, r, 0, Math.PI * 2);
                ctx2.stroke();
                const numArms = obs.arms;
                for (let i = 0; i < numArms; i++) {
                    const a = obs.angle + (i * Math.PI * 2 / numArms);
                    const ex = sx + Math.cos(a) * r;
                    const ey = sy + Math.sin(a) * r;
                    ctx2.strokeStyle = '#ff6b6b';
                    ctx2.lineWidth = 6;
                    ctx2.beginPath();
                    ctx2.moveTo(sx, sy);
                    ctx2.lineTo(ex, ey);
                    ctx2.stroke();
                    // Arm end circle
                    ctx2.fillStyle = '#ff4444';
                    ctx2.beginPath();
                    ctx2.arc(ex, ey, 8, 0, Math.PI * 2);
                    ctx2.fill();
                }
                ctx2.fillStyle = '#6b6bff';
                ctx2.beginPath();
                ctx2.arc(sx, sy, 8, 0, Math.PI * 2);
                ctx2.fill();
                break;
            }
            case 'pendulum': {
                const px = sx;
                const py = camera.screenY(obs.y);
                const len = obs.length;
                const ax = obs.angle;
                const bx = px + Math.sin(ax) * len;
                const by = py + Math.cos(ax) * len;
                // Chain
                ctx2.strokeStyle = '#888';
                ctx2.lineWidth = 3;
                ctx2.beginPath();
                ctx2.moveTo(px, py);
                ctx2.lineTo(bx, by);
                ctx2.stroke();
                // Ball
                ctx2.fillStyle = '#ffd93d';
                ctx2.beginPath();
                ctx2.arc(bx, by, obs.ballRadius, 0, Math.PI * 2);
                ctx2.fill();
                ctx2.strokeStyle = '#b8860b';
                ctx2.lineWidth = 2;
                ctx2.stroke();
                break;
            }
            case 'jump-pad': {
                const hw = obs.width / 2;
                ctx2.fillStyle = '#00b894';
                ctx2.beginPath();
                ctx2.moveTo(sx - hw, sy);
                ctx2.lineTo(sx, sy - 12);
                ctx2.lineTo(sx + hw, sy);
                ctx2.closePath();
                ctx2.fill();
                ctx2.strokeStyle = '#00ff88';
                ctx2.lineWidth = 2;
                ctx2.stroke();
                // Boost arrows
                ctx2.fillStyle = 'rgba(0,255,136,0.5)';
                ctx2.font = '10px sans-serif';
                ctx2.textAlign = 'center';
                ctx2.fillText('↑↑↑', sx, sy + 4);
                break;
            }
            case 'moving-platform': {
                const hw = obs.width / 2;
                ctx2.fillStyle = '#6c5ce7';
                ctx2.fillRect(sx - hw, sy - obs.height / 2, obs.width, obs.height);
                ctx2.strokeStyle = '#a29bfe';
                ctx2.lineWidth = 2;
                ctx2.strokeRect(sx - hw, sy - obs.height / 2, obs.width, obs.height);
                break;
            }
            case 'split-path': {
                // Draw path dividers
                ctx2.strokeStyle = '#2a2a5a';
                ctx2.lineWidth = 6;
                const halfH = obs.height / 2;
                for (let p = 1; p < obs.numPaths; p++) {
                    const px = camera.screenX(obs.midX - obs.paths[p].left + 5);
                    ctx2.beginPath();
                    ctx2.moveTo(px, camera.screenY(obs.y - halfH));
                    ctx2.lineTo(px, camera.screenY(obs.y + halfH));
                    ctx2.stroke();
                }
                // Arrow guides
                ctx2.fillStyle = 'rgba(255,255,255,0.15)';
                ctx2.font = '14px sans-serif';
                ctx2.textAlign = 'center';
                for (let p = 0; p < obs.numPaths; p++) {
                    const pz = camera.screenX((obs.paths[p].left + obs.paths[p].right) / 2);
                    ctx2.fillText('↓', pz, camera.screenY(obs.y));
                }
                break;
            }
            case 'rotating-gate': {
                const hw = obs.width / 2;
                ctx2.strokeStyle = '#ff6b6b';
                ctx2.lineWidth = 4;
                const numBars = obs.bars;
                for (let i = 0; i < numBars; i++) {
                    const a = obs.angle + (i * Math.PI / numBars);
                    const len = hw;
                    ctx2.beginPath();
                    ctx2.moveTo(sx - Math.cos(a) * len, sy - Math.sin(a) * len);
                    ctx2.lineTo(sx + Math.cos(a) * len, sy + Math.sin(a) * len);
                    ctx2.stroke();
                }
                ctx2.fillStyle = '#ff4444';
                ctx2.beginPath();
                ctx2.arc(sx, sy, 6, 0, Math.PI * 2);
                ctx2.fill();
                break;
            }
            case 'scurve': {
                // Visual only (physics handled by wall segments)
                ctx2.strokeStyle = 'rgba(107,107,255,0.2)';
                ctx2.lineWidth = 2;
                ctx2.setLineDash([4, 8]);
                const halfH = obs.height / 2;
                for (let s = 0; s < 20; s++) {
                    const t = s / 20;
                    const y = obs.y - halfH + t * obs.height;
                    const a = Math.sin(t * Math.PI * 2 * obs.frequency) * obs.amplitude;
                    const lx = camera.screenX(obs.midX + a - 30);
                    const rx = camera.screenX(obs.midX + a + 30);
                    ctx2.beginPath();
                    ctx2.moveTo(lx, camera.screenY(y));
                    ctx2.lineTo(rx, camera.screenY(y));
                    ctx2.stroke();
                }
                ctx2.setLineDash([]);
                break;
            }
            case 'gravity-drop': {
                const hw = obs.width / 2;
                const gTop = camera.screenY(obs.y - obs.height / 2);
                const gBot = camera.screenY(obs.y + obs.height / 2);
                const gH = gBot - gTop;
                // Nền đỏ đậm hơn
                ctx2.fillStyle = 'rgba(255,60,60,0.12)';
                ctx2.fillRect(sx - hw, gTop, hw * 2, gH);
                // Viền glow đỏ hai bên
                ctx2.strokeStyle = 'rgba(255,60,60,0.25)';
                ctx2.lineWidth = 3;
                ctx2.beginPath();
                ctx2.moveTo(sx - hw, gTop);
                ctx2.lineTo(sx - hw, gBot);
                ctx2.stroke();
                ctx2.beginPath();
                ctx2.moveTo(sx + hw, gTop);
                ctx2.lineTo(sx + hw, gBot);
                ctx2.stroke();
                // Tia sét động (dùng sin theo thời gian)
                const flash = 0.3 + 0.2 * Math.sin(performance.now() * 0.008);
                ctx2.strokeStyle = `rgba(255,200,100,${flash})`;
                ctx2.lineWidth = 2;
                for (let i = 0; i < 7; i++) {
                    const t = i / 6;
                    const xOff = -hw + t * hw * 2;
                    const wiggle = Math.sin(t * 12 + performance.now() * 0.01) * 6;
                    ctx2.beginPath();
                    ctx2.moveTo(sx + xOff + wiggle, gTop);
                    ctx2.lineTo(sx + xOff + wiggle + 8, gBot);
                    ctx2.stroke();
                }
                // Icon ⚡ to hơn, nhấp nháy
                ctx2.fillStyle = `rgba(255,220,80,${0.5 + 0.3 * Math.sin(performance.now() * 0.006)})`;
                ctx2.font = 'bold 26px sans-serif';
                ctx2.textAlign = 'center';
                ctx2.textBaseline = 'middle';
                ctx2.fillText('⚡', sx, (gTop + gBot) / 2);
                break;
            }
        }
    }

    // Draw checkpoints
    for (const cp of track.checkpoints) {
        const sy = camera.screenY(cp.y);
        if (sy > -20 && sy < canvasH + 20) {
            // Checkpoint flag
            const lx = camera.screenX(-CONFIG.TRACK_WIDTH / 2 + 10);
            const rx = camera.screenX(CONFIG.TRACK_WIDTH / 2 - 10);
            ctx2.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx2.lineWidth = 1;
            ctx2.setLineDash([4, 6]);
            ctx2.beginPath();
            ctx2.moveTo(lx, sy);
            ctx2.lineTo(rx, sy);
            ctx2.stroke();
            ctx2.setLineDash([]);
            ctx2.fillStyle = 'rgba(255,255,255,0.3)';
            ctx2.font = '10px sans-serif';
            ctx2.textAlign = 'left';
            ctx2.fillText(cp.name, lx + 4, sy - 4);
        }
    }
}

function drawMarbles() {
    const ctx2 = ctx;
    const dpr = window.devicePixelRatio || 1;

    // Draw trails (batch circles per marble)
    for (const m of marbles) {
        if (m.eliminated) continue;
        const trail = m.trail;
        const col = (gameMode.mode === 'career' && m.isPlayer) ? careerGetTrailColor(m, COUNTRIES[m.countryIndex].colors[0]) : COUNTRIES[m.countryIndex].colors[0];
        const len = trail.length;
        if (len < 2) continue;
        // Quick visibility check: only draw if marble itself is on screen
        const msx = camera.screenX(m.x);
        const msy = camera.screenY(m.y);
        if (msx < -canvasW / 2 - 100 || msx > canvasW / 2 + 100 || msy < -100 || msy > canvasH + 100) continue;
        ctx2.fillStyle = col;
        for (let i = 0; i < len; i++) {
            const sx = camera.screenX(trail[i].x);
            const sy = camera.screenY(trail[i].y);
            ctx2.globalAlpha = ((i / len) * 0.3);
            const r = m.radius * (0.3 + 0.7 * i / len);
            ctx2.beginPath();
            ctx2.arc(sx, sy, r, 0, Math.PI * 2);
            ctx2.fill();
        }
    }
    ctx2.globalAlpha = 1;

    // Draw marbles (với render interpolation)
    for (const m of marbles) {
        if (m.eliminated) continue;
        const rx = (m.prevX || m.x) + (m.x - (m.prevX || m.x)) * renderAlpha;
        const ry = (m.prevY || m.y) + (m.y - (m.prevY || m.y)) * renderAlpha;
        const sx = camera.screenX(rx);
        const sy = camera.screenY(ry);
        if (sx > -canvasW / 2 - 100 && sx < canvasW / 2 + 100 && sy > -100 && sy < canvasH + 100) {
            // Shadow
            ctx2.fillStyle = 'rgba(0,0,0,0.3)';
            ctx2.beginPath();
            ctx2.ellipse(sx + 3, sy + 4, m.radius, m.radius * 0.6, 0, 0, Math.PI * 2);
            ctx2.fill();

            // Marble body
            ctx2.save();
            ctx2.beginPath();
            ctx2.arc(sx, sy, m.radius, 0, Math.PI * 2);
            ctx2.clip();

            // Flag texture
            if (m.texture) {
                ctx2.drawImage(m.texture, sx - m.radius, sy - m.radius, m.radius * 2, m.radius * 2);
            }

            // Shine
            ctx2.fillStyle = 'rgba(255,255,255,0.2)';
            ctx2.beginPath();
            ctx2.arc(sx - m.radius * 0.25, sy - m.radius * 0.25, m.radius * 0.3, 0, Math.PI * 2);
            ctx2.fill();

            ctx2.restore();

            // Border
            ctx2.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx2.lineWidth = 1.5;
            ctx2.beginPath();
            ctx2.arc(sx, sy, m.radius, 0, Math.PI * 2);
            ctx2.stroke();

            // Career mode: player glow ring & skin overlay
            if (gameMode.mode === 'career' && m.isPlayer) {
                ctx2.save();
                ctx2.beginPath();
                ctx2.arc(sx, sy, m.radius + 6, 0, Math.PI * 2);
                ctx2.strokeStyle = `rgba(255, 217, 61, ${0.3 + Math.sin(Date.now() / 300) * 0.2})`;
                ctx2.lineWidth = 3;
                ctx2.stroke();
                ctx2.restore();
                careerDrawMarbleOverlay(ctx2, m, sx, sy, m.radius);
            }

            // Eliminated overlay
            if (m.eliminated) {
                ctx2.fillStyle = 'rgba(255,0,0,0.3)';
                ctx2.beginPath();
                ctx2.arc(sx, sy, m.radius, 0, Math.PI * 2);
                ctx2.fill();
                ctx2.fillStyle = '#ff0000';
                ctx2.font = `${m.radius}px sans-serif`;
                ctx2.textAlign = 'center';
                ctx2.textBaseline = 'middle';
                ctx2.fillText('✕', sx, sy);
            }
        }
    }
}

function drawFinishLine() {
    const sy = camera.screenY(track.finishLine);
    if (sy > -50 && sy < canvasH + 50) {
        const ctx2 = ctx;
        const lx = camera.screenX(-CONFIG.TRACK_WIDTH / 2);
        const rx = camera.screenX(CONFIG.TRACK_WIDTH / 2);
        const tileW = 20;
        const numTiles = Math.ceil((rx - lx) / tileW);
        for (let i = 0; i < numTiles; i++) {
            ctx2.fillStyle = (i % 2 === 0) ? '#fff' : '#000';
            ctx2.fillRect(lx + i * tileW, sy - 8, tileW, 16);
        }
        // Label background + text
        const label = 'VỀ ĐÍCH';
        ctx2.font = 'bold 14px sans-serif';
        ctx2.textAlign = 'center';
        const tw = ctx2.measureText(label).width + 20;
        ctx2.fillStyle = 'rgba(0,0,0,0.7)';
        ctx2.fillRect((lx + rx) / 2 - tw / 2, sy - 30, tw, 22);
        ctx2.fillStyle = '#ffd93d';
        ctx2.fillText(label, (lx + rx) / 2, sy - 14);
    }
}

function updateBLVStatus() {
    const el = document.getElementById('blvStatus');
    if (!el) return;
    const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
    const enVoices = voices.filter(v => v.lang && v.lang.startsWith('en'));
    const voiceName = enVoices.length > 0 ? enVoices[0].name : 'default';
    el.textContent = '🎙️ English (' + voiceName + ')';
    el.style.color = '#4ade80';
}

function speakCommentary(text, force) {
    if (!blvEnabled || !window.speechSynthesis) return;
    try {
        // Don't overlap — skip if already speaking (unless forced)
        if (!force && window.speechSynthesis.speaking) return;

        // Force mode: cancel current speech first
        if (force && window.speechSynthesis.speaking) {
            window.speechSynthesis.cancel();
        }

        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = 0.9;
        u.pitch = 0.85;
        u.volume = 1.0;

        // Pick best English voice
        const voices = window.speechSynthesis.getVoices();
        const enVoices = voices.filter(v => v.lang && v.lang.startsWith('en'));
        if (enVoices.length > 0) {
            // Priority: Natural/Online > female clear (Zira) > male deep (David/Mark) > any EN
            const best = enVoices.find(v => v.name.includes('Natural') || v.name.includes('Online'))
                      || enVoices.find(v => v.name.includes('Zira'))
                      || enVoices.find(v => v.name.includes('David'))
                      || enVoices.find(v => v.name.includes('Mark'))
                      || enVoices[0];
            u.voice = best;
        }

        // Chrome fix: re-trigger speak if it didn't start
        let started = false;
        u.onstart = () => { started = true; };
        u.onend = () => { started = false; };
        if (blvSpeechTimer) clearTimeout(blvSpeechTimer);
        blvSpeechTimer = setTimeout(() => {
            if (!started) window.speechSynthesis.speak(u);
        }, 300);

        window.speechSynthesis.speak(u);
    } catch (e) {
        console.warn('[BLV] Error:', e.message);
    }
}

function setBLVText(el, text, force) {
    const old = el.textContent;
    el.textContent = text;
    if (old !== text) speakCommentary(text.replace(/\p{Extended_Pictographic}/gu, '').trim(), force);
}

function updateCommentator() {
    const el = document.getElementById('hudCommentator');
    if (!el) return;
    if (!marbles || marbles.length === 0) {
        setBLVText(el, 'Ready!', true);
        return;
    }

    if (gameState === GameState.COUNTDOWN) {
        const v = Math.ceil(countdownTimer);
        setBLVText(el, v > 0 ? '' + v : 'Go!', true);
        return;
    }

    if (gameState === GameState.FINISHED) {
        const winner = marbles.find(m => m.place === 1);
        setBLVText(el, winner ? winner.name + ' wins the race!' : 'Race over!', true);
        return;
    }

    if (gameState === GameState.PAUSED) {
        setBLVText(el, 'Paused...', true);
        return;
    }

    if (gameState !== GameState.RACING) return;

    // Only change message every ~6s (let speech finish naturally)
    const now = performance.now();
    if (now - lastCommentatorChange < 6000) return;
    lastCommentatorChange = now;

    const active = marbles.filter(m => !m.eliminated && !m.finished);
    const sorted = [...marbles].filter(m => !m.eliminated).sort((a, b) => {
        if (a.finished && b.finished) return a.finishTime - b.finishTime;
        if (a.finished) return -1;
        if (b.finished) return 1;
        return b.y - a.y; // higher y = ahead (track goes downward)
    });

    const msgs = [];
    const leader = sorted[0];
    const second = sorted[1];

    if (leader && leader.finished) {
        msgs.push(leader.name + ' crosses the finish line!');
        msgs.push('Unbelievable! ' + leader.name + ' takes the win!');
        msgs.push(leader.name + ' finishes in style!');
    } else if (leader) {
        const prog = Math.round(leader.y / CONFIG.TRACK_LENGTH * 100);
        msgs.push(leader.name + ' is in the lead!');
        msgs.push(leader.name + ' is on fire today!');
        msgs.push(leader.name + ' charging through the pack!');
        if (prog > 75) msgs.push(leader.name + ' is heading for victory!');
        if (prog > 50) msgs.push('More than halfway there! ' + leader.name + ' is flying!');
        if (second && (leader.y - second.y) < 150) {
            msgs.push('It\'s a close race! ' + second.name + ' is right behind!');
            msgs.push('Can ' + second.name + ' catch ' + leader.name + '?');
            msgs.push('What a battle at the front!');
            // Crowd excited reaction (with cooldown)

            msgs.push('Only ' + active.length + ' marbles still racing!');

            msgs.push(leader.name + ' is about to take the crown!');
            msgs.push('Almost there! ' + leader.name + ' is the champion!');

            const now = performance.now();
            if (soundManager && now - lastCrowdReaction > 8000) {
                lastCrowdReaction = now;
                soundManager.playExcited();
            }

        msgs.push('What a spectacular race!');

        msgs.push('Amazing performance from all racers!');
        msgs.push('This track is full of surprises!');
        msgs.push('Hold onto your seats, folks!');

}

function updateMiniLeaderboard() {
    if (!marbles) return;
    const sorted = [...marbles]
        .filter(m => !m.eliminated)
        .sort((a, b) => {
            if (a.finished && b.finished) return a.finishTime - b.finishTime;
            if (a.finished) return -1;
            if (b.finished) return 1;
            return a.y - b.y; // Lower y = further ahead

    const el = document.getElementById('leaderboardMini');
    const topN = Math.min(5, sorted.length);
    let html = '';
    for (let i = 0; i < topN; i++) {

const flagDataURLCache = new Map();

function getFlagDataURL(countryIndex, size) {
    const key = countryIndex + '_' + size;
    if (flagDataURLCache.has(key)) return flagDataURLCache.get(key);
    const country = COUNTRIES[countryIndex];
    const canvas = renderFlagTexture(country, size);
    const url = canvas.toDataURL();
    flagDataURLCache.set(key, url);
    return url;
}

    // Called after final race of a career tournament
    const p = careerGetProfile();
    const leagueNum = careerGetLeagueNum();
    
    // Determine player's tournament standing
    const standings = [...gameMode.tournamentStandings].sort((a, b) => b.points - a.points);
    const playerLeaguePos = standings.findIndex(s => s.id === (marbles && marbles[0] ? marbles[0].id : -1));
    const place = playerLeaguePos >= 0 ? playerLeaguePos + 1 : standings.length;
    
    const tourRewards = careerCalculateTournamentRewards(place);
    careerAddXP(tourRewards.xp);
    careerAddCoins(tourRewards.coins);
    careerAddStars(tourRewards.stars);
    careerRecordTournament(place);
    careerUpdateMissionProgress('weekly_win5', place === 1 ? 1 : 0);
    careerCheckAchievements();
    careerSaveProfile();
    
    // Check promotion
    const promotion = careerCheckPromotion();
    
    // Close overlay and show promotion
    document.getElementById('overlay').classList.remove('active');
    resetGameState();
    
    if (promotion) {
        careerShowPromotion(promotion.newLeague, promotion.bonus);

        if (leagueDef.unlockCosmetic) {

// ============================================================
// SECTION 16: MAIN GAME LOOP (Final)
// ============================================================

function gameLoop(timestamp) {
    if (!isRunning) return;

    const rawDt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;

    // FPS counter
    frameCount++;
    fpsTimer += rawDt;
    if (fpsTimer >= 0.5) {
        currentFps = Math.round(frameCount / fpsTimer);
        frameCount = 0;
        fpsTimer = 0;
    }

    // Handle countdown
    if (gameState === GameState.COUNTDOWN) {
        countdownTimer -= rawDt;
        const newVal = Math.ceil(countdownTimer);
        if (newVal !== countdownValue) {
            countdownValue = newVal;
            showCountdown(countdownValue);
        }
        if (countdownTimer <= 0) {
            gameState = GameState.RACING;
            countdownActive = false;
            document.getElementById('countdown').classList.remove('active');
            raceStartTime = performance.now();
            updateUI();
            // Crowd roar when race starts!
            if (soundManager) soundManager.startCrowd();
        }
    }

    // Fixed timestep physics
    if (gameState === GameState.RACING) {
        raceTime = (performance.now() - raceStartTime) / 1000;
        const dt = Math.min(rawDt, 0.05);
        accumulator += dt * gameSpeed;
        let steps = 0;
        while (accumulator >= CONFIG.PHYSICS_DT && steps < 8) {
            fixedUpdate(CONFIG.PHYSICS_DT);
            accumulator -= CONFIG.PHYSICS_DT;
            steps++;
        }
        if (steps >= 8) accumulator = 0; // spiral of death protection
    }

    // Update camera
    if (marbles) {
        camera.update(rawDt, marbles, canvasW, canvasH);
    }

    // Update particles
    particleSystem.update(rawDt);

    // Render
    renderAlpha = accumulator / CONFIG.PHYSICS_DT;
    render();

    // Update UI
    updateUI();

    // Stat display
    if (marbles) {
        const active = marbles.filter(m => !m.eliminated).length;
        document.getElementById('statMarbles').textContent = active;
        const finished = marbles.filter(m => m.finishTime !== null).sort((a, b) => a.finishTime - b.finishTime);
        if (finished.length > 0) {
            document.getElementById('statBestTime').textContent = formatTime(finished[0].finishTime);
        }
    }

    // Career mode: track player max speed
    if (gameMode.mode === 'career') {
        const pm = marbles && marbles.find(m => m.isPlayer);
        if (pm && pm.speed) {
            const profile = careerGetProfile();
            if (pm.speed > (profile._sessionMaxSpeed || 0)) {
                profile._sessionMaxSpeed = pm.speed;
            }
        }
    }

    animationId = requestAnimationFrame(gameLoop);
}

let _careerProfile = null;

function careerLoadProfile() {
    try {
        const raw = localStorage.getItem('mrc_career');
        if (raw) {
            const data = JSON.parse(raw);
            // Validate version — migrate if needed
            if (data && typeof data === 'object' && data.version === 1) {
                _careerProfile = data;
                // Ensure all fields exist
                for (const key of Object.keys(CAREER_DEFAULT_PROFILE)) {
                    if (!(key in _careerProfile)) {
                        _careerProfile[key] = JSON.parse(JSON.stringify(CAREER_DEFAULT_PROFILE[key]));
                    }
                }
                return _careerProfile;
            }
        }
    } catch (e) {
        console.warn('[Career] Corrupt save, resetting:', e.message);
    }
    _careerProfile = JSON.parse(JSON.stringify(CAREER_DEFAULT_PROFILE));
    careerSaveProfile();
    return _careerProfile;
}

function careerSaveProfile() {
    if (!_careerProfile) return;
    try {
        localStorage.setItem('mrc_career', JSON.stringify(_careerProfile));
    } catch (e) {
        console.warn('[Career] Save failed (quota?):', e.message);
    }
}

function careerResetProfile() {
    _careerProfile = JSON.parse(JSON.stringify(CAREER_DEFAULT_PROFILE));
    careerSaveProfile();
    careerUpdatePanel();
}

function careerGetProfile() {
    if (!_careerProfile) return careerLoadProfile();
    return _careerProfile;
}

function careerAddXP(amount) {
    const p = careerGetProfile();
    const oldLeague = careerGetLeagueNum();
    p.xp += amount;
    // Check for league promotion
    const newLeague = careerGetLeagueNum();
    if (newLeague > oldLeague) {
        careerCompleteLeague(newLeague);
    }
    careerSaveProfile();
    return { oldLeague, newLeague };
}

function careerAddCoins(amount) {
    const p = careerGetProfile();
    p.coins += amount;
    careerSaveProfile();
}

function careerSpendCoins(amount) {
    const p = careerGetProfile();
    if (p.coins < amount) return false;
    p.coins -= amount;
    careerSaveProfile();
    return true;
}

function careerAddStars(amount) {
    const p = careerGetProfile();
    p.stars += amount;
    careerSaveProfile();
}

function careerGetLeagueNum() {
    const p = careerGetProfile();
    let leagueNum = 1;
    for (let i = CAREER_LEAGUES.length - 1; i >= 0; i--) {
        if (p.xp >= CAREER_LEAGUES[i].xpThreshold) {
            leagueNum = CAREER_LEAGUES[i].id;
            break;
        }
    }
    return leagueNum;
}

function careerGetLeagueProgress() {
    const p = careerGetProfile();
    const league = careerGetLeagueNum();
    const leagueDef = CAREER_LEAGUES[league - 1];
    const lp = p.leagueProgress[league] || { tournamentsWon: 0, bestFinish: null };
    return {
        tournamentsWon: lp.tournamentsWon || 0,
        tournamentsNeeded: leagueDef.tournamentsNeeded,
        bestFinish: lp.bestFinish,
    };
}

function careerGetNextLeagueXP() {
    const league = careerGetLeagueNum();
    if (league >= CAREER_LEAGUES.length) return Infinity;
    return CAREER_LEAGUES[league].xpThreshold;
}

function careerGetLeagueXPProgress() {
    const p = careerGetProfile();
    const league = careerGetLeagueNum();
    const currentXP = p.xp;
    const currentThreshold = CAREER_LEAGUES[league - 1].xpThreshold;
    const nextThreshold = league < CAREER_LEAGUES.length ? CAREER_LEAGUES[league].xpThreshold : currentThreshold;
    const needed = nextThreshold - currentThreshold;
    const earned = currentXP - currentThreshold;
    const percent = needed > 0 ? Math.min(100, Math.floor((earned / needed) * 100)) : 100;
    return { current: earned, needed, percent };
}

function careerCalculateRaceRewards(place, leagueNum) {
    const base = careerGetRewardForPlace(place);
    const multiplier = 1 + (leagueNum - 1) * 0.1;
    return {
        xp: Math.round(base.xp * multiplier),
        coins: Math.round(base.coins * multiplier),
        stars: base.stars,
    };
}

function careerCalculateTournamentRewards(place) {
    return careerGetTournamentRewardForPlace(place);
}

function careerRecordRace(place, finishTime, maxSpeed, wasEliminated) {
    const p = careerGetProfile();
    p.stats.races++;
    if (place === 1) p.stats.wins++;
    if (place <= 3) p.stats.top3++;
    if (finishTime < p.stats.bestTime) p.stats.bestTime = finishTime;
    if (maxSpeed > p.stats.bestSpeed) p.stats.bestSpeed = maxSpeed;
    if (wasEliminated) p.stats.totalEliminations++;
    careerSaveProfile();
}

function careerRecordTournament(place) {
    const p = careerGetProfile();
    p.currentTournament++;
    const league = careerGetLeagueNum();
    if (!p.leagueProgress[league]) {
        p.leagueProgress[league] = { tournamentsWon: 0, bestFinish: null };
    }
    const lp = p.leagueProgress[league];
    if (place === 1) {
        lp.tournamentsWon = (lp.tournamentsWon || 0) + 1;
        p.stats.tournamentsWon++;
    }
    if (lp.bestFinish === null || place < lp.bestFinish) {
        lp.bestFinish = place;
    }
    careerSaveProfile();
}

function careerCheckPromotion() {
    const league = careerGetLeagueNum();
    const leagueDef = CAREER_LEAGUES[league - 1];
    const prog = careerGetLeagueProgress();
    if (prog.tournamentsWon >= leagueDef.tournamentsNeeded && league < CAREER_LEAGUES.length) {
        const bonus = careerGetLeagueBonus(league + 1);
        const unlocks = leagueDef.unlockCosmetic ? [leagueDef.unlockCosmetic] : [];
        return { promoted: true, newLeague: league + 1, bonus, unlocks };
    }
    return null;
}

function careerCompleteLeague(leagueNum) {
    const p = careerGetProfile();
    const bonus = careerGetLeagueBonus(leagueNum);
    p.xp += bonus.xp;
    p.coins += bonus.coins;
    p.stars += bonus.stars;
    // Unlock cosmetic if any
    const leagueDef = CAREER_LEAGUES[leagueNum - 1];
    if (leagueDef.unlockCosmetic) {
        careerUnlockCosmetic(leagueDef.unlockCosmetic.id);
    }
    careerSaveProfile();
    return bonus;
}

function careerIsLeagueComplete(leagueNum) {
    const p = careerGetProfile();
    const lp = p.leagueProgress[leagueNum];
    if (!lp) return false;
    const def = CAREER_LEAGUES[leagueNum - 1];
    return (lp.tournamentsWon || 0) >= def.tournamentsNeeded;
}

function careerResetCurrentLeague() {
    const p = careerGetProfile();
    const league = careerGetLeagueNum();
    p.leagueProgress[league] = { tournamentsWon: 0, bestFinish: null };
    careerSaveProfile();
}

    const p = careerGetProfile();
    if (!p.unlockedCosmetics.includes(cosmeticId)) {
        p.unlockedCosmetics.push(cosmeticId);
        careerSaveProfile();
    }
}

function careerEquipCosmetic(type, id) {
    const p = careerGetProfile();
    // Map user-facing type to internal key
    const typeMap = { flagSkin: 'flagSkin', marbleTrail: 'marbleTrail', trail: 'marbleTrail', victoryEffect: 'victoryEffect', effect: 'victoryEffect', badge: 'badge', title: 'title' };
    const key = typeMap[type] || type;
    if (id && !p.unlockedCosmetics.includes(id)) return false;
    p.equipped[key] = id || null;
    careerSaveProfile();
    return true;
}

function careerGetEquipped(type) {
    const p = careerGetProfile();
    const typeMap = { flagSkin: 'flagSkin', marbleTrail: 'marbleTrail', trail: 'marbleTrail', victoryEffect: 'victoryEffect', effect: 'victoryEffect', badge: 'badge', title: 'title' };
    const key = typeMap[type] || type;
    return p.equipped[key] || null;
}

function careerGetEquippedCosmetic(type) {
    const id = careerGetEquipped(type);
    if (!id) return null;
    for (const cat of Object.values(CAREER_COSMETICS)) {
        const found = cat.find(c => c.id === id);
        if (found) return found;
    }
    return null;
}

function careerDrawMarbleOverlay(ctx, marble, sx, sy, radius) {
    // Draw flag skin border if equipped
    const skinId = marble.equippedFlagSkin || careerGetEquipped('flagSkin');
    if (skinId) {
        ctx.save();
        const skinColors = {
            flag_bronze: '#cd7f32', flag_diamond: '#b9f2ff', flag_gold: '#ffd700',
            flag_silver: '#c0c0c0', flag_champion: '#ff6b6b', flag_neon: '#00ff88',
            flag_candy: '#ff69b4', flag_ocean: '#0077be', flag_flame: '#ff4500', flag_royal: '#4a0080',
        };
        const borderColor = skinColors[skinId] || '#ffd93d';
        ctx.strokeStyle = borderColor;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(sx, sy, radius + 1, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
    }
}

function careerGetTrailColor(marble, defaultColor) {
    const trailId = marble.equippedTrail || careerGetEquipped('marbleTrail');
    if (trailId) {
        for (const t of CAREER_COSMETICS.marbleTrails) {
            if (t.id === trailId) return t.colors[0] || defaultColor;
        }
    }
    return defaultColor;
}

function careerTriggerVictoryEffect(effectId, canvas) {
    if (!particleSystem) return;
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    if (!effectId || effectId === 'victory_sparkle') {
        particleSystem.emitConfetti(cx, cy, 50);
        setTimeout(() => particleSystem.emitConfetti(cx, cy, 40), 300);
    } else if (effectId === 'victory_fire') {
        for (let i = 0; i < 5; i++) {
            setTimeout(() => {
                particleSystem.emit(cx + (Math.random() - 0.5) * 300, cy, 30, {
                    color: '#ff4400', speed: 200, life: 1.0, size: 5, gravity: 50
                });
            }, i * 200);
        }
    } else if (effectId === 'victory_confetti') {
        particleSystem.emitConfetti(cx, cy, 80);
    } else if (effectId === 'victory_hearts') {
        for (let i = 0; i < 3; i++) {
            setTimeout(() => {
                particleSystem.emit(cx + (Math.random() - 0.5) * 200, cy, 20, {
                    color: '#ff69b4', speed: 120, life: 1.2, size: 4, gravity: -20
                });
            }, i * 150);
        }
    } else if (effectId === 'victory_stars') {
        particleSystem.emit(cx, cy, 40, {
            color: '#ffd700', speed: 180, life: 0.8, size: 4, gravity: 0
        });
    } else if (effectId === 'victory_crown') {
        particleSystem.emitConfetti(cx, cy, 60);
        for (let i = 0; i < 3; i++) {
            setTimeout(() => particleSystem.emitConfetti(cx, cy, 30), i * 200 + 200);
        }
    }
}

function careerApplySkinToFlag(baseFlagImage, skinId) {
    const c = document.createElement('canvas');
    c.width = baseFlagImage.width;
    c.height = baseFlagImage.height;
    const ctx2 = c.getContext('2d');
    ctx2.drawImage(baseFlagImage, 0, 0);
    const skinColors = {
        flag_bronze: '#cd7f32', flag_diamond: '#b9f2ff', flag_gold: '#ffd700',
        flag_silver: '#c0c0c0', flag_champion: '#ff6b6b', flag_neon: '#00ff88',
        flag_candy: '#ff69b4', flag_ocean: '#0077be', flag_flame: '#ff4500', flag_royal: '#4a0080',
    };
    const color = skinColors[skinId];
    if (color) {
        ctx2.strokeStyle = color;
        ctx2.lineWidth = 3;
        ctx2.beginPath();
        ctx2.arc(c.width / 2, c.height / 2, c.width / 2 - 2, 0, Math.PI * 2);
        ctx2.stroke();
    }
    return c;
}
