<style>
/* ===== CSS RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
body { background: #0a0a12; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; color: #e0e0e0; display: flex; justify-content: center; align-items: center; }

#app { display: flex; width: 100%; height: 100vh; max-width: 1400px; margin: 0 auto; background: #0f0f1a; overflow: hidden; }

.mode-btn:hover { background: #2a2a4a; color: #ccc; }

/* ===== BUTTONS ===== */
.btn { padding: 8px 16px; font-size: 12px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }

.btn-success { background: linear-gradient(135deg, #00b894, #00cec9); color: #fff; }
.btn-small { padding: 4px 10px; font-size: 10px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

/* ===== SETTINGS CONTROLS ===== */
.slider-container { display: flex; flex-direction: column; gap: 4px; }

.slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #6b6bff; cursor: pointer; border: 2px solid #8b8bff; box-shadow: 0 0 8px rgba(107,107,255,0.5); }

.seed-row .btn { padding: 4px 8px; font-size: 12px; }

/* ===== GAME CONTAINER ===== */
#game-container { flex: 1; position: relative; overflow: hidden; background: #0a0a12; min-width: 0; }

// ============================================================

// ============================================================
// SECTION 2: SEEDED PRNG (Mulberry32)
// ============================================================
function createRNG(seed) {
    let s = seed >>> 0;
    return {
        next: function() {
            s |= 0;
            s = s + 0x6D2B79F5 | 0;
            let t = Math.imul(s ^ s >>> 15, 1 | s);
            t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        },
        nextRange: function(min, max) {
            return min + this.next() * (max - min);
        },
        nextInt: function(min, max) {
            return Math.floor(this.nextRange(min, max + 1));
        },
        nextGaussian: function(mean, std) {
            let u1 = this.next(), u2 = this.next();
            let z = Math.sqrt(-2 * Math.log(u1 || 0.0001)) * Math.cos(2 * Math.PI * u2);
            return mean + z * std;
        }
    };
}

// ============================================================
// SECTION 3: VECTOR MATH (Vec2)
// ============================================================
class Vec2 {
    constructor(x = 0, y = 0) { this.x = x; this.y = y; }
    add(v) { return new Vec2(this.x + v.x, this.y + v.y); }
    sub(v) { return new Vec2(this.x - v.x, this.y - v.y); }
    scale(s) { return new Vec2(this.x * s, this.y * s); }
    dot(v) { return this.x * v.x + this.y * v.y; }
    cross(v) { return this.x * v.y - this.y * v.x; }
    length() { return Math.sqrt(this.x * this.x + this.y * this.y); }
    lengthSq() { return this.x * this.x + this.y * this.y; }
    normalize() { const l = this.length() || 1; return new Vec2(this.x / l, this.y / l); }
    dist(v) { return this.sub(v).length(); }
    angle() { return Math.atan2(this.y, this.x); }
    rotate(a) { const c = Math.cos(a), s = Math.sin(a); return new Vec2(this.x * c - this.y * s, this.x * s + this.y * c); }
    clone() { return new Vec2(this.x, this.y); }
    static fromAngle(a, len = 1) { return new Vec2(Math.cos(a) * len, Math.sin(a) * len); }
}

    { name: "Romania", colors: ["#002B7F","#FCD116","#CE1126"], pattern: "stripes-vertical" },
    { name: "Vietnam", colors: ["#DA251D","#FFFF00"], pattern: "star" },
    { name: "Chile", colors: ["#FFFFFF","#0039A6","#DA291C"], pattern: "triangle" },
];

const flagTextureCache = new Map();

function renderFlagTexture(country, size) {
    const key = country.name + size;
    if (flagTextureCache.has(key)) return flagTextureCache.get(key);
    const canvas = document.createElement('canvas');
    canvas.width = size * 2;
    canvas.height = size * 2;
    const ctx = canvas.getContext('2d');
    const s = size * 2;
    const h = s, w = s;
    const colors = country.colors;
    const cx = w / 2, cy = h / 2;

    switch (country.pattern) {
        case 'stripes-horizontal': {
            const stripeH = h / colors.length;
            colors.forEach((c, i) => {
                ctx.fillStyle = c;
                ctx.fillRect(0, i * stripeH, w, stripeH + 1);
            });
            break;
        }
        case 'stripes-vertical': {
            const stripeW = w / colors.length;
            colors.forEach((c, i) => {
                ctx.fillStyle = c;
                ctx.fillRect(i * stripeW, 0, stripeW + 1, h);
            });
            break;
        }
        case 'cross': {
            ctx.fillStyle = colors[0];
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = colors[1];
            const cw = w * 0.2, ch = h * 0.2;
            ctx.fillRect(cx - cw / 2, 0, cw, h);
            ctx.fillRect(0, cy - ch / 2, w, ch);
            if (colors[2]) {
                ctx.fillStyle = colors[2];
                ctx.fillRect(cx - cw / 3, 0, cw * 0.66, h);
                ctx.fillRect(0, cy - ch / 3, w, ch * 0.66);
            }
            break;
        }
        case 'circle': {
            ctx.fillStyle = colors[0];
            ctx.fillRect(0, 0, w, h);
            const r = w * 0.35;
            ctx.fillStyle = colors[1];
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fill();
            break;
        }
        case 'triangle': {
            // Triangle pattern (like Czech, South Africa)
            ctx.fillStyle = colors[0];
            ctx.fillRect(0, 0, w, h);
            if (colors.length >= 3) {
                ctx.fillStyle = colors[1];
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(w, 0);
                ctx.lineTo(w * 0.5, h * 0.5);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = colors[2];
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(w * 0.3, 0);
                ctx.lineTo(0, h * 0.5);
                ctx.closePath();
                ctx.fill();
            }
            break;
        }
        case 'star': {
            ctx.fillStyle = colors[0];
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = colors[1];
            const starR = w * 0.3;
            drawStar(ctx, cx, cy, 5, starR, starR * 0.4);
            break;
        }
        case 'diagonal': {
            // Diagonal split
            ctx.fillStyle = colors[0];
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = colors[1];
            ctx.beginPath();
            ctx.moveTo(0, h);
            ctx.lineTo(w, h);
            ctx.lineTo(w, 0);
            ctx.closePath();
            ctx.fill();
            if (colors[2]) {
                ctx.fillStyle = colors[2];
                ctx.beginPath();
                ctx.moveTo(0, h * 0.7);
                ctx.lineTo(w * 0.3, h);
                ctx.lineTo(0, h);
                ctx.closePath();
                ctx.fill();
            }
            break;
        }
        case 'checker': {
            const n = 4;
            const cs = w / n;
            ctx.fillStyle = colors[0];
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = colors[1];
            for (let r = 0; r < n; r++) {
                for (let c = 0; c < n; c++) {
                    if ((r + c) % 2 === 0) {
                        ctx.fillRect(c * cs, r * cs, cs, cs);
                    }
                }
            }
            break;
        }
        case 'union-jack': {
            ctx.fillStyle = colors[0];
            ctx.fillRect(0, 0, w, h);
            // White diagonal cross
            ctx.fillStyle = colors[1];
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(Math.PI / 4);
            ctx.fillRect(-w * 0.25, -h * 0.15, w * 0.5, h * 0.3);
            ctx.rotate(-Math.PI / 2);
            ctx.fillRect(-w * 0.25, -h * 0.15, w * 0.5, h * 0.3);
            ctx.restore();
            // Red diagonal cross
            ctx.fillStyle = colors[2];
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(Math.PI / 4);
            ctx.fillRect(-w * 0.25, -h * 0.07, w * 0.5, h * 0.14);
            ctx.rotate(-Math.PI / 2);
            ctx.fillRect(-w * 0.25, -h * 0.07, w * 0.5, h * 0.14);
            ctx.restore();
            // White cross
            ctx.fillStyle = colors[1];
            ctx.fillRect(cx - w * 0.06, 0, w * 0.12, h);
            ctx.fillRect(0, cy - h * 0.06, w, h * 0.12);
            // Red cross
            ctx.fillStyle = colors[2];
            ctx.fillRect(cx - w * 0.03, 0, w * 0.06, h);
            ctx.fillRect(0, cy - h * 0.03, w, h * 0.06);
            break;
        }
        case 'plain':
        default: {
            ctx.fillStyle = colors[0];
            ctx.fillRect(0, 0, w, h);
            if (colors[1]) {
                // Add some detail
                ctx.fillStyle = colors[1];
                ctx.font = `${w * 0.5}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
            }
            break;
        }
    }

    // Border
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.strokeRect(1, 1, w - 2, h - 2);

    // Clip to circle version
    const circleCanvas = document.createElement('canvas');
    circleCanvas.width = size;
    circleCanvas.height = size;
    const cctx = circleCanvas.getContext('2d');
    cctx.beginPath();
    cctx.arc(size / 2, size / 2, size / 2 - 1, 0, Math.PI * 2);
    cctx.clip();
    cctx.drawImage(canvas, 0, 0, s, s, 0, 0, size, size);

    flagTextureCache.set(key, circleCanvas);
    return circleCanvas;
}

function drawStar(ctx, cx, cy, points, outerR, innerR) {
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
        const r = i % 2 === 0 ? outerR : innerR;
        const a = (i * Math.PI / points) - Math.PI / 2;
        const x = cx + r * Math.cos(a);
        const y = cy + r * Math.sin(a);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
}

// SECTION 5: SOUND MANAGER (Web Audio API)
// ============================================================
class SoundManager {
    constructor() {
        this.ctx = null;
        this.masterVolume = 0.5;
        this.initialized = false;
        this.bounceBuffer = null;
        this.noiseBuffer = null;
    }

    init() {
        if (this.initialized) return;
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.masterGain = this.ctx.createGain();
            this.masterGain.gain.value = this.masterVolume;
            this.masterGain.connect(this.ctx.destination);
            // Generate noise buffer for rolling sounds
            const sr = this.ctx.sampleRate;
            const len = sr * 0.5;
            const buf = this.ctx.createBuffer(1, len, sr);
            const data = buf.getChannelData(0);
            for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
            this.noiseBuffer = buf;
            this.initialized = true;
        } catch (e) {
            console.warn('Audio not available');
        }
    }

    resume() {
        if (this.ctx && this.ctx.state === 'suspended') {
            this.ctx.resume();
        }
    }

    setVolume(v) {
        this.masterVolume = v;
        if (this.masterGain) this.masterGain.gain.value = v;
    }

    _playTone(freq, duration, type = 'sine', volume = 0.3) {
        if (!this.initialized) return;
        this.resume();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(volume, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    }

    playBounce(volume = 0.15) {
        const freq = 200 + Math.random() * 300;
        this._playTone(freq, 0.08, 'sine', volume * 0.6);
        this._playTone(freq * 0.5, 0.06, 'triangle', volume * 0.3);
    }

    playCheckpoint() {
        this._playTone(523, 0.1, 'sine', 0.2);
        setTimeout(() => {
            if (this.initialized) this._playTone(659, 0.1, 'sine', 0.2);
        }, 80);
    }

    playFinish() {
        const notes = [523, 659, 784, 1047];
        notes.forEach((f, i) => {
            setTimeout(() => this._playTone(f, 0.2, 'sine', 0.25), i * 150);
        });
    }

    playClick() {
        this._playTone(800, 0.05, 'square', 0.1);
    }

    playElimination() {
        this._playTone(300, 0.3, 'sawtooth', 0.15);
        this._playTone(200, 0.4, 'sawtooth', 0.1);
    }

    playCountdown() {
        this._playTone(440, 0.15, 'sine', 0.2);
    }

    playGo() {
        this._playTone(880, 0.3, 'sine', 0.3);
    }

    startRolling() {
        // Rolling noise - handled per-frame in game loop
        // This is a placeholder for continuous rolling sound
    }
}

// SECTION 6: PHYSICS ENGINE (Custom)
// ============================================================

class SpatialGrid {
    constructor(cellSize) {
        this.cellSize = cellSize;
        this.cells = new Map();
    }

    clear() {
        this.cells.clear();
    }

    _key(x, y) {
        return Math.floor(x / this.cellSize) + ',' + Math.floor(y / this.cellSize);
    }

    insert(body) {
        const key = this._key(body.x, body.y);
        if (!this.cells.has(key)) this.cells.set(key, []);
        this.cells.get(key).push(body);
    }

    getNearby(body) {
        const results = [];
        const cx = Math.floor(body.x / this.cellSize);
        const cy = Math.floor(body.y / this.cellSize);
        for (let dx = -1; dx <= 1; dx++) {
            for (let dy = -1; dy <= 1; dy++) {
                const key = (cx + dx) + ',' + (cy + dy);
                if (this.cells.has(key)) {
                    results.push(...this.cells.get(key));
                }
            }
        }
        return results;
    }

    getAll() {
        const all = [];
        for (const arr of this.cells.values()) all.push(...arr);
        return all;
    }
}

class PhysicsEngine {
    constructor() {
        this.bodies = [];
        this.staticBodies = [];
        this.grid = new SpatialGrid(CONFIG.GRID_CELL_SIZE);
        this.wallSegments = [];
    }

    addBody(body) {
        this.bodies.push(body);
        return body;
    }

    addStaticBody(body) {
        body.isStatic = true;
        this.staticBodies.push(body);
        return body;
    }

    setWalls(segments) {
        this.wallSegments = segments;
    }

    fixedUpdate(dt) {
        // Apply gravity
        for (const b of this.bodies) {
            if (b.isStatic || b.finished || b.eliminated) continue;
            b.vy += CONFIG.GRAVITY * dt;
            b.vx *= CONFIG.FRICTION_AIR;
            b.vy *= CONFIG.FRICTION_AIR;
            const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
            if (speed > CONFIG.MAX_SPEED) {
                b.vx = (b.vx / speed) * CONFIG.MAX_SPEED;
                b.vy = (b.vy / speed) * CONFIG.MAX_SPEED;
            }
        }

        // Move bodies (Euler)
        for (const b of this.bodies) {
            if (b.isStatic || b.finished || b.eliminated) continue;
            b.x += b.vx * dt;
            b.y += b.vy * dt;
            b.rotation += b.vx * dt * 0.05;
        }

        // Build spatial grid
        this.grid.clear();
        for (const b of this.bodies) {
            if (!b.isStatic && !b.finished && !b.eliminated) {
                this.grid.insert(b);
            }
        }
        for (const b of this.staticBodies) {
            this.grid.insert(b);
        }

        // Marble-wall collisions
        for (const b of this.bodies) {
            if (b.isStatic || b.finished || b.eliminated) continue;
            this._resolveWallCollisions(b);
        }

        // Marble-static body collisions
        for (const b of this.bodies) {
            if (b.isStatic || b.finished || b.eliminated) continue;
            const nearby = this.grid.getNearby(b);
            for (const other of nearby) {
                if (other === b) continue;
                if (!other.isStatic) continue;
                if (other.type === 'peg') {
                    this._resolveCircleCircle(b, other);
                } else if (other.type === 'bumper') {
                    this._resolveCircleCircle(b, other, true);
                }
            }
        }

        // Marble-marble collisions
        for (let i = 0; i < this.bodies.length; i++) {
            const a = this.bodies[i];
            if (a.isStatic || a.finished || a.eliminated) continue;
            const nearby = this.grid.getNearby(a);
            for (const b of nearby) {
                if (b === a || b.isStatic || b.finished || b.eliminated) continue;
                // Only process each pair once (using index)
                if (this.bodies.indexOf(b) > i) continue;
                this._resolveCircleCircle(a, b);
            }
        }

        // Apply rolling friction
        for (const b of this.bodies) {
            if (b.isStatic || b.finished || b.eliminated) continue;
            b.vx *= (1 - b.friction * dt * 10);
            b.vy *= (1 - b.friction * dt * 10);
        }
    }

    _resolveWallCollisions(body) {
        const r = body.radius;
        for (const seg of this.wallSegments) {
            const ax = seg.x1, ay = seg.y1, bx = seg.x2, by = seg.y2;
            const dx = bx - ax, dy = by - ay;
            const lenSq = dx * dx + dy * dy;
            if (lenSq < 0.001) continue;
            let t = ((body.x - ax) * dx + (body.y - ay) * dy) / lenSq;
            t = Math.max(0, Math.min(1, t));
            const cx = ax + t * dx, cy = ay + t * dy;
            const distX = body.x - cx, distY = body.y - cy;
            const dist = Math.sqrt(distX * distX + distY * distY);
            if (dist < r && dist > 0) {
                const overlap = r - dist;
                const nx = distX / dist, ny = distY / dist;
                body.x += nx * overlap;
                body.y += ny * overlap;
                const relV = body.vx * nx + body.vy * ny;
                if (relV < 0) {
                    body.vx -= (1 + CONFIG.BOUNCE_DAMPING) * relV * nx;
                    body.vy -= (1 + CONFIG.BOUNCE_DAMPING) * relV * ny;
                    // Play bounce sound
                    if (Math.abs(relV) > 50 && soundManager) {
                        soundManager.playBounce(Math.min(Math.abs(relV) / 500, 0.5));
                    }
                }
            }
        }
    }

    _resolveCircleCircle(a, b, isBumper = false) {
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const sumR = a.radius + b.radius;
        if (dist >= sumR || dist < 0.001) return;
        const overlap = sumR - dist;
        const nx = dx / dist, ny = dy / dist;
        const totalMass = (a.isStatic ? 0 : 1 / a.mass) + (b.isStatic ? 0 : 1 / b.mass);
        if (!a.isStatic) {
            const pushA = overlap * (b.isStatic ? 1 : (1 / a.mass) / totalMass);
            a.x -= nx * pushA;
            a.y -= ny * pushA;
        }
        if (!b.isStatic) {
            const pushB = overlap * (a.isStatic ? 1 : (1 / b.mass) / totalMass);
            b.x += nx * pushB;
            b.y += ny * pushB;
        }

        // Relative velocity
        const relVx = (a.isStatic ? 0 : a.vx) - (b.isStatic ? 0 : b.vx);
        const relVy = (a.isStatic ? 0 : a.vy) - (b.isStatic ? 0 : b.vy);
        const relVn = relVx * nx + relVy * ny;
        if (relVn < 0) return; // separating

        const bounce = isBumper ? 1.2 : Math.min(a.bounce || 0.5, b.bounce || 0.5);
        const j = (1 + bounce) * relVn / totalMass;
        if (!a.isStatic) {
            a.vx -= j * nx / a.mass;
            a.vy -= j * ny / a.mass;
        }
        if (!b.isStatic) {
            b.vx += j * nx / b.mass;
            b.vy += j * ny / b.mass;
        }

        // Play bounce
        if (isBumper) {
            if (soundManager) soundManager.playBounce(0.4);
            // Emit particles
            if (particleSystem && CONFIG.PARTICLE_ENABLED) {
                particleSystem.emit((a.x + b.x) / 2, (a.y + b.y) / 2, 5, {
                    color: '#ffd93d', speed: 100, life: 0.5, size: 3
                });
            }
        }
    }
}

// SECTION 7: TRACK GENERATOR
// ============================================================

function generateTrack(seed) {
    const rng = createRNG(seed);
    const track = {
        walls: { left: [], right: [] },
        obstacles: [],
        checkpoints: [],
        finishLine: 0,
        startZone: { yStart: 100, yEnd: 300 },
        wallSegments: [],
        decorations: [],
    };

    const trackLen = CONFIG.TRACK_LENGTH;
    const baseWidth = CONFIG.TRACK_WIDTH;
    const segments = 40;
    const segH = trackLen / segments;

    // Generate smooth wall profiles
    let leftX = -baseWidth / 2;
    let rightX = baseWidth / 2;

    const leftWalls = [];
    const rightWalls = [];
    let prevLeft = leftX;
    let prevRight = rightX;

    for (let i = 0; i <= segments; i++) {
        const y = i * segH;
        const t = i / segments;

        // Sinusoidal variation
        const variation = rng.nextRange(-40, 40) * (1 - Math.abs(t - 0.5) * 0.8);
        const widthVar = rng.nextRange(-30, 30) * (1 - Math.abs(t - 0.5));

        const smoothFactor = 0.3;
        let targetLeft = -baseWidth / 2 + variation - widthVar / 2;
        let targetRight = baseWidth / 2 + variation + widthVar / 2;

        // Ensure minimum width
        const minWidth = 120;
        if (targetRight - targetLeft < minWidth) {
            const center = (targetLeft + targetRight) / 2;
            targetLeft = center - minWidth / 2;
            targetRight = center + minWidth / 2;
        }

        const lx = prevLeft + (targetLeft - prevLeft) * smoothFactor + rng.nextRange(-5, 5);
        const rx = prevRight + (targetRight - prevRight) * smoothFactor + rng.nextRange(-5, 5);

        leftWalls.push({ x: lx, y });
        rightWalls.push({ x: rx, y });
        prevLeft = lx;
        prevRight = rx;
    }

    track.walls.left = leftWalls;
    track.walls.right = rightWalls;

    // Build wall segments for collision
    for (let i = 0; i < leftWalls.length - 1; i++) {
        track.wallSegments.push({
            x1: leftWalls[i].x, y1: leftWalls[i].y,
            x2: leftWalls[i + 1].x, y2: leftWalls[i + 1].y,
            isLeft: true
        });
        track.wallSegments.push({
            x1: rightWalls[i].x, y1: rightWalls[i].y,
            x2: rightWalls[i + 1].x, y2: rightWalls[i + 1].y,
            isLeft: false
        });
    }

    // Add a bottom wall across the bottom
    const lastL = leftWalls[leftWalls.length - 1];
    const lastR = rightWalls[rightWalls.length - 1];
    track.wallSegments.push({
        x1: lastL.x, y1: lastL.y,
        x2: lastR.x, y2: lastR.y
    });

    // Generate obstacles for each segment
    for (let i = 2; i < segments - 1; i++) {
        const y = i * segH;
        const lw = leftWalls[i];
        const rw = rightWalls[i];
        const segWidth = rw.x - lw.x;
        const midX = (lw.x + rw.x) / 2;

        const typeRoll = rng.next();
        const obstacleType = typeRoll < 0.12 ? 'funnel' :
                             typeRoll < 0.25 ? 'pegs' :
                             typeRoll < 0.35 ? 'spinner' :
                             typeRoll < 0.45 ? 'pendulum' :
                             typeRoll < 0.55 ? 'bumpers' :
                             typeRoll < 0.62 ? 'jump-pad' :
                             typeRoll < 0.70 ? 'moving-platform' :
                             typeRoll < 0.77 ? 'split-path' :
                             typeRoll < 0.83 ? 'rotating-gate' :
                             typeRoll < 0.89 ? 'scurve' :
                             typeRoll < 0.94 ? 'gravity-drop' :
                             'checkpoint';

        const segMidY = y + segH / 2;

        switch (obstacleType) {
            case 'funnel': {
                const gap = rng.nextRange(40, 100);
                const funnelTop = segWidth * 0.8;
                track.obstacles.push({
                    type: 'funnel', y: segMidY, segW: segWidth,
                    gap: gap, midX: midX, height: segH * 0.6
                });
                // Add funnel wall segments
                const fY0 = segMidY - segH * 0.3;
                const fY1 = segMidY;
                const fY2 = segMidY + segH * 0.3;
                const gapHalf = gap / 2;
                track.wallSegments.push({ x1: lw.x + segWidth * 0.1, y1: fY0, x2: midX - gapHalf, y2: fY1 });
                track.wallSegments.push({ x1: rw.x - segWidth * 0.1, y1: fY0, x2: midX + gapHalf, y2: fY1 });
                track.wallSegments.push({ x1: midX - gapHalf, y1: fY1, x2: lw.x + segWidth * 0.1, y2: fY2 });
                track.wallSegments.push({ x1: midX + gapHalf, y1: fY1, x2: rw.x - segWidth * 0.1, y2: fY2 });
                break;
            }
            case 'pegs': {
                const numPegs = rng.nextInt(6, 15);
                for (let p = 0; p < numPegs; p++) {
                    const px = lw.x + rng.nextRange(20, segWidth - 20);
                    const py = segMidY - segH * 0.4 + rng.nextRange(0, segH * 0.8);
                    track.obstacles.push({
                        type: 'peg', x: px, y: py, radius: rng.nextRange(6, 14)
                    });
                }
                break;
            }
            case 'spinner': {
                track.obstacles.push({
                    type: 'spinner', x: midX, y: segMidY, radius: segWidth * 0.35,
                    arms: rng.nextInt(3, 6), speed: rng.nextRange(1, 3) * (rng.next() > 0.5 ? 1 : -1),
                    angle: rng.nextRange(0, Math.PI * 2)
                });
                break;
            }
            case 'pendulum': {
                track.obstacles.push({
                    type: 'pendulum', x: midX, y: segMidY - segH * 0.3,
                    length: segH * 0.4, ballRadius: 12, swingSpeed: rng.nextRange(1.5, 3),
                    angle: rng.nextRange(-0.5, 0.5)
                });
                break;
            }
            case 'bumpers': {
                const numBump = rng.nextInt(3, 6);
                for (let p = 0; p < numBump; p++) {
                    track.obstacles.push({
                        type: 'bumper', x: lw.x + rng.nextRange(30, segWidth - 30),
                        y: segMidY - segH * 0.3 + rng.nextRange(0, segH * 0.6),
                        radius: rng.nextRange(10, 18), bounce: 1.3
                    });
                }
                break;
            }
            case 'jump-pad': {
                track.obstacles.push({
                    type: 'jump-pad', x: midX, y: segMidY,
                    width: segWidth * 0.4, boost: rng.nextRange(-400, -600)
                });
                break;
            }
            case 'moving-platform': {
                track.obstacles.push({
                    type: 'moving-platform', x: midX, y: segMidY,
                    width: segWidth * 0.5, height: 10,
                    travel: segWidth * 0.3, speed: rng.nextRange(30, 80),
                    phase: rng.nextRange(0, Math.PI * 2)
                });
                break;
            }
            case 'split-path': {
                const numPaths = rng.nextInt(2, 3);
                const paths = [];
                const pathWidth = segWidth / numPaths;
                for (let p = 0; p < numPaths; p++) {
                    const pLx = lw.x + p * pathWidth + 10;
                    const pRx = lw.x + (p + 1) * pathWidth - 10;
                    paths.push({ left: pLx, right: pRx });
                    // Add wall segments for split
                    if (p > 0) {
                        track.wallSegments.push({ x1: pLx - 5, y1: segMidY - segH * 0.4, x2: pLx - 5, y2: segMidY + segH * 0.4 });
                    }
                }
                track.obstacles.push({
                    type: 'split-path', y: segMidY, height: segH * 0.8,
                    paths: paths, numPaths: numPaths, midX: midX
                });
                break;
            }
            case 'rotating-gate': {
                track.obstacles.push({
                    type: 'rotating-gate', x: midX, y: segMidY,
                    width: segWidth * 0.6, bars: rng.nextInt(2, 4),
                    speed: rng.nextRange(1, 3), angle: rng.nextRange(0, Math.PI)
                });
                break;
            }
            case 'scurve': {
                track.obstacles.push({
                    type: 'scurve', y: segMidY, height: segH * 0.8,
                    amplitude: segWidth * 0.25, frequency: 2.5, midX: midX
                });
                // Add S-curve wall override segments
                const steps = 10;
                for (let s = 0; s < steps; s++) {
                    const t0 = s / steps, t1 = (s + 1) / steps;
                    const y0 = segMidY - segH * 0.4 + t0 * segH * 0.8;
                    const y1 = segMidY - segH * 0.4 + t1 * segH * 0.8;
                    const a0 = Math.sin(t0 * Math.PI * 2 * 2) * segWidth * 0.25;
                    const a1 = Math.sin(t1 * Math.PI * 2 * 2) * segWidth * 0.25;
                    const l0 = lw.x + a0 + 10, r0 = rw.x + a0 - 10;
                    const l1 = lw.x + a1 + 10, r1 = rw.x + a1 - 10;
                    // Add wall segments that override existing ones
                    track.wallSegments.push({ x1: l0, y1: y0, x2: l1, y2: y1 });
                    track.wallSegments.push({ x1: r0, y1: y0, x2: r1, y2: y1 });
                }
                break;
            }
            case 'gravity-drop': {
                track.obstacles.push({
                    type: 'gravity-drop', y: segMidY, height: segH * 0.6,
                    width: segWidth, midX: midX, boost: -200
                });
                break;
            }
            case 'checkpoint': {
                track.checkpoints.push({
                    y: segMidY, name: `CP${track.checkpoints.length + 1}`, index: track.checkpoints.length
                });
                break;
            }
        }
    }

    // Add checkpoints along the track
    const numCP = 8;
    for (let i = 0; i < numCP; i++) {
        const cpY = (i + 1) * (trackLen / (numCP + 1));
        if (!track.checkpoints.find(cp => Math.abs(cp.y - cpY) < 100)) {
            track.checkpoints.push({
                y: cpY, name: `CP${track.checkpoints.length + 1}`, index: track.checkpoints.length
            });
        }
    }
    track.checkpoints.sort((a, b) => a.y - b.y);
    track.checkpoints.forEach((cp, i) => { cp.index = i; cp.name = `CP${i + 1}`; });

    track.finishLine = trackLen - 50;

    // Add finish lane decorations
    track.decorations.push({ type: 'finish-line', y: track.finishLine });

    // Add start zone
    const cols = Math.min(10, CONFIG.MARBLE_RADIUS); // approximate
    const rows = 6;
    const gridH = rows * CONFIG.MARBLE_RADIUS * 3 + 40;
    track.startZone = { yStart: 80, yEnd: 80 + gridH };
    track.startGrid = { cols: 10, yBase: CONFIG.TRACK_LENGTH * 0.02, height: gridH };

    return track;
}

// SECTION 8: MARBLE SYSTEM
// ============================================================

let nextMarbleId = 0;

function createMarble(countryIndex, x, y, rng) {
    const country = COUNTRIES[countryIndex];
    return {
        id: nextMarbleId++,
        countryIndex: countryIndex,
        name: country.name,
        x: x,
        y: y,
        vx: 0,
        vy: 0,
        radius: CONFIG.MARBLE_RADIUS,
        mass: rng.nextRange(0.8, 1.2),
        bounce: rng.nextRange(0.3, 0.7),
        friction: rng.nextRange(0.015, 0.035),
        grip: rng.nextRange(0.7, 1.0),
        luck: rng.nextRange(0.3, 1.0),
        rotation: 0,
        trail: [],
        finished: false,
        eliminated: false,
        checkpointTimes: [],
        finishTime: null,
        place: null,
        maxSpeedReached: 0,
        collisions: 0,
        texture: null,
    };
}

function initMarbles(count, seed) {
    const rng = createRNG(seed * 7 + 13);
    const marbles = [];
    const selectedIndices = [];
    // Pick unique countries (or allow repeats if count > countries length)
    const pool = [...Array(COUNTRIES.length).keys()];
    for (let i = 0; i < count; i++) {
        let idx;
        if (pool.length > 0 && i < COUNTRIES.length) {
            const pi = rng.nextInt(0, pool.length - 1);
            idx = pool[pi];
            pool.splice(pi, 1);
        } else {
            idx = rng.nextInt(0, COUNTRIES.length - 1);
        }
        selectedIndices.push(idx);
    }

    // Shuffle for start positions
    for (let i = selectedIndices.length - 1; i > 0; i--) {
        const j = rng.nextInt(0, i);
        [selectedIndices[i], selectedIndices[j]] = [selectedIndices[j], selectedIndices[i]];
    }

    // Starting grid: arrange marbles in neat rows, centered on track
    const trackWidth = CONFIG.TRACK_WIDTH;
    const marbleR = CONFIG.MARBLE_RADIUS;
    const cols = Math.min(10, count);                   // max 10 per row
    const rows = Math.ceil(count / cols);
    const cellW = Math.min(trackWidth / cols, marbleR * 3.2);
    const cellH = marbleR * 3;
    const gridW = cols * cellW;
    const startX = -gridW / 2 + cellW / 2;
    const startY = CONFIG.TRACK_LENGTH * 0.02;          // top of track

    for (let i = 0; i < count; i++) {
        const row = Math.floor(i / cols);
        const col = i % cols;
        const x = startX + col * cellW + rng.nextRange(-2, 2);
        const y = startY + row * cellH + (col % 2) * 6; // stagger alternate cols
        const marble = createMarble(selectedIndices[i], x, y, rng);
        marble.texture = renderFlagTexture(COUNTRIES[selectedIndices[i]], CONFIG.MARBLE_RADIUS * 2);
        marbles.push(marble);
    }
    return marbles;
}

// ============================================================
// SECTION 9: PARTICLE SYSTEM
// ============================================================

class Particle {
    constructor() {
        this.x = 0; this.y = 0; this.vx = 0; this.vy = 0;
        this.life = 0; this.maxLife = 1; this.size = 4;
        this.color = '#ffffff'; this.gravity = 0;
        this.type = 'circle'; this.alpha = 1;
        this.active = false;
    }
}

class ParticleSystem {
    constructor(maxParticles = CONFIG.MAX_PARTICLES) {
        this.particles = [];
        for (let i = 0; i < maxParticles; i++) {
            this.particles.push(new Particle());
        }
        this.maxParticles = maxParticles;
    }

    emit(x, y, count, config) {
        const c = config || {};
        const color = c.color || '#ffffff';
        const speed = c.speed || 100;
        const life = c.life || 0.5;
        const size = c.size || 3;
        const gravity = c.gravity || 0;
        const type = c.type || 'circle';

        for (let i = 0; i < count; i++) {
            const p = this._getInactive();
            if (!p) break;
            const angle = Math.random() * Math.PI * 2;
            const spd = speed * (0.3 + Math.random() * 0.7);
            p.x = x + (Math.random() - 0.5) * 10;
            p.y = y + (Math.random() - 0.5) * 10;
            p.vx = Math.cos(angle) * spd;
            p.vy = Math.sin(angle) * spd;
            p.life = life * (0.5 + Math.random() * 0.5);
            p.maxLife = p.life;
            p.size = size * (0.5 + Math.random() * 0.5);
            p.color = color;
            p.gravity = gravity;
            p.type = type;
            p.alpha = 1;
            p.active = true;
        }
    }

    _getInactive() {
        for (const p of this.particles) {
            if (!p.active) return p;
        }
        // Recycle oldest
        return this.particles[0];
    }

    update(dt) {
        for (const p of this.particles) {
            if (!p.active) continue;
            p.life -= dt;
            if (p.life <= 0) { p.active = false; continue; }
            p.vy += p.gravity * dt;
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.alpha = Math.max(0, p.life / p.maxLife);
        }
    }

    render(ctx, camera) {
        for (const p of this.particles) {
            if (!p.active) continue;
            const sx = p.x - camera.x;
            const sy = p.y - camera.y;
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            if (p.type === 'circle') {
                ctx.beginPath();
                ctx.arc(sx, sy, p.size, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillRect(sx - p.size / 2, sy - p.size / 2, p.size, p.size);
            }
        }
        ctx.globalAlpha = 1;
    }

    emitTrail(marble, camera) {
        if (!CONFIG.PARTICLE_ENABLED) return;
        const speed = Math.sqrt(marble.vx * marble.vx + marble.vy * marble.vy);
        if (speed > 100 && Math.random() < 0.3) {
            this.emit(marble.x, marble.y, 1, {
                color: COUNTRIES[marble.countryIndex].colors[0],
                speed: 20, life: 0.4, size: 2, gravity: 20
            });
        }
    }

    emitCollision(x, y, intensity = 1) {
        if (!CONFIG.PARTICLE_ENABLED) return;
        this.emit(x, y, Math.floor(5 * intensity), {
            color: '#ffd93d', speed: 150 * intensity, life: 0.4, size: 3, gravity: 100
        });
        this.emit(x, y, Math.floor(3 * intensity), {
            color: '#ff6b6b', speed: 100 * intensity, life: 0.3, size: 2, gravity: 50
        });
    }

    emitConfetti(x, y, count = 30) {
        if (!CONFIG.PARTICLE_ENABLED) return;
        const colors = ['#ff6b6b', '#ffd93d', '#6bcbff', '#00b894', '#a29bfe', '#fd79a8', '#fdcb6e'];
        for (let i = 0; i < count; i++) {
            const p = this._getInactive();
            if (!p) break;
            const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI;
            const spd = 100 + Math.random() * 200;
            p.x = x + (Math.random() - 0.5) * 50;
            p.y = y;
            p.vx = Math.cos(angle) * spd;
            p.vy = Math.sin(angle) * spd;
            p.life = 1.5 + Math.random() * 1.5;
            p.maxLife = p.life;
            p.size = 4 + Math.random() * 4;
            p.color = colors[Math.floor(Math.random() * colors.length)];
            p.gravity = 200;
            p.type = 'rect';
            p.alpha = 1;
            p.active = true;
        }
    }
}

// ============================================================
// SECTION 10: CAMERA SYSTEM
// ============================================================

class Camera {
    constructor() {
        this.x = 0;
        this.y = 0;
        this.targetX = 0;
        this.targetY = 0;
        this.shakeX = 0;
        this.shakeY = 0;
        this.shakeIntensity = 0;
        this.zoom = 1;
    }

    update(dt, marbles, canvasW, canvasH) {
        // During countdown: lock camera on the starting grid
        if (gameState === GameState.COUNTDOWN && marbles.length > 0) {
            // Find the center of the starting grid
            let sumY = 0, count = 0;
            for (const m of marbles) {
                if (!m.eliminated) { sumY += m.y; count++; }
            }
            const avgY = count > 0 ? sumY / count : marbles[0].y;
            this.targetX = 0;
            this.targetY = avgY - canvasH * 0.45;
            this.targetY = Math.max(this.targetY, -100);
        } else {
            // Find leading marble (most progress = lowest y)
            let leadY = Infinity;
            let leadX = 0;
            let found = false;
            for (const m of marbles) {
                if (m.finished || m.eliminated) continue;
                if (m.y < leadY) {
                    leadY = m.y;
                    leadX = m.x;
                    found = true;
                }
            }
            if (!found) {
                for (const m of marbles) {
                    if (m.y < leadY) { leadY = m.y; leadX = m.x; }
                }
            }
            this.targetX = 0;
            this.targetY = leadY - canvasH * 0.4;
        }

        // Clamp
        this.targetY = Math.max(this.targetY, -200);
        this.targetY = Math.min(this.targetY, CONFIG.TRACK_LENGTH - canvasH * 0.8);

        // Smooth lerp
        const smooth = CONFIG.CAMERA_SMOOTH;
        this.x += (this.targetX - this.x) * smooth;
        this.y += (this.targetY - this.y) * smooth;

        // Camera shake decay
        if (this.shakeIntensity > 0) {
            this.shakeX = (Math.random() - 0.5) * this.shakeIntensity;
            this.shakeY = (Math.random() - 0.5) * this.shakeIntensity;
            this.shakeIntensity *= 0.9;
            if (this.shakeIntensity < 0.5) this.shakeIntensity = 0;
        } else {
            this.shakeX = 0;
            this.shakeY = 0;
        }
    }

    shake(intensity) {
        this.shakeIntensity = Math.max(this.shakeIntensity, intensity);
    }

    screenX(x) {
        return x - this.x + this.shakeX;
    }

    screenY(y) {
        return y - this.y + this.shakeY;
    }

    isVisible(x, y, margin = 100) {
        const sx = x - this.x;
        const sy = y - this.y;
        return sx > -margin && sx < canvasW + margin && sy > -margin && sy < canvasH + margin;
    }
}

// ============================================================
// SECTION 11: GAME MODES
// ============================================================

class GameMode {
    constructor() {
        this.mode = 'quick';
        this.tournamentStandings = [];
        this.currentRace = 0;
        this.totalRaces = 4;
        this.survivorCheckpoint = 0;
    }

    setMode(mode) {
        this.mode = mode;
        this.currentRace = 0;
        this.survivorCheckpoint = 0;
        if (mode === 'tournament') {
            this.tournamentStandings = [];
        }
    }

    getPointsForPlace(place, total) {
        if (this.mode === 'survival') {
            return place === 1 ? 1 : 0;
        }
        const pointsTable = [25, 18, 15, 12, 10, 8, 6, 5, 4, 3, 2, 1];
        return pointsTable[place - 1] || 0;
    }

    updateTournament(marbles) {
        if (this.mode !== 'tournament') return;
        const sorted = [...marbles].filter(m => m.finishTime !== null).sort((a, b) => a.finishTime - b.finishTime);
        sorted.forEach((m, i) => {
            let entry = this.tournamentStandings.find(e => e.id === m.id);
            if (!entry) {
                entry = { id: m.id, name: m.name, countryIndex: m.countryIndex, points: 0, best: Infinity };
                this.tournamentStandings.push(entry);
            }
            entry.points += this.getPointsForPlace(i + 1, sorted.length);
            if (m.finishTime < entry.best) entry.best = m.finishTime;
        });
    }

    getEliminatedMarbles(marbles, checkpointIndex) {
        if (this.mode !== 'survival') return [];
        const active = marbles.filter(m => !m.eliminated && !m.finished);
        if (active.length <= 1) return [];
        // Find marbles that passed the checkpoint but are slowest
        const passed = active.filter(m => m.checkpointTimes.length > checkpointIndex);
        if (passed.length < 2) return [];
        passed.sort((a, b) => (a.finishTime || a.y) - (b.finishTime || b.y));
        return [passed[passed.length - 1]]; // Eliminate last
    }
}

    COUNTDOWN: 'COUNTDOWN',
    RACING: 'RACING',

};

// Will be integrated into main game
function formatTime(seconds) {
    if (seconds === null || seconds === undefined) return '--:--';
    const mins = Math.floor(seconds / 60);
    const secs = (seconds % 60).toFixed(2);
    return `${mins}:${secs.padStart(5, '0')}`;
}
