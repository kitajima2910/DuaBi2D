// Global state
let canvas, ctx;
let physicsEngine;
let particleSystem;
let camera;
let soundManager;
let gameMode;
let track;
let marbles;
let gameState = GameState.MENU;
let lastTime = 0;
let accumulator = 0;
let gameSpeed = 1;
let frameCount = 0;
let fpsCounter = 0;
let fpsTimer = 0;
let currentFps = 60;
let countdownTimer = 0;
let countdownValue = 3;
let countdownActive = false;
let raceStartTime = 0;
let raceTime = 0;
let leaderboardCache = [];
let canvasW = 800, canvasH = 600;
let animationId = null;
let isRunning = false;

function initGame() {
    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');
    soundManager = new SoundManager();
    particleSystem = new ParticleSystem();
    camera = new Camera();
    gameMode = new GameMode();

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    setupUI();
    resetGameState();
    isRunning = true;
    lastTime = performance.now();
    if (animationId) cancelAnimationFrame(animationId);
    gameLoop(lastTime);
}

function resizeCanvas() {
    const container = document.getElementById('game-container');
    const rect = container.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvasW = rect.width;
    canvasH = rect.height;
    canvas.width = canvasW * dpr;
    canvas.height = canvasH * dpr;
    canvas.style.width = canvasW + 'px';
    canvas.style.height = canvasH + 'px';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
}

function resetGameState() {
    gameState = GameState.MENU;
    accumulator = 0;
    countdownActive = false;
    raceStartTime = 0;
    raceTime = 0;
    nextMarbleId = 0;
    leaderboardCache = [];
    updateUI();
}

function startRace() {
    const count = parseInt(document.getElementById('marbleCount').value);
    const seed = parseInt(document.getElementById('trackSeed').value) || 42;

    soundManager.init();
    soundManager.resume();

    physicsEngine = new PhysicsEngine();
    particleSystem = new ParticleSystem();
    camera = new Camera();

    // Generate track
    track = generateTrack(seed);

    // Create marbles
    marbles = initMarbles(count, seed);

    // Position camera on the starting grid immediately
    if (marbles.length > 0) {
        let sumY = 0, cnt = 0;
        for (const m of marbles) { sumY += m.y; cnt++; }
        const avgY = cnt > 0 ? sumY / cnt : marbles[0].y;
        camera.targetY = avgY - (canvasH || 600) * 0.45;
        camera.targetY = Math.max(camera.targetY, -100);
        camera.y = camera.targetY; // snap immediately, no lerp delay
        camera.x = 0;
        camera.targetX = 0;
    }

    // Add marbles to physics
    for (const m of marbles) {
        physicsEngine.addBody(m);
    }

    // Add obstacles to physics
    for (const obs of track.obstacles) {
        if (obs.type === 'peg') {
            const staticBody = {
                x: obs.x, y: obs.y, radius: obs.radius,
                isStatic: true, type: 'peg', mass: 9999,
                bounce: 0.6, finished: false, eliminated: false,
                vx: 0, vy: 0, rotation: 0,
            };
            physicsEngine.addStaticBody(staticBody);
            obs._body = staticBody;
        } else if (obs.type === 'bumper') {
            const bumperBody = {
                x: obs.x, y: obs.y, radius: obs.radius,
                isStatic: true, type: 'bumper', mass: 9999,
                bounce: obs.bounce || 1.2, finished: false, eliminated: false,
                vx: 0, vy: 0, rotation: 0,
            };
            physicsEngine.addStaticBody(bumperBody);
            obs._body = bumperBody;
        }
    }

    // Set wall segments for physics
    physicsEngine.setWalls(track.wallSegments);

    // Start countdown
    gameState = GameState.COUNTDOWN;
    countdownTimer = 3;
    countdownValue = 3;
    countdownActive = true;
    raceStartTime = performance.now();

    updateUI();
    showCountdown(3);
}

function showCountdown(value) {
    const el = document.getElementById('countdown-text');
    if (value <= 0) {
        el.textContent = 'ĐI!';
        el.style.color = '#00ff88';
        soundManager.playGo();
    } else {
        el.textContent = value;
        el.style.color = '#fff';
        soundManager.playCountdown();
    }
    document.getElementById('countdown').classList.add('active');
}

function fixedUpdate(dt) {
    if (gameState !== GameState.RACING) return;

    // Update moving obstacles
    const now = performance.now();
    for (const obs of track.obstacles) {
        if (obs.type === 'spinner' && obs._body) {
            obs.angle += obs.speed * dt;
            // Create rotating arms - this is handled in rendering
        }
        if (obs.type === 'pendulum') {
            obs.angle = Math.sin(now * 0.001 * obs.swingSpeed) * 0.8;
        }
        if (obs.type === 'moving-platform') {
            const t = Math.sin(now * 0.001 * obs.speed * 0.1 + obs.phase);
            obs.x += t * obs.travel * dt * 0.5;
        }
        if (obs.type === 'rotating-gate') {
            obs.angle += obs.speed * dt;
        }
    }

    // Apply special obstacle effects on marbles
    for (const m of marbles) {
        if (m.finished || m.eliminated) continue;
        for (const obs of track.obstacles) {
            if (obs.type === 'jump-pad') {
                const dx = m.x - obs.x, dy = m.y - obs.y;
                if (Math.abs(dx) < obs.width / 2 + m.radius && Math.abs(dy) < 20) {
                    if (m.vy > -100) { // Only boost if not already boosted
                        m.vy = obs.boost;
                        particleSystem.emit(m.x, obs.y, 8, { color: '#00ff88', speed: 80, life: 0.4, size: 3 });
                    }
                }
            }
            if (obs.type === 'gravity-drop') {
                const halfH = obs.height / 2;
                if (m.y > obs.y - halfH && m.y < obs.y + halfH) {
                    const dx = m.x - obs.midX;
                    if (Math.abs(dx) < obs.width / 2) {
                        m.vy += 200 * dt; // extra gravity in drop zone
                    }
                }
            }
        }
    }

    // Physics step
    physicsEngine.fixedUpdate(dt);

    // Update trails
    for (const m of marbles) {
        if (m.finished || m.eliminated) continue;
        m.trail.push({ x: m.x, y: m.y });
        if (m.trail.length > 15) m.trail.shift();
        const speed = Math.sqrt(m.vx * m.vx + m.vy * m.vy);
        if (speed > m.maxSpeedReached) m.maxSpeedReached = speed;

        // Particle trail
        particleSystem.emitTrail(m, camera);
    }

    // Checkpoint detection
    for (const m of marbles) {
        if (m.finished || m.eliminated) continue;
        for (const cp of track.checkpoints) {
            if (m.checkpointTimes.length <= cp.index) {
                if (Math.abs(m.y - cp.y) < 20) {
                    m.checkpointTimes.push(raceTime);
                    if (soundManager) soundManager.playCheckpoint();

                    // Survival mode elimination check
                    if (gameMode.mode === 'survival' && m.checkpointTimes.length === 1) {
                        // Don't eliminate on first checkpoint
                    }
                }
            }
        }
    }

    // Finish line detection
    for (const m of marbles) {
        if (m.finished || m.eliminated) continue;
        if (m.y >= track.finishLine) {
            m.finished = true;
            m.finishTime = raceTime;
            if (soundManager) soundManager.playFinish();
            particleSystem.emitConfetti(m.x, m.y, 20);
        }
    }

    // Survival mode: eliminate last place at each checkpoint
    if (gameMode.mode === 'survival') {
        const active = marbles.filter(m => !m.eliminated && !m.finished);
        if (active.length <= 1 && marbles.filter(m => m.finished).length > 0) {
            // Last marble standing
        }
        // Check if we should eliminate
        for (const cp of track.checkpoints) {
            const passed = active.filter(m => m.checkpointTimes.length > cp.index);
            if (passed.length >= 2) {
                // Find slowest
                passed.sort((a, b) => a.checkpointTimes[cp.index] - b.checkpointTimes[cp.index]);
                const slowest = passed[passed.length - 1];
                if (!slowest.eliminated && !slowest.finished) {
                    slowest.eliminated = true;
                    if (soundManager) soundManager.playElimination();
                    particleSystem.emit(slowest.x, slowest.y, 15, {
                        color: '#ff0000', speed: 150, life: 0.6, size: 4
                    });
                }
            }
        }
    }

    // Check if race is finished
    const finished = marbles.filter(m => m.finished);
    const active = marbles.filter(m => !m.eliminated && !m.finished);

    if (gameState === GameState.RACING) {
        if (active.length === 0 || finished.length === marbles.length) {
            endRace();
        }
        // Tournament: finish after all marbles finish or top 50%
        if (gameMode.mode === 'tournament' && finished.length >= marbles.length * 0.5) {
            // Force finish remaining
            for (const m of active) {
                m.finished = true;
                m.finishTime = raceTime + 10;
            }
            endRace();
        }
    }

    // Update marble rotation
    for (const m of marbles) {
        if (!m.eliminated) m.rotation += m.vx * dt * 0.05;
    }
}

function endRace() {
    gameState = GameState.FINISHED;

    // Sort by finish time
    const sorted = [...marbles].filter(m => m.finishTime !== null).sort((a, b) => a.finishTime - b.finishTime);
    sorted.forEach((m, i) => { m.place = i + 1; });

    // Assign places
    let place = 1;
    for (const m of sorted) { m.place = place++; }
    const dnfs = marbles.filter(m => m.finishTime === null);
    for (const m of dnfs) { m.place = place++; }

    // Update tournament
    gameMode.updateTournament(marbles);

    // Show results
    showResults();
    updateUI();
}

function pauseRace() {
    if (gameState === GameState.RACING) {
        gameState = GameState.PAUSED;
        document.getElementById('pauseBtn').textContent = 'TIẾP TỤC';
    } else if (gameState === GameState.PAUSED) {
        gameState = GameState.RACING;
        accumulator = 0;
        document.getElementById('pauseBtn').textContent = 'TẠM DỪNG';
    }
}

function restartRace() {
    if (animationId) cancelAnimationFrame(animationId);
    document.getElementById('overlay').classList.remove('active');
    document.getElementById('countdown').classList.remove('active');
    document.getElementById('pauseBtn').textContent = 'TẠM DỪNG';
    document.getElementById('pauseBtn').disabled = false;
    startRace();
}

// ============================================================
// RENDER FUNCTION
// ============================================================

function render() {
    ctx.clearRect(0, 0, canvasW, canvasH);

    // Background gradient
    const grad = ctx.createLinearGradient(0, 0, 0, canvasH);
    grad.addColorStop(0, '#0a0a2e');
    grad.addColorStop(0.5, '#0f0f1a');
    grad.addColorStop(1, '#1a0a0a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvasW, canvasH);

    // Guard: no active race → show menu prompt
    if (!track || !marbles || marbles.length === 0) {
        ctx.fillStyle = '#444';
        ctx.font = '26px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🏁 ĐUA BI QUỐC TẾ', canvasW / 2, canvasH / 2 - 24);
        ctx.font = '15px sans-serif';
        ctx.fillStyle = '#777';
        ctx.fillText('Chọn cài đặt bên trái và nhấn BẮT ĐẦU', canvasW / 2, canvasH / 2 + 16);
        return;
    }

    ctx.save();
    // Apply camera transform: world (cam.x, cam.y) → screen (canvasW/2, 0)
    ctx.translate(canvasW / 2 + camera.shakeX, camera.shakeY);
    ctx.translate(-camera.x, -camera.y);

    // Draw track background (world coordinates)
    drawTrack();
    // Draw obstacles (world coordinates)
    drawObstacles();
    // Draw finish line (world coordinates)
    drawFinishLine();
    // Draw marbles (world coordinates)
    drawMarbles();
    // Draw particles (world coordinates)
    particleSystem.render(ctx, camera);

    ctx.restore();

    // Draw HUD (no transform)
    drawHUD();
}

function drawTrack() {
    const walls = track.walls;
    const ctx2 = ctx;
    const leftPts = walls.left, rightPts = walls.right;

    // Only draw visible portion
    let startIdx = 0, endIdx = leftPts.length;
    for (let i = 0; i < leftPts.length; i++) {
        const sy = leftPts[i].y - camera.y;
        if (sy > -200 && startIdx === 0) startIdx = Math.max(0, i - 1);
        if (sy > canvasH + 200) { endIdx = i + 1; break; }
    }

    // Draw track floor
    ctx2.fillStyle = '#1a1a2e';
    ctx2.beginPath();
    ctx2.moveTo(camera.screenX(leftPts[startIdx].x), camera.screenY(leftPts[startIdx].y));
    for (let i = startIdx + 1; i < endIdx; i++) {
        ctx2.lineTo(camera.screenX(leftPts[i].x), camera.screenY(leftPts[i].y));
    }
    for (let i = endIdx - 1; i >= startIdx; i--) {
        ctx2.lineTo(camera.screenX(rightPts[i].x), camera.screenY(rightPts[i].y));
    }
    ctx2.closePath();
    ctx2.fill();

    // Draw left wall
    ctx2.strokeStyle = '#4a4a7a';
    ctx2.lineWidth = CONFIG.WALL_THICKNESS;
    ctx2.beginPath();
    for (let i = startIdx; i < endIdx; i++) {
        const x = camera.screenX(leftPts[i].x), y = camera.screenY(leftPts[i].y);
        if (i === startIdx) ctx2.moveTo(x, y); else ctx2.lineTo(x, y);
    }
    ctx2.stroke();

    // Draw right wall
    ctx2.beginPath();
    for (let i = startIdx; i < endIdx; i++) {
        const x = camera.screenX(rightPts[i].x), y = camera.screenY(rightPts[i].y);
        if (i === startIdx) ctx2.moveTo(x, y); else ctx2.lineTo(x, y);
    }
    ctx2.stroke();

    // Draw center line dots
    ctx2.fillStyle = 'rgba(255,255,255,0.1)';
    for (let i = startIdx; i < endIdx; i += 3) {
        if (i >= leftPts.length) break;
        const mx = (camera.screenX(leftPts[i].x) + camera.screenX(rightPts[i].x)) / 2;
        const my = (camera.screenY(leftPts[i].y) + camera.screenY(rightPts[i].y)) / 2;
        ctx2.beginPath();
        ctx2.arc(mx, my, 2, 0, Math.PI * 2);
        ctx2.fill();
    }

    // Draw starting grid (lane markings + start line)
    if (track.startGrid) {
        const sg = track.startGrid;
        const gridTop = sg.yBase - 20;
        const gridBot = sg.yBase + sg.height + 20;
        const syTop = camera.screenY(gridTop);
        const syBot = camera.screenY(gridBot);
        if (syTop < canvasH + 50 && syBot > -50) {
            const leftPts = track.walls.left;
            const rightPts = track.walls.right;
            // Find track width at start
            let gridLW = -CONFIG.TRACK_WIDTH / 2, gridRW = CONFIG.TRACK_WIDTH / 2;
            for (let i = 0; i < leftPts.length; i++) {
                if (leftPts[i].y >= sg.yBase) {
                    gridLW = leftPts[i].x; gridRW = rightPts[i].x;
                    break;
                }
            }
            const lx = camera.screenX(gridLW);
            const rx = camera.screenX(gridRW);
            // Lane dividers (vertical dashed spanning the grid)
            const numLanes = sg.cols || 10;
            ctx2.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx2.lineWidth = 1;
            ctx2.setLineDash([3, 6]);
            for (let c = 1; c < numLanes; c++) {
                const lx2 = lx + (rx - lx) * (c / numLanes);
                ctx2.beginPath();
                ctx2.moveTo(lx2, syTop);
                ctx2.lineTo(lx2, syBot);
                ctx2.stroke();
            }
            ctx2.setLineDash([]);
            // Start line at the BOTTOM of the grid (in front of marbles)
            ctx2.strokeStyle = 'rgba(255,255,255,0.35)';
            ctx2.lineWidth = 3;
            ctx2.setLineDash([6, 6]);
            ctx2.beginPath();
            ctx2.moveTo(lx, syBot);
            ctx2.lineTo(rx, syBot);
            ctx2.stroke();
            ctx2.setLineDash([]);
            // "XUẤT PHÁT" label below the start line
            ctx2.fillStyle = 'rgba(255,255,255,0.15)';
            ctx2.font = 'bold 14px sans-serif';
            ctx2.textAlign = 'center';
            ctx2.fillText('XUẤT PHÁT', (lx + rx) / 2, syBot + 16);
        }
    }

    // Draw horizontal grid lines for depth
    ctx2.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx2.lineWidth = 1;
    for (let y = -1000; y < CONFIG.TRACK_LENGTH + 1000; y += 100) {
        const sy = camera.screenY(y);
        if (sy > -10 && sy < canvasH + 10) {
            ctx2.beginPath();
            ctx2.moveTo(0, sy);
            ctx2.lineTo(canvasW, sy);
            ctx2.stroke();
        }
    }
}

function drawObstacles() {
    const ctx2 = ctx;
    for (const obs of track.obstacles) {
        const ox = obs.x || 0, oy = obs.y || 0;
        if (!camera.isVisible(ox, oy, 150)) continue;
        const sx = camera.screenX(ox);
        const sy = camera.screenY(oy);

        switch (obs.type) {
            case 'peg': {
                ctx2.fillStyle = '#6b6bff';
                ctx2.beginPath();
                ctx2.arc(sx, sy, obs.radius, 0, Math.PI * 2);
                ctx2.fill();
                ctx2.strokeStyle = '#8b8bff';
                ctx2.lineWidth = 2;
                ctx2.stroke();
                // Highlight
                ctx2.fillStyle = 'rgba(255,255,255,0.2)';
                ctx2.beginPath();
                ctx2.arc(sx - obs.radius * 0.2, sy - obs.radius * 0.2, obs.radius * 0.3, 0, Math.PI * 2);
                ctx2.fill();
                break;
            }
            case 'bumper': {
                ctx2.fillStyle = '#ff6b6b';
                ctx2.beginPath();
                ctx2.arc(sx, sy, obs.radius, 0, Math.PI * 2);
                ctx2.fill();
                ctx2.strokeStyle = '#ff4444';
                ctx2.lineWidth = 3;
                ctx2.stroke();
                // Bumper inner circle
                ctx2.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx2.lineWidth = 1;
                ctx2.beginPath();
                ctx2.arc(sx, sy, obs.radius * 0.6, 0, Math.PI * 2);
                ctx2.stroke();
                break;
            }
            case 'funnel': {
                const halfH = obs.height / 2;
                const gap = obs.gap;
                const w = obs.segW * 0.4;
                ctx2.fillStyle = '#2a2a5a';
                ctx2.beginPath();
                ctx2.moveTo(camera.screenX(obs.midX - w), camera.screenY(obs.y - halfH));
                ctx2.lineTo(camera.screenX(obs.midX - gap / 2), camera.screenY(obs.y));
                ctx2.lineTo(camera.screenX(obs.midX - w), camera.screenY(obs.y + halfH));
                ctx2.closePath();
                ctx2.fill();
                ctx2.strokeStyle = '#4a4a8a';
                ctx2.lineWidth = 3;
                ctx2.stroke();
                ctx2.beginPath();
                ctx2.moveTo(camera.screenX(obs.midX + w), camera.screenY(obs.y - halfH));
                ctx2.lineTo(camera.screenX(obs.midX + gap / 2), camera.screenY(obs.y));
                ctx2.lineTo(camera.screenX(obs.midX + w), camera.screenY(obs.y + halfH));
                ctx2.closePath();
                ctx2.fill();
                ctx2.stroke();
                // Arrow indicators
                ctx2.fillStyle = '#ffd93d';
                ctx2.font = '20px sans-serif';
                ctx2.textAlign = 'center';
                ctx2.fillText('▼', camera.screenX(obs.midX), camera.screenY(obs.y + 6));
                break;
            }
            case 'spinner': {
                const r = obs.radius;
                ctx2.strokeStyle = '#8b8bff';
                ctx2.lineWidth = 4;
                ctx2.beginPath();
                ctx2.arc(sx, sy, r, 0, Math.PI * 2);
                ctx2.stroke();
                const numArms = obs.arms;
                for (let i = 0; i < numArms; i++) {
                    const a = obs.angle + (i * Math.PI * 2 / numArms);
                    const ex = sx + Math.cos(a) * r;
                    const ey = sy + Math.sin(a) * r;
                    ctx2.strokeStyle = '#ff6b6b';
                    ctx2.lineWidth = 6;
                    ctx2.beginPath();
                    ctx2.moveTo(sx, sy);
                    ctx2.lineTo(ex, ey);
                    ctx2.stroke();
                    // Arm end circle
                    ctx2.fillStyle = '#ff4444';
                    ctx2.beginPath();
                    ctx2.arc(ex, ey, 8, 0, Math.PI * 2);
                    ctx2.fill();
                }
                ctx2.fillStyle = '#6b6bff';
                ctx2.beginPath();
                ctx2.arc(sx, sy, 8, 0, Math.PI * 2);
                ctx2.fill();
                break;
            }
            case 'pendulum': {
                const px = sx;
                const py = camera.screenY(obs.y);
                const len = obs.length;
                const ax = obs.angle;
                const bx = px + Math.sin(ax) * len;
                const by = py + Math.cos(ax) * len;
                // Chain
                ctx2.strokeStyle = '#888';
                ctx2.lineWidth = 3;
                ctx2.beginPath();
                ctx2.moveTo(px, py);
                ctx2.lineTo(bx, by);
                ctx2.stroke();
                // Ball
                ctx2.fillStyle = '#ffd93d';
                ctx2.beginPath();
                ctx2.arc(bx, by, obs.ballRadius, 0, Math.PI * 2);
                ctx2.fill();
                ctx2.strokeStyle = '#b8860b';
                ctx2.lineWidth = 2;
                ctx2.stroke();
                break;
            }
            case 'jump-pad': {
                const hw = obs.width / 2;
                ctx2.fillStyle = '#00b894';
                ctx2.beginPath();
                ctx2.moveTo(sx - hw, sy);
                ctx2.lineTo(sx, sy - 12);
                ctx2.lineTo(sx + hw, sy);
                ctx2.closePath();
                ctx2.fill();
                ctx2.strokeStyle = '#00ff88';
                ctx2.lineWidth = 2;
                ctx2.stroke();
                // Boost arrows
                ctx2.fillStyle = 'rgba(0,255,136,0.5)';
                ctx2.font = '10px sans-serif';
                ctx2.textAlign = 'center';
                ctx2.fillText('↑↑↑', sx, sy + 4);
                break;
            }
            case 'moving-platform': {
                const hw = obs.width / 2;
                ctx2.fillStyle = '#6c5ce7';
                ctx2.fillRect(sx - hw, sy - obs.height / 2, obs.width, obs.height);
                ctx2.strokeStyle = '#a29bfe';
                ctx2.lineWidth = 2;
                ctx2.strokeRect(sx - hw, sy - obs.height / 2, obs.width, obs.height);
                break;
            }
            case 'split-path': {
                // Draw path dividers
                ctx2.strokeStyle = '#2a2a5a';
                ctx2.lineWidth = 6;
                const halfH = obs.height / 2;
                for (let p = 1; p < obs.numPaths; p++) {
                    const px = camera.screenX(obs.midX - obs.paths[p].left + 5);
                    ctx2.beginPath();
                    ctx2.moveTo(px, camera.screenY(obs.y - halfH));
                    ctx2.lineTo(px, camera.screenY(obs.y + halfH));
                    ctx2.stroke();
                }
                // Arrow guides
                ctx2.fillStyle = 'rgba(255,255,255,0.15)';
                ctx2.font = '14px sans-serif';
                ctx2.textAlign = 'center';
                for (let p = 0; p < obs.numPaths; p++) {
                    const pz = camera.screenX((obs.paths[p].left + obs.paths[p].right) / 2);
                    ctx2.fillText('↓', pz, camera.screenY(obs.y));
                }
                break;
            }
            case 'rotating-gate': {
                const hw = obs.width / 2;
                ctx2.strokeStyle = '#ff6b6b';
                ctx2.lineWidth = 4;
                const numBars = obs.bars;
                for (let i = 0; i < numBars; i++) {
                    const a = obs.angle + (i * Math.PI / numBars);
                    const len = hw;
                    ctx2.beginPath();
                    ctx2.moveTo(sx - Math.cos(a) * len, sy - Math.sin(a) * len);
                    ctx2.lineTo(sx + Math.cos(a) * len, sy + Math.sin(a) * len);
                    ctx2.stroke();
                }
                ctx2.fillStyle = '#ff4444';
                ctx2.beginPath();
                ctx2.arc(sx, sy, 6, 0, Math.PI * 2);
                ctx2.fill();
                break;
            }
            case 'scurve': {
                // Visual only (physics handled by wall segments)
                ctx2.strokeStyle = 'rgba(107,107,255,0.2)';
                ctx2.lineWidth = 2;
                ctx2.setLineDash([4, 8]);
                const halfH = obs.height / 2;
                for (let s = 0; s < 20; s++) {
                    const t = s / 20;
                    const y = obs.y - halfH + t * obs.height;
                    const a = Math.sin(t * Math.PI * 2 * obs.frequency) * obs.amplitude;
                    const lx = camera.screenX(obs.midX + a - 30);
                    const rx = camera.screenX(obs.midX + a + 30);
                    ctx2.beginPath();
                    ctx2.moveTo(lx, camera.screenY(y));
                    ctx2.lineTo(rx, camera.screenY(y));
                    ctx2.stroke();
                }
                ctx2.setLineDash([]);
                break;
            }
            case 'gravity-drop': {
                const hw = obs.width / 2;
                ctx2.fillStyle = 'rgba(255,100,100,0.1)';
                ctx2.fillRect(sx - hw, camera.screenY(obs.y - obs.height / 2), hw * 2, obs.height);
                // Zap indicators
                ctx2.strokeStyle = 'rgba(255,200,100,0.3)';
                ctx2.lineWidth = 2;
                for (let i = 0; i < 5; i++) {
                    const xOff = -hw + (i / 4) * hw * 2;
                    ctx2.beginPath();
                    ctx2.moveTo(sx + xOff, camera.screenY(obs.y - obs.height / 2));
                    ctx2.lineTo(sx + xOff + 10, camera.screenY(obs.y + obs.height / 2));
                    ctx2.stroke();
                }
                ctx2.fillStyle = 'rgba(255,200,100,0.5)';
                ctx2.font = '16px sans-serif';
                ctx2.textAlign = 'center';
                ctx2.fillText('⚡', sx, camera.screenY(obs.y));
                break;
            }
        }
    }

    // Draw checkpoints
    for (const cp of track.checkpoints) {
        const sy = camera.screenY(cp.y);
        if (sy > -20 && sy < canvasH + 20) {
            // Checkpoint flag
            const lx = camera.screenX(-CONFIG.TRACK_WIDTH / 2 + 10);
            const rx = camera.screenX(CONFIG.TRACK_WIDTH / 2 - 10);
            ctx2.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx2.lineWidth = 1;
            ctx2.setLineDash([4, 6]);
            ctx2.beginPath();
            ctx2.moveTo(lx, sy);
            ctx2.lineTo(rx, sy);
            ctx2.stroke();
            ctx2.setLineDash([]);
            ctx2.fillStyle = 'rgba(255,255,255,0.3)';
            ctx2.font = '10px sans-serif';
            ctx2.textAlign = 'left';
            ctx2.fillText(cp.name, lx + 4, sy - 4);
        }
    }
}

function drawMarbles() {
    const ctx2 = ctx;
    const dpr = window.devicePixelRatio || 1;

    // Draw trails first
    for (const m of marbles) {
        if (m.eliminated) continue;
        const trail = m.trail;
        for (let i = 0; i < trail.length; i++) {
            const alpha = (i / trail.length) * 0.3;
            const sx = camera.screenX(trail[i].x);
            const sy = camera.screenY(trail[i].y);
            if (sx > -50 && sx < canvasW + 50 && sy > -50 && sy < canvasH + 50) {
                ctx2.globalAlpha = alpha;
                ctx2.fillStyle = COUNTRIES[m.countryIndex].colors[0];
                ctx2.beginPath();
                ctx2.arc(sx, sy, m.radius * (0.3 + 0.7 * i / trail.length), 0, Math.PI * 2);
                ctx2.fill();
            }
        }
    }
    ctx2.globalAlpha = 1;

    // Draw marbles
    for (const m of marbles) {
        if (m.eliminated) continue;
        const sx = camera.screenX(m.x);
        const sy = camera.screenY(m.y);
        if (sx > -100 && sx < canvasW + 100 && sy > -100 && sy < canvasH + 100) {
            // Shadow
            ctx2.fillStyle = 'rgba(0,0,0,0.3)';
            ctx2.beginPath();
            ctx2.ellipse(sx + 3, sy + 4, m.radius, m.radius * 0.6, 0, 0, Math.PI * 2);
            ctx2.fill();

            // Marble body
            ctx2.save();
            ctx2.beginPath();
            ctx2.arc(sx, sy, m.radius, 0, Math.PI * 2);
            ctx2.clip();

            // Flag texture
            if (m.texture) {
                ctx2.drawImage(m.texture, sx - m.radius, sy - m.radius, m.radius * 2, m.radius * 2);
            }

            // Shine
            ctx2.fillStyle = 'rgba(255,255,255,0.2)';
            ctx2.beginPath();
            ctx2.arc(sx - m.radius * 0.25, sy - m.radius * 0.25, m.radius * 0.3, 0, Math.PI * 2);
            ctx2.fill();

            ctx2.restore();

            // Border
            ctx2.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx2.lineWidth = 1.5;
            ctx2.beginPath();
            ctx2.arc(sx, sy, m.radius, 0, Math.PI * 2);
            ctx2.stroke();

            // Eliminated overlay
            if (m.eliminated) {
                ctx2.fillStyle = 'rgba(255,0,0,0.3)';
                ctx2.beginPath();
                ctx2.arc(sx, sy, m.radius, 0, Math.PI * 2);
                ctx2.fill();
                ctx2.fillStyle = '#ff0000';
                ctx2.font = `${m.radius}px sans-serif`;
                ctx2.textAlign = 'center';
                ctx2.textBaseline = 'middle';
                ctx2.fillText('✕', sx, sy);
            }
        }
    }
}

function drawFinishLine() {
    const sy = camera.screenY(track.finishLine);
    if (sy > -50 && sy < canvasH + 50) {
        const ctx2 = ctx;
        const lx = camera.screenX(-CONFIG.TRACK_WIDTH / 2);
        const rx = camera.screenX(CONFIG.TRACK_WIDTH / 2);
        const tileW = 20;
        const numTiles = Math.ceil((rx - lx) / tileW);
        for (let i = 0; i < numTiles; i++) {
            ctx2.fillStyle = (i % 2 === 0) ? '#fff' : '#000';
            ctx2.fillRect(lx + i * tileW, sy - 8, tileW, 16);
        }
        ctx2.fillStyle = '#fff';
        ctx2.font = '12px sans-serif';
        ctx2.textAlign = 'center';
        ctx2.fillText('VỀ ĐÍCH', (lx + rx) / 2, sy + 4);
    }
}

function drawHUD() {
    const ctx2 = ctx;

    // Progress bar (top center-ish)
    if (marbles && marbles.length > 0) {
        const active = marbles.filter(m => !m.eliminated);
        let maxProgress = 0;
        for (const m of active) {
            const prog = m.y / CONFIG.TRACK_LENGTH;
            if (prog > maxProgress) maxProgress = prog;
        }
        const pct = Math.min(100, Math.round(maxProgress * 100));
        document.getElementById('hudProgress').textContent = pct + '%';
        document.getElementById('hudActive').textContent = active.length + '/' + marbles.length;
    }

    // FPS
    document.getElementById('hudFps').textContent = currentFps;

    // Mini leaderboard
    updateMiniLeaderboard();
}

function updateMiniLeaderboard() {
    if (!marbles) return;
    const sorted = [...marbles]
        .filter(m => !m.eliminated)
        .sort((a, b) => {
            if (a.finished && b.finished) return a.finishTime - b.finishTime;
            if (a.finished) return -1;
            if (b.finished) return 1;
            return a.y - b.y; // Lower y = further ahead
        });

    const el = document.getElementById('leaderboardMini');
    const topN = Math.min(5, sorted.length);
    let html = '';
    for (let i = 0; i < topN; i++) {
        const m = sorted[i];
        const flag = COUNTRIES[m.countryIndex].colors[0];
        html += `<span class="lb-entry"><span class="lb-pos">${i + 1}</span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${flag};"></span>${m.name}</span>`;
    }
    el.innerHTML = html;
}

// ============================================================
// RESULTS & OVERLAY
// ============================================================

function showResults() {
    const sorted = [...marbles].filter(m => m.finishTime !== null).sort((a, b) => a.finishTime - b.finishTime);
    const overlay = document.getElementById('overlay');
    const content = document.getElementById('overlayContent');

    let html = '<h2>🏆 Hoàn Thành!</h2>';

    if (sorted.length >= 3) {
        html += '<div class="podium">';
        // 2nd, 1st, 3rd
        const order = [1, 0, 2]; // indexes for sorted[1], sorted[0], sorted[2]
        for (const idx of order) {
            if (idx >= sorted.length) continue;
            const m = sorted[idx];
            const flag = COUNTRIES[m.countryIndex].colors[0];
            const cls = idx === 0 ? 'podium-1' : idx === 1 ? 'podium-2' : 'podium-3';
            const pos = idx + 1;
            html += `<div class="podium-item ${cls}">
                <div class="flag-circle" style="background:${flag};"></div>
                <div class="name">${pos}. ${m.name}</div>
                <div class="time">${formatTime(m.finishTime)}</div>
                <div class="podium-stand">${pos === 1 ? '🥇' : pos === 2 ? '🥈' : '🥉'}</div>
            </div>`;
        }
        html += '</div>';
    }

    // Results table
    html += '<h3>Kết Quả</h3>';
    html += '<table class="results-table">';
    html += '<tr><th>STT</th><th>Quốc Gia</th><th>Thời Gian</th><th>Tốc Độ</th></tr>';

    const allSorted = [...marbles].sort((a, b) => (a.place || 999) - (b.place || 999));
    for (const m of allSorted) {
        const flag = COUNTRIES[m.countryIndex].colors[0];
        const timeStr = m.finishTime ? formatTime(m.finishTime) : 'KXĐ';
        const speedStr = Math.round(m.maxSpeedReached || 0);
        html += `<tr>
            <td class="pos">${m.place || '-'}</td>
            <td><span class="flag-dot" style="background:${flag}"></span>${m.name}</td>
            <td>${m.finishTime ? formatTime(m.finishTime) : '<span style="color:#ff6b6b">KXĐ</span>'}</td>
            <td>${speedStr}</td>
        </tr>`;
    }
    html += '</table>';

    // Tournament standings
    if (gameMode.mode === 'tournament' && gameMode.tournamentStandings.length > 0) {
        html += '<h3>Bảng Giải Đấu (Vòng ' + (gameMode.currentRace + 1) + '/' + gameMode.totalRaces + ')</h3>';
        const standings = [...gameMode.tournamentStandings].sort((a, b) => b.points - a.points);
        html += '<table class="results-table">';
        html += '<tr><th>STT</th><th>Quốc Gia</th><th>Điểm</th><th>Xuất Sắc</th></tr>';
        standings.forEach((s, i) => {
            const flag = COUNTRIES[s.countryIndex].colors[0];
            html += `<tr>
                <td class="pos">${i + 1}</td>
                <td><span class="flag-dot" style="background:${flag}"></span>${s.name}</td>
                <td>${s.points}</td>
                <td>${formatTime(s.best)}</td>
            </tr>`;
        });
        html += '</table>';

        if (gameMode.currentRace < gameMode.totalRaces - 1) {
            html += '<button class="btn btn-primary" onclick="nextRace()" style="width:100%;margin-top:12px;">Vòng Sau →</button>';
        } else {
            html += '<div style="text-align:center;margin-top:12px;font-size:18px;font-weight:700;color:#ffd93d;">🏆 Giải Đấu Hoàn Tất! 🏆</div>';
        }
    }

    // Survival results
    if (gameMode.mode === 'survival') {
        const winner = marbles.find(m => !m.eliminated);
        if (winner) {
            html += `<div style="text-align:center;margin:12px 0;font-size:18px;font-weight:700;color:#ffd93d;">🏆 Vô Địch: ${winner.name}! 🏆</div>`;
        }
        html += '<table class="results-table">';
        html += '<tr><th>STT</th><th>Quốc Gia</th><th>Trạng Thái</th></tr>';
        const elimOrder = marbles.sort((a, b) => (a.place || 999) - (b.place || 999));
        elimOrder.forEach((m, i) => {
            const flag = COUNTRIES[m.countryIndex].colors[0];
            const status = m.eliminated ? 'Bị Loại' : m.finished ? 'Về Đích' : 'Sống Sót!';
            html += `<tr><td class="pos">${i + 1}</td><td><span class="flag-dot" style="background:${flag}"></span>${m.name}</td><td>${status}</td></tr>`;
        });
        html += '</table>';
    }

    html += `<div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn btn-primary" onclick="restartRace()" style="flex:1;">Đua Lại</button>
        <button class="btn btn-secondary" onclick="closeResults()" style="flex:1;">Về Menu</button>
    </div>`;

    content.innerHTML = html;
    overlay.classList.add('active');
}

function closeResults() {
    document.getElementById('overlay').classList.remove('active');
    resetGameState();
    updateUI();
}

function nextRace() {
    gameMode.currentRace++;
    document.getElementById('overlay').classList.remove('active');
    // Generate new seed
    const newSeed = parseInt(document.getElementById('trackSeed').value) + 1;
    document.getElementById('trackSeed').value = newSeed;
    startRace();
}

// ============================================================
// SECTION 15: INPUT HANDLING
// ============================================================

function setupUI() {
    // Mode buttons
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            gameMode.setMode(btn.dataset.mode);
            soundManager.playClick();
        });
    });

    // Speed buttons
    document.querySelectorAll('.speed-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            gameSpeed = parseInt(btn.dataset.speed);
        });
    });

    // Marble count slider
    document.getElementById('marbleCount').addEventListener('input', (e) => {
        document.getElementById('marbleCountDisplay').textContent = e.target.value;
    });

    // Seed randomizer
    document.getElementById('randomSeedBtn').addEventListener('click', () => {
        document.getElementById('trackSeed').value = Math.floor(Math.random() * 90000) + 1000;
        soundManager.playClick();
    });

    // Start button
    document.getElementById('startBtn').addEventListener('click', () => {
        soundManager.init();
        soundManager.resume();
        startRace();
    });

    // Pause button
    document.getElementById('pauseBtn').addEventListener('click', pauseRace);

    // Restart button
    document.getElementById('restartBtn').addEventListener('click', restartRace);

    // Keyboard
    document.addEventListener('keydown', (e) => {
        switch (e.key) {
            case ' ':
                e.preventDefault();
                if (gameState === GameState.RACING || gameState === GameState.PAUSED) {
                    pauseRace();
                }
                break;
            case 'r':
            case 'R':
                restartRace();
                break;
            case '1': setSpeed(1); break;
            case '2': setSpeed(2); break;
            case '4': setSpeed(4); break;
        }
    });

    // Prevent touch scrolling
    document.addEventListener('touchmove', (e) => {
        if (e.target === canvas) e.preventDefault();
    }, { passive: false });
}

function setSpeed(speed) {
    gameSpeed = speed;
    document.querySelectorAll('.speed-btn').forEach(b => {
        b.classList.toggle('active', parseInt(b.dataset.speed) === speed);
    });
}

function updateUI() {
    const isRacing = gameState === GameState.RACING || gameState === GameState.COUNTDOWN;
    document.getElementById('startBtn').disabled = isRacing || gameState === GameState.PAUSED;
    document.getElementById('pauseBtn').disabled = gameState !== GameState.RACING && gameState !== GameState.PAUSED;

    if (gameState === GameState.PAUSED) {
        document.getElementById('pauseBtn').textContent = 'TIẾP TỤC';
    } else {
        document.getElementById('pauseBtn').textContent = 'TẠM DỪNG';
    }
}

// ============================================================
// SECTION 16: MAIN GAME LOOP (Final)
// ============================================================

function gameLoop(timestamp) {
    if (!isRunning) return;

    const rawDt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;

    // FPS counter
    frameCount++;
    fpsTimer += rawDt;
    if (fpsTimer >= 0.5) {
        currentFps = Math.round(frameCount / fpsTimer);
        frameCount = 0;
        fpsTimer = 0;
    }

    // Handle countdown
    if (gameState === GameState.COUNTDOWN) {
        countdownTimer -= rawDt;
        const newVal = Math.ceil(countdownTimer);
        if (newVal !== countdownValue) {
            countdownValue = newVal;
            showCountdown(countdownValue);
        }
        if (countdownTimer <= 0) {
            gameState = GameState.RACING;
            countdownActive = false;
            document.getElementById('countdown').classList.remove('active');
            raceStartTime = performance.now();
            updateUI();
        }
    }

    // Fixed timestep physics
    if (gameState === GameState.RACING) {
        raceTime = (performance.now() - raceStartTime) / 1000;
        const dt = Math.min(rawDt, 0.05);
        accumulator += dt * gameSpeed;
        let steps = 0;
        while (accumulator >= CONFIG.PHYSICS_DT && steps < 8) {
            fixedUpdate(CONFIG.PHYSICS_DT);
            accumulator -= CONFIG.PHYSICS_DT;
            steps++;
        }
        if (steps >= 8) accumulator = 0; // spiral of death protection
    }

    // Update camera
    if (marbles) {
        camera.update(rawDt, marbles, canvasW, canvasH);
    }

    // Update particles
    particleSystem.update(rawDt);

    // Render
    render();

    // Update UI
    updateUI();

    // Stat display
    if (marbles) {
        const active = marbles.filter(m => !m.eliminated).length;
        document.getElementById('statMarbles').textContent = active;
        const finished = marbles.filter(m => m.finishTime !== null).sort((a, b) => a.finishTime - b.finishTime);
        if (finished.length > 0) {
            document.getElementById('statBestTime').textContent = formatTime(finished[0].finishTime);
        }
    }

    animationId = requestAnimationFrame(gameLoop);
}

// ============================================================
// BOOTSTRAP
// ============================================================

document.addEventListener('DOMContentLoaded', () => {
    // Initial render
    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');
    resizeCanvas();

    // Draw initial background
    const grad = ctx.createLinearGradient(0, 0, 0, canvasH);
    grad.addColorStop(0, '#0a0a2e');
    grad.addColorStop(1, '#1a0a0a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvasW, canvasH);

    ctx.fillStyle = '#333';
    ctx.font = '24px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🏁 ĐUA BI QUỐC TẾ', canvasW / 2, canvasH / 2 - 20);
    ctx.font = '14px sans-serif';
    ctx.fillStyle = '#666';
    ctx.fillText('Chọn cài đặt và nhấn BẮT ĐẦU', canvasW / 2, canvasH / 2 + 20);

    // Init sound
    soundManager = new SoundManager();
    particleSystem = new ParticleSystem();
    camera = new Camera();
    gameMode = new GameMode();

    initGame();
});

// Expose functions to global scope for HTML onclick
window.startRace = startRace;
window.restartRace = restartRace;
window.pauseRace = pauseRace;
window.closeResults = closeResults;
window.nextRace = nextRace;

</script>
