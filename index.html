<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌍 Countries Marble Race</title>
<style>
/* ============================================================
   GLOBAL STYLES
   ============================================================ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#0a0a1a;color:#fff;touch-action:none;-webkit-user-select:none;user-select:none}
canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%}

/* ============================================================
   SCREEN MANAGEMENT
   ============================================================ */
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;z-index:10;flex-direction:column;align-items:center;transition:opacity 0.4s}
.screen.active{display:flex}

/* ============================================================
   PRE-RACE SCREEN
   ============================================================ */
#preRaceScreen{background:linear-gradient(135deg,#0a0a2e,#1a0a3e 30%,#2a0a4e 60%,#0a0a2e);justify-content:center;gap:15px;padding:20px;overflow-y:auto}
#preRaceScreen h1{font-size:clamp(28px,6vw,56px);font-weight:900;background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#ff6b6b);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradShift 3s linear infinite;text-shadow:none;text-align:center;line-height:1.2}
@keyframes gradShift{0%{background-position:0%}100%{background-position:200%}}
#preRaceScreen .subtitle{color:#aaa;font-size:clamp(12px,2vw,18px);margin-bottom:10px;text-align:center}
.settings-panel{background:rgba(255,255,255,0.06);border-radius:16px;padding:clamp(15px,3vw,30px);width:min(500px,95%);display:flex;flex-direction:column;gap:18px;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08)}
.setting-row{display:flex;flex-wrap:wrap;align-items:center;gap:10px}
.setting-row label{font-size:clamp(13px,2vw,16px);color:#ccc;min-width:130px;font-weight:600}
.setting-row input[type=range]{flex:1;min-width:100px;height:6px;-webkit-appearance:none;appearance:none;background:linear-gradient(90deg,#4d96ff,#6bcb77);border-radius:3px;outline:none}
.setting-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#6bcb77,#4d96ff);cursor:pointer;border:2px solid rgba(255,255,255,0.3);box-shadow:0 0 10px rgba(75,150,255,0.4)}
.setting-row .setting-value{min-width:40px;text-align:center;font-weight:700;color:#ffd93d;font-size:16px}
.setting-row .speed-btns{display:flex;gap:6px}
.setting-row .speed-btn{padding:6px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:#aaa;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s}
.setting-row .speed-btn.active{background:#4d96ff;color:#fff;border-color:#4d96ff;box-shadow:0 0 15px rgba(77,150,255,0.4)}
.setting-row .speed-btn:hover{background:rgba(255,255,255,0.12)}
.btn-start{padding:16px 48px;font-size:clamp(18px,3vw,28px);font-weight:900;border:none;border-radius:50px;cursor:pointer;margin-top:10px;background:linear-gradient(135deg,#ff6b6b,#ff8e8e,#ff6b6b);color:#fff;letter-spacing:2px;text-transform:uppercase;box-shadow:0 0 30px rgba(255,107,107,0.4),0 4px 15px rgba(0,0,0,0.3);transition:all 0.3s;min-height:44px}
.btn-start:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 0 50px rgba(255,107,107,0.6),0 6px 20px rgba(0,0,0,0.4)}
.btn-start:active{transform:scale(0.98)}

/* ============================================================
   HUD (DURING RACE)
   ============================================================ */
#hud{position:absolute;top:0;left:0;width:100%;height:100%;z-index:20;pointer-events:none}
#hud>*{pointer-events:auto}
#hudTop{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px}
#timer{font-family:'Courier New',monospace;font-size:clamp(16px,3vw,28px);font-weight:700;background:rgba(0,0,0,0.6);padding:6px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(5px)}
#remainingCount{font-size:clamp(12px,2vw,18px);background:rgba(0,0,0,0.6);padding:6px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(5px)}
#ranking{position:absolute;top:60px;right:10px;width:min(220px,40vw);background:rgba(0,0,0,0.7);border-radius:12px;padding:10px 14px;border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(8px);max-height:50vh;overflow-y:auto}
#ranking h3{font-size:clamp(11px,1.5vw,15px);margin-bottom:6px;color:#ffd93d}
.rank-item{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:clamp(10px,1.2vw,13px);border-bottom:1px solid rgba(255,255,255,0.04)}
.rank-item .rank-num{font-weight:700;min-width:18px;color:#aaa}
.rank-item .rank-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#ddd}
.rank-item .rank-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,0.3)}
.rank-item.top1 .rank-num{color:#ffd700}.rank-item.top1 .rank-name{color:#ffd700;font-weight:700}
.rank-item.top2 .rank-num{color:#c0c0c0}.rank-item.top2 .rank-name{color:#c0c0c0;font-weight:700}
.rank-item.top3 .rank-num{color:#cd7f32}.rank-item.top3 .rank-name{color:#cd7f32;font-weight:700}
#btnPanel{position:absolute;bottom:clamp(10px,3vh,25px);left:50%;transform:translateX(-50%);display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.hud-btn{padding:8px 16px;border:none;border-radius:10px;font-size:clamp(11px,1.5vw,14px);font-weight:700;cursor:pointer;color:#fff;transition:all 0.2s;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.12);min-height:44px}
.hud-btn:hover{background:rgba(255,255,255,0.2);transform:translateY(-1px)}
.hud-btn:active{transform:scale(0.96)}
.hud-btn.primary{background:#4d96ff;border-color:#4d96ff}
.hud-btn.danger{background:#ff6b6b;border-color:#ff6b6b}
.hud-btn.success{background:#6bcb77;border-color:#6bcb77}
#countdown{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(60px,15vw,150px);font-weight:900;color:#fff;text-shadow:0 0 40px rgba(255,255,255,0.5),0 0 80px rgba(77,150,255,0.3);z-index:30;display:none;animation:countPop 0.5s}
@keyframes countPop{0%{transform:translate(-50%,-50%) scale(2);opacity:0}50%{opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
#countdown.go{color:#6bcb77;text-shadow:0 0 40px rgba(107,203,119,0.5),0 0 80px rgba(107,203,119,0.3)}

/* ============================================================
   POST-RACE SCREEN
   ============================================================ */
#resultScreen{background:linear-gradient(135deg,#0a0a2e,#1a0a3e 50%,#0a0a2e);justify-content:center;padding:20px;overflow-y:auto}
#resultScreen h2{font-size:clamp(24px,5vw,44px);font-weight:900;margin-bottom:5px;background:linear-gradient(90deg,#ffd700,#ff6b6b,#ffd700);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradShift 2s linear infinite}
#resultScreen .winner-name{font-size:clamp(20px,4vw,36px);font-weight:700;color:#ffd700;margin:5px 0 10px;text-shadow:0 0 20px rgba(255,215,0,0.3)}
#resultScreen .winner-time{font-family:'Courier New',monospace;font-size:clamp(14px,2vw,22px);color:#aaa;margin-bottom:15px}
.results-table{width:min(550px,95%);background:rgba(255,255,255,0.05);border-radius:12px;border:1px solid rgba(255,255,255,0.08);overflow:hidden;margin-bottom:15px}
.results-table .rt-header{display:flex;padding:10px 16px;background:rgba(255,255,255,0.08);font-weight:700;font-size:clamp(11px,1.5vw,14px);color:#aaa}
.results-table .rt-row{display:flex;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:clamp(11px,1.3vw,14px);align-items:center}
.results-table .rt-row:last-child{border-bottom:none}
.rt-row .rt-pos{width:40px;font-weight:700}
.rt-row .rt-dot{width:14px;height:14px;border-radius:50%;margin-right:10px;flex-shrink:0;border:1px solid rgba(255,255,255,0.2)}
.rt-row .rt-name{flex:1;font-weight:600}
.rt-row .rt-time{font-family:'Courier New',monospace;color:#aaa;min-width:80px;text-align:right}
.rt-row.top1 .rt-pos{color:#ffd700}.rt-row.top1 .rt-name{color:#ffd700}
.rt-row.top2 .rt-pos{color:#c0c0c0}.rt-row.top2 .rt-name{color:#c0c0c0}
.rt-row.top3 .rt-pos{color:#cd7f32}.rt-row.top3 .rt-name{color:#cd7f32}
.btn-newrace{padding:14px 40px;font-size:clamp(16px,2.5vw,24px);font-weight:800;border:none;border-radius:50px;cursor:pointer;background:linear-gradient(135deg,#6bcb77,#4d96ff);color:#fff;box-shadow:0 0 30px rgba(107,203,119,0.3);transition:all 0.3s;min-height:44px}
.btn-newrace:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 0 50px rgba(107,203,119,0.5)}
.btn-newrace:active{transform:scale(0.98)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:2px}
@media(max-width:600px){
.settings-panel{width:100%;padding:15px}
.setting-row{flex-direction:column;align-items:stretch;gap:5px}
.setting-row label{min-width:unset}
#ranking{right:5px;top:55px;width:min(180px,45vw);padding:8px 10px}
#hudTop{top:5px;left:5px;right:5px}
#btnPanel{gap:5px}.hud-btn{padding:6px 10px;font-size:11px;min-height:36px}
.results-table .rt-row{padding:6px 10px}
}
</style>
</head>
<body>

<!-- ============================================================
SCREEN: PRE-RACE
============================================================ -->
<div id="preRaceScreen" class="screen active">
  <h1>🌍 Countries Marble Race</h1>
  <div class="subtitle">⚡ Procedural track · Physics racing · 50+ countries</div>
  <div class="settings-panel">
    <div class="setting-row">
      <label>🏁 Racers</label>
      <input type="range" id="racerCount" min="4" max="30" value="12">
      <span class="setting-value" id="racerCountVal">12</span>
    </div>
    <div class="setting-row">
      <label>⚡ Speed</label>
      <div class="speed-btns">
        <button class="speed-btn" data-speed="0.7">Slow</button>
        <button class="speed-btn active" data-speed="1">Normal</button>
        <button class="speed-btn" data-speed="1.4">Fast</button>
      </div>
    </div>
    <div class="setting-row">
      <label>📏 Track</label>
      <div class="speed-btns">
        <button class="speed-btn" data-length="4000">Short</button>
        <button class="speed-btn active" data-length="6000">Medium</button>
        <button class="speed-btn" data-length="8000">Long</button>
      </div>
    </div>
    <button class="btn-start" id="btnStartRace">🏁 START RACE</button>
  </div>
</div>

<!-- ============================================================
SCREEN: GAME (Canvas + HUD)
============================================================ -->
<div id="gameScreen" class="screen">
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div id="hudTop">
      <div id="timer">00:00.00</div>
      <div id="remainingCount">👥 12</div>
    </div>
    <div id="ranking">
      <h3>🏆 Race Ranking</h3>
      <div id="rankingList"></div>
    </div>
    <div id="btnPanel">
      <button class="hud-btn" id="btnPause">⏸ Pause</button>
      <button class="hud-btn" id="btnRestart">🔄 Restart</button>
      <button class="hud-btn" id="btnNewRace">🎲 New Race</button>
      <button class="hud-btn" id="btnFullscreen">⛶ Full</button>
    </div>
  </div>
  <div id="countdown"></div>
</div>

<!-- ============================================================
SCREEN: POST-RACE
============================================================ -->
<div id="resultScreen" class="screen">
  <h2>🏆 Race Results</h2>
  <div class="winner-name" id="winnerName"></div>
  <div class="winner-time" id="winnerTime"></div>
  <div class="results-table" id="resultsTable"></div>
  <button class="btn-newrace" id="btnNewRace2">🎲 New Race</button>
</div>

<script>
// ============================================================
// SECTION 1: Country Data
// ============================================================
const COUNTRIES = [
  {name:"Vietnam",colors:["#DA251D","#FFDA00"],cont:"Asia"},
  {name:"France",colors:["#002395","#FFFFFF","#ED2939"],cont:"Europe"},
  {name:"Germany",colors:["#000000","#DD0000","#FFCE00"],cont:"Europe"},

  {name:"China",colors:["#DE2910","#FFDE00"],cont:"Asia"},
  {name:"South Korea",colors:["#FFFFFF","#003478","#CD2E3A"],cont:"Asia"},
  {name:"Thailand",colors:["#ED1C24","#FFFFFF","#241D4F","#FFFFFF","#ED1C24"],cont:"Asia"},
  {name:"Indonesia",colors:["#FF0000","#FFFFFF"],cont:"Asia"},
  {name:"Philippines",colors:["#0038A8","#CE1126","#FFFFFF","#FFD700"],cont:"Asia"},
  {name:"Malaysia",colors:["#010066","#FF0000","#FFCC00"],cont:"Asia"},
  {name:"Singapore",colors:["#EF2B2D","#FFFFFF"],cont:"Asia"},
  {name:"Egypt",colors:["#CE1126","#FFFFFF","#000000"],cont:"Africa"},
  {name:"Nigeria",colors:["#008751","#FFFFFF"],cont:"Africa"},
  {name:"South Africa",colors:["#DE3831","#007A4D","#FFB612","#000000","#002395"],cont:"Africa"},
  {name:"Kenya",colors:["#000000","#FF0000","#009900","#FFFFFF"],cont:"Africa"},
  {name:"Morocco",colors:["#C1272D","#006233"],cont:"Africa"},
  {name:"Ghana",colors:["#CE1126","#FFD700","#006B3F"],cont:"Africa"},
  {name:"Ethiopia",colors:["#009660","#FFCC00","#DA121A","#0052B4"],cont:"Africa"},
  {name:"USA",colors:["#B22234","#FFFFFF","#3C3B6E"],cont:"Americas"},
  {name:"Chile",colors:["#FFFFFF","#0039A6","#D52B1E"],cont:"Americas"},
  {name:"Colombia",colors:["#FCD116","#003893","#CE1126"],cont:"Americas"},
  {name:"Peru",colors:["#D91023","#FFFFFF"],cont:"Americas"},
  {name:"Jamaica",colors:["#FED100","#009B3A","#000000"],cont:"Americas"},
  {name:"Cuba",colors:["#002A8F","#FFFFFF","#CE1126"],cont:"Americas"},
  {name:"New Zealand",colors:["#00247D","#FFFFFF","#CC142B"],cont:"Oceania"},
  {name:"Fiji",colors:["#0066CC","#FFFFFF","#FF0000"],cont:"Oceania"},
  {name:"Switzerland",colors:["#FF0000","#FFFFFF"],cont:"Europe"},
  {name:"Austria",colors:["#ED2939","#FFFFFF"],cont:"Europe"},
  {name:"Belgium",colors:["#000000","#FFD90C","#EF3340"],cont:"Europe"},
  {name:"Ireland",colors:["#169B62","#FFFFFF","#FF883E"],cont:"Europe"},
  {name:"Romania",colors:["#002B7F","#FCD116","#CE1126"],cont:"Europe"},
  {name:"Ukraine",colors:["#0057B8","#FFD700"],cont:"Europe"},

  {name:"Hungary",colors:["#CD2A3E","#FFFFFF","#008751"],cont:"Europe"},

  {name:"UAE",colors:["#FF0000","#009933","#FFFFFF","#000000"],cont:"Asia"},
];

// ============================================================
// SECTION 2: Audio System (Web Audio API)
// ============================================================
const AudioSystem = {
  ctx: null, muted: false, initialized: false,
  init(){
    if(this.initialized) return;
    try{ this.ctx = new (window.AudioContext||window.webkitAudioContext)(); this.initialized = true; }
    catch(e){ console.warn("Audio unavailable"); }
  },
  resume(){
    if(this.ctx && this.ctx.state==='suspended') this.ctx.resume();
  },
  tone(freq,dur,type='sine',vol=0.15){
    if(!this.ctx||this.muted) return; this.resume();
    try{
      const o=this.ctx.createOscillator(), g=this.ctx.createGain();
      o.type=type; o.frequency.setValueAtTime(freq,this.ctx.currentTime);
      g.gain.setValueAtTime(vol,this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur);
      o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime+dur);
    }catch(e){}
  },
  bounce(speed=1){ this.tone(200+Math.min(1,speed)*300,0.08,'sine',0.08); },
  boost(){
    if(!this.ctx||this.muted) return; this.resume();
    try{
      const t=this.ctx.currentTime, o=this.ctx.createOscillator(), g=this.ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(1200,t+0.2);
      g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
      o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(t+0.25);
    }catch(e){}
  },
  finish(){
    if(!this.ctx||this.muted) return; this.resume();
    try{
      const t=this.ctx.currentTime;
      [523.25,659.25,783.99,1046.5].forEach((f,i)=>{
        const o=this.ctx.createOscillator(), g=this.ctx.createGain();
        o.type='sine'; o.frequency.setValueAtTime(f,t+i*0.12);
        g.gain.setValueAtTime(0.12,t+i*0.12); g.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.4);
        o.connect(g); g.connect(this.ctx.destination); o.start(t+i*0.12); o.stop(t+i*0.12+0.4);
      });
    }catch(e){}
  },
  pit(){
    if(!this.ctx||this.muted) return; this.resume();
    try{
      const t=this.ctx.currentTime, o=this.ctx.createOscillator(), g=this.ctx.createGain();
      o.type='sawtooth'; o.frequency.setValueAtTime(400,t); o.frequency.exponentialRampToValueAtTime(80,t+0.4);
      g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(t+0.4);
    }catch(e){}
  },
  countBeep(){ this.tone(440,0.15,'square',0.06); },
  go(){
    if(!this.ctx||this.muted) return; this.resume();
    try{
      const t=this.ctx.currentTime, o=this.ctx.createOscillator(), g=this.ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(523,t); o.frequency.exponentialRampToValueAtTime(784,t+0.15);
      g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(t+0.3);
    }catch(e){}
  },
  toggleMute(){ this.muted=!this.muted; return this.muted; }
};

// ============================================================
// SECTION 3: Game Settings & State
// ============================================================
const Settings = { racerCount:12, speedMul:1, trackLength:6000, gravity:800 };
const State = {
  phase:'menu', marbles:[], obstacles:[], activeParticles:[], walls:[],
  camera:{y:0,targetY:0}, elapsed:0, paused:false, raceStarted:false,
  finishedCount:0, totalRacers:0, animFrameId:null, canvas:null, ctx:null,
  W:0, H:0, worldWidth:800, trackLeftBase:100, trackRightBase:700,
  trackLeftOffsets:[], trackRightOffsets:[], countdownInterval:null
};

// ============================================================
// SECTION 4: Physics Engine
// ============================================================
const Physics = {
  gravity:800, wallBounce:0.6, marbleBounce:0.5, friction:0.985,
  antiStuckThreshold:15, antiStuckTime:2,

  len(x,y){ return Math.sqrt(x*x+y*y); },
  dist(x1,y1,x2,y2){ return this.len(x2-x1,y2-y1); },
  norm(x,y){ const l=this.len(x,y); return l>0?[x/l,y/l]:[0,0]; },
  dot(x1,y1,x2,y2){ return x1*x2+y1*y2; },

  circCirc(m1,m2){
    const dx=m2.x-m1.x, dy=m2.y-m1.y, d=this.len(dx,dy);
    const minD=m1.radius+m2.radius;
    if(d>=minD||d<0.001) return false;
    const overlap=minD-d;
    const [nx,ny]=this.norm(dx,dy);
    const tM=m1.mass+m2.mass;
    m1.x-=nx*overlap*m2.mass/tM; m1.y-=ny*overlap*m2.mass/tM;
    m2.x+=nx*overlap*m1.mass/tM; m2.y+=ny*overlap*m1.mass/tM;
    const rvn=this.dot(m1.vx-m2.vx,m1.vy-m2.vy,nx,ny);
    if(rvn>0) return true;
    const j=-(1+this.marbleBounce)*rvn/tM;
    m1.vx+=j*m2.mass*nx; m1.vy+=j*m2.mass*ny;
    m2.vx-=j*m1.mass*nx; m2.vy-=j*m1.mass*ny;
    return true;
  },

  circRect(cx,cy,cr,rx,ry,rw,rh,angle){
    if(angle){
      const cos=Math.cos(-angle), sin=Math.sin(-angle);
      const px=cx-rx, py=cy-ry;
      return this.circRectAligned(px*cos-py*sin,px*sin+py*cos,cr,-rw/2,-rh/2,rw,rh);
    }
    return this.circRectAligned(cx,cy,cr,rx-rw/2,ry-rh/2,rw,rh);
  },

  circRectAligned(cx,cy,cr,rx,ry,rw,rh){
    const nx=Math.max(rx,Math.min(cx,rx+rw));
    const ny=Math.max(ry,Math.min(cy,ry+rh));
    const dx=cx-nx, dy=cy-ny, d=this.len(dx,dy);
    if(d>=cr||d<0.001) return false;
    const overlap=cr-d;
    const [ndx,ndy]=this.norm(dx,dy);
    return {nx:ndx,ny:ndy,overlap};
  },

  resolveCircRect(m,r){
    if(!r) return;
    m.x+=r.nx*r.overlap; m.y+=r.ny*r.overlap;
    const vn=this.dot(m.vx,m.vy,r.nx,r.ny);
    if(vn<0){ m.vx-=(1+this.wallBounce)*vn*r.nx; m.vy-=(1+this.wallBounce)*vn*r.ny; }
  },

  wallBounceM(m,leftX,rightX){
    if(m.x-m.radius<leftX){ m.x=leftX+m.radius; if(m.vx<0)m.vx*=-this.wallBounce; }
    if(m.x+m.radius>rightX){ m.x=rightX-m.radius; if(m.vx>0)m.vx*=-this.wallBounce; }
    if(m.y-m.radius<-100){ m.y=-100+m.radius; if(m.vy<0)m.vy*=-this.wallBounce; }
  },

  updateMarble(m,dt,obstacles,trackLen){
    if(m.state!=='racing') return;
    m.vy+=Settings.gravity*dt;
    m.vx*=this.friction;
    m.x+=m.vx*dt; m.y+=m.vy*dt;

    // Anti-stuck
    if(this.len(m.vx,m.vy)<this.antiStuckThreshold){
      m.stuckTimer=(m.stuckTimer||0)+dt;
      if(m.stuckTimer>this.antiStuckTime){
        const a=Math.random()*Math.PI*2;
        m.vx+=Math.cos(a)*200; m.vy+=Math.sin(a)*200-150;
        m.stuckTimer=0;
      }
    }else{ m.stuckTimer=0; }

    // Finish
    if(m.y>trackLen){
      if(m.state==='racing'){
        m.state='finished'; m.finishTime=State.elapsed;
        State.finishedCount++; AudioSystem.finish(); spawnParticlesFinish(m);
      }
      return;
    }

    // Pits
    for(const o of obstacles){
      if(o.type==='pit'){
        if(this.dist(m.x,m.y,o.x,o.y)<o.radius-m.radius*0.3&&m.state==='racing'){
          m.state='eliminated'; m.vx=0; m.vy=0;
          AudioSystem.pit(); spawnParticlesPit(m); break;
        }
      }
    }
    if(m.state!=='racing') return;

    // Track walls
    this.wallBounceM(m,getTrackLeft(m.y),getTrackRight(m.y));

    // Obstacles
    for(const o of obstacles){
      if(o.type==='bumper'){
        const d=this.dist(m.x,m.y,o.x,o.y), minD=m.radius+o.radius;
        if(d<minD&&d>0.001){
          const [nx,ny]=this.norm(m.x-o.x,m.y-o.y);
          m.x=o.x+nx*minD; m.y=o.y+ny*minD;
          const vn=this.dot(m.vx,m.vy,nx,ny);
          if(vn>0){ m.vx-=2*vn*nx; m.vy-=2*vn*ny; }
          m.vx*=0.85; m.vy*=0.85;
          AudioSystem.bounce(this.len(m.vx,m.vy)/300);
          spawnParticlesBurst(m.x,m.y,['#FFD93D','#FF6B6B']);
        }
      }else if(o.type==='ramp'){
        const r=this.circRect(m.x,m.y,m.radius,o.x,o.y,o.w,o.h,o.angle);
        if(r) this.resolveCircRect(m,r);
      }else if(o.type==='rotatingBar'){
        const ang=o.angle||0, cos=Math.cos(ang), sin=Math.sin(ang);
        const dx=m.x-o.x, dy=m.y-o.y;
        const lx=dx*cos+dy*sin, ly=-dx*sin+dy*cos;
        const hw=o.w/2, hh=o.h/2;
        const nx=Math.max(-hw,Math.min(lx,hw)), ny=Math.max(-hh,Math.min(ly,hh));
        const cdx=lx-nx, cdy=ly-ny, d=this.len(cdx,cdy);
        if(d<m.radius&&d>0.001){
          const overlap=m.radius-d, [ndx,ndy]=this.norm(cdx,cdy);
          const wx=o.x+(nx*cos-ny*sin)+ndx*overlap*cos;
          const wy=o.y+(nx*sin+ny*cos)+ndx*overlap*sin;
          m.x=wx; m.y=wy;
          const vn=this.dot(m.vx,m.vy,ndx,ndy);
          if(vn>0){ m.vx-=2*vn*ndx; m.vy-=2*vn*ndy; }
        }
      }else if(o.type==='booster'){
        const inZ=m.x>o.x-o.w/2&&m.x<o.x+o.w/2&&m.y>o.y-o.h/2&&m.y<o.y+o.h/2;
        if(inZ&&!m.boosted){ m.vy-=250; m.vx+=(Math.random()-0.5)*60; m.boosted=true; AudioSystem.boost(); spawnParticlesBoost(m.x,m.y); }
        if(!inZ) m.boosted=false;
      }else if(o.type==='wall'||o.type==='splitWall'||o.type==='movingGate'){
        const r=this.circRect(m.x,m.y,m.radius,o.x,o.y,o.w,o.h,0);
        if(r) this.resolveCircRect(m,r);
      }
    }
  }
};

// ============================================================
// SECTION 5: Track Generator
// ============================================================
function getTrackLeft(y){
  const idx=Math.floor(y/300), frac=(y%300)/300;
  const offs=State.trackLeftOffsets;
  if(!offs.length) return State.trackLeftBase;
  const i0=Math.min(idx,offs.length-1), i1=Math.min(idx+1,offs.length-1);
  return State.trackLeftBase+offs[i0]+(offs[i1]-offs[i0])*frac;
}
function getTrackRight(y){
  const idx=Math.floor(y/300), frac=(y%300)/300;
  const offs=State.trackRightOffsets;
  if(!offs.length) return State.trackRightBase;
  const i0=Math.min(idx,offs.length-1), i1=Math.min(idx+1,offs.length-1);
  return State.trackRightBase+offs[i0]+(offs[i1]-offs[i0])*frac;
}

function generateTrack(length){
  const obstacles=[];
  const numSeg=Math.ceil(length/300)+5;
  State.trackLeftOffsets=[]; State.trackRightOffsets=[];
  for(let i=0;i<numSeg;i++){
    State.trackLeftOffsets.push((Math.sin(i*0.7)*25+Math.sin(i*1.3)*15)*(0.8+Math.random()*0.4));
    State.trackRightOffsets.push((Math.sin(i*0.7+2.1)*25+Math.sin(i*1.3+1.7)*15)*(0.8+Math.random()*0.4));
  }
  let y=200;
  const types=['bumper','ramp','rotatingBar','booster','pit','wallCluster','splitPath','movingGate'];
  while(y<length-200){
    const left=getTrackLeft(y), right=getTrackRight(y);
    const trackW=right-left, cx=left+trackW/2;
    const type=types[Math.floor(Math.random()*types.length)];
    switch(type){
      case 'bumper':{
        obstacles.push({type:'bumper',x:left+40+Math.random()*(trackW-80),y:y,radius:15+Math.random()*10});
        y+=80+Math.random()*60;
        if(Math.random()>0.5) obstacles.push({type:'bumper',x:left+40+Math.random()*(trackW-80),y:y+30+Math.random()*30,radius:12+Math.random()*10});
        break;
      }
      case 'ramp':{
        const rw=60+Math.random()*40, rh=12;
        obstacles.push({type:'ramp',x:left+20+Math.random()*(trackW-rw-40)+rw/2,y:y,w:rw,h:rh,angle:(Math.random()-0.5)*0.6});
        y+=60+Math.random()*40; break;
      }
      case 'rotatingBar':{
        obstacles.push({type:'rotatingBar',x:cx,y:y,w:80+Math.random()*60,h:10,angle:0,rotSpeed:(Math.random()-0.5)*3});
        y+=100+Math.random()*50; break;
      }
      case 'booster':{
        const bw=50+Math.random()*30, bh=20+Math.random()*10;
        obstacles.push({type:'booster',x:left+20+Math.random()*(trackW-bw-40)+bw/2,y:y,w:bw,h:bh});
        y+=80+Math.random()*30; break;
      }
      case 'pit':{
        const pr=18+Math.random()*12;
        obstacles.push({type:'pit',x:left+pr+Math.random()*(trackW-pr*2),y:y,radius:pr});
        y+=100+Math.random()*50; break;
      }
      case 'wallCluster':{
        const ww=15+Math.random()*10, wh=30+Math.random()*40;
        const sx=left+20+Math.random()*(trackW-ww-40);
        obstacles.push({type:'wall',x:sx+ww/2,y:y,w:ww,h:wh});
        if(Math.random()>0.5) obstacles.push({type:'wall',x:sx+ww/2+25+Math.random()*20,y:y+Math.random()*20-10,w:ww,h:wh*0.8});
        y+=80+Math.random()*40; break;
      }
      case 'splitPath':{
        const sl=200+Math.random()*150, gap=50+Math.random()*20;
        const scx=left+trackW/2;
        obstacles.push({type:'splitWall',x:scx-gap/2,y:y+sl/2,w:10,h:sl});
        obstacles.push({type:'splitWall',x:scx+gap/2,y:y+sl/2,w:10,h:sl});
        y+=sl+30; break;
      }
      case 'movingGate':{
        const gw=60+Math.random()*40, gh=16;
        obstacles.push({type:'movingGate',x:left+20+Math.random()*(trackW-gw-40)+gw/2,y:y,w:gw,h:gh});
        y+=90+Math.random()*40; break;
      }
    }
    y+=Math.random()*80;
  }
  obstacles.push({type:'finishLine',x:State.worldWidth/2,y:length,w:State.worldWidth,h:8});
  return obstacles;
}

// ============================================================
// SECTION 6: Marble System
// ============================================================
function createMarbles(count){
  const shuffled=[...COUNTRIES].sort(()=>Math.random()-0.5);
  const selected=[]; for(let i=0;i<count;i++) selected.push(shuffled[i%shuffled.length]);
  const startY=100, left=getTrackLeft(startY), right=getTrackRight(startY);
  const spacing=(right-left-40)/Math.max(count,1);
  const marbles=[];
  for(let i=0;i<count;i++){
    const c=selected[i], cols=c.colors;
    marbles.push({
      x:left+20+spacing*i+spacing/2+(Math.random()-0.5)*8,
      y:startY+(Math.random()-0.5)*10,
      vx:(Math.random()-0.5)*20, vy:0,
      radius:count>20?11:count>12?13:15, mass:1,
      country:c, num:i+1, state:'racing', finishTime:null,
      stuckTimer:0, boosted:false, trail:[], color1:cols[0]||'#fff',
      color2:cols[1]||cols[0], color3:cols[2]||cols[1]
    });
  }
  return marbles;
}

function updateMarbles(dt,obstacles,trackLen){
  for(const m of State.marbles){
    Physics.updateMarble(m,dt,obstacles,trackLen);
  }
  // Marble-marble collisions (optimized with y-range check)
  for(let i=0;i<State.marbles.length;i++){
    const a=State.marbles[i]; if(a.state!=='racing') continue;
    for(let j=i+1;j<State.marbles.length;j++){
      const b=State.marbles[j]; if(b.state!=='racing') continue;
      if(Math.abs(a.y-b.y)>a.radius*4) continue;
      Physics.circCirc(a,b);
    }
  }
  // Trails
  for(const m of State.marbles){
    if(m.state==='eliminated') continue;
    if(Physics.len(m.vx,m.vy)>100){
      m.trail.push({x:m.x,y:m.y,life:1,color:m.color1});
      if(m.trail.length>12) m.trail.shift();
    }else if(m.trail.length>0&&Math.random()>0.5){ m.trail.shift(); }
    m.trail=m.trail.filter(t=>{t.life-=dt*2;return t.life>0});
  }
}

// ============================================================
// SECTION 7: Particle System
// ============================================================
const MAX_PARTICLES = 200;

function particle(x,y,vx,vy,color,size,life){
  return {x,y,vx,vy,color,size,life,maxLife:life};
}

function spawnParticles(x,y,count,colors,opts){
  const {speed=200,size=4,lifetime=0.8,spread=2}=opts||{};
  const active=State.activeParticles;
  for(let i=0;i<Math.min(count,15);i++){
    if(active.length>=MAX_PARTICLES) break;
    const ang=Math.random()*Math.PI*2;
    const spd=50+Math.random()*speed;
    active.push(particle(
      x,y,
      Math.cos(ang)*spd+(Math.random()-0.5)*spread,
      Math.sin(ang)*spd-Math.random()*speed*0.5,
      colors[Math.floor(Math.random()*colors.length)],
      size*(0.5+Math.random()*0.5),
      lifetime*(0.5+Math.random()*0.5)
    ));
  }
}
function spawnParticlesBurst(x,y,c){ spawnParticles(x,y,8,c,{speed:150,size:3,lifetime:0.4}); }
function spawnParticlesBoost(x,y){ spawnParticles(x,y,10,['#FFD93D','#FF8E53','#FFF'],{speed:200,size:4,lifetime:0.6}); }
function spawnParticlesFinish(m){
  spawnParticles(m.x,m.y,25,[m.color1,m.color2,m.color3,'#FFD700','#FFF'],{speed:250,size:5,lifetime:1.0});
  setTimeout(()=>spawnParticles(m.x,m.y,20,[m.color1,'#FFD700'],{speed:300,size:4,lifetime:0.8}),200);
}
function spawnParticlesPit(m){ spawnParticles(m.x,m.y,15,['#333','#666','#FF4444'],{speed:100,size:3,lifetime:0.6}); }

function updateParticles(dt){
  const arr=State.activeParticles;
  for(let i=arr.length-1;i>=0;i--){
    const p=arr[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=200*dt;
    p.life-=dt;
    p.vx*=0.98;
    if(p.life<=0) arr.splice(i,1);
  }
}

// ============================================================
// SECTION 8: Camera System
// ============================================================
function updateCamera(dt){
  let leadY=-Infinity, count=0;
  for(const m of State.marbles){
    if(m.state==='racing'||m.state==='finished'){ if(m.y>leadY)leadY=m.y; count++; }
  }
  if(count===0) return;
  const targetY=leadY-State.H*0.35;
  State.camera.targetY=Math.max(-100,Math.min(targetY,Settings.trackLength-State.H+100));
  State.camera.y+=(State.camera.targetY-State.camera.y)*Math.min(1,4*dt);
}

// ============================================================
// SECTION 9: Renderer
// ============================================================
function render(){
  const ctx=State.ctx, W=State.W, H=State.H, camY=State.camera.y;
  ctx.fillStyle='#0a0a1a'; ctx.fillRect(0,0,W,H);
  drawTrack(ctx,camY,H);
  drawObstacles(ctx,camY,H);
  for(const m of State.marbles){ if(m.state!=='eliminated')drawMarbleShadow(ctx,m,camY); }
  for(const m of State.marbles){ if(m.state!=='eliminated')drawTrails(ctx,m,camY); }
  for(const m of State.marbles){ if(m.state!=='eliminated')drawMarble(ctx,m,camY); }
  drawParticles(ctx,camY,H);
}

function drawTrack(ctx,camY,H){
  const trackLen=Settings.trackLength;
  // Background gradient
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0d0d2b'); g.addColorStop(0.5,'#1a0a2e'); g.addColorStop(1,'#0d0d2b');
  ctx.fillStyle=g; ctx.fillRect(0,0,State.W,H);
  // Track stripes
  for(let y=Math.floor(camY/30)*30; y<camY+H+30; y+=30){
    if(y<0||y>trackLen) continue;
    const l=getTrackLeft(y), r=getTrackRight(y);
    ctx.fillStyle=Math.floor(y/30)%2?'rgba(60,40,80,0.3)':'rgba(70,50,90,0.3)';
    ctx.fillRect(l,y-camY,r-l,30);
  }
  // Track borders
  for(let y=Math.floor(camY/12)*12; y<camY+H+12; y+=12){
    if(y<0||y>trackLen) continue;
    const l=getTrackLeft(y), r=getTrackRight(y), sy=y-camY;
    ctx.fillStyle=y%36<18?'rgba(255,255,255,0.12)':'rgba(100,100,255,0.08)';
    ctx.fillRect(l-3,sy,3,12); ctx.fillRect(r,sy,3,12);
  }
}

function drawObstacles(ctx,camY,H){
  for(const o of State.obstacles){
    const sy=o.y-camY;
    if(sy<-60||sy>H+60) continue;
    const sx=o.x;
    switch(o.type){
      case 'bumper':{
        ctx.beginPath(); ctx.arc(sx,sy,o.radius,0,Math.PI*2);
        const bg=ctx.createRadialGradient(sx-3,sy-3,2,sx,sy,o.radius);
        bg.addColorStop(0,'#FF8E53'); bg.addColorStop(0.6,'#FF6B6B'); bg.addColorStop(1,'#CC4444');
        ctx.fillStyle=bg; ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=2; ctx.stroke();
        ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.arc(sx-4,sy-4,o.radius*0.3,0,Math.PI*2); ctx.fill();
        break;
      }
      case 'ramp':{
        ctx.save(); ctx.translate(sx,sy); ctx.rotate(o.angle);
        const hw=o.w/2, hh=o.h/2;
        const rg=ctx.createLinearGradient(-hw,0,hw,0);
        rg.addColorStop(0,'#6BCB77'); rg.addColorStop(0.5,'#8EDB9A'); rg.addColorStop(1,'#6BCB77');
        ctx.fillStyle=rg; ctx.fillRect(-hw,-hh,o.w,o.h);
        ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1; ctx.strokeRect(-hw,-hh,o.w,o.h);
        ctx.restore(); break;
      }
      case 'rotatingBar':{
        ctx.save(); ctx.translate(sx,sy); ctx.rotate(o.angle||0);
        const rg=ctx.createLinearGradient(-o.w/2,0,o.w/2,0);
        rg.addColorStop(0,'#FF6B6B'); rg.addColorStop(0.5,'#FFD93D'); rg.addColorStop(1,'#FF6B6B');
        ctx.fillStyle=rg; ctx.fillRect(-o.w/2,-o.h/2,o.w,o.h);
        ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1; ctx.strokeRect(-o.w/2,-o.h/2,o.w,o.h);
        ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fill();
        ctx.restore(); break;
      }
      case 'booster':{
        const pulse=0.6+0.4*Math.sin(Date.now()/200);
        ctx.save(); ctx.globalAlpha=pulse;
        const rg=ctx.createLinearGradient(sx-o.w/2,sy,sx+o.w/2,sy);
        rg.addColorStop(0,'rgba(255,200,50,0.4)'); rg.addColorStop(0.5,'rgba(255,230,100,0.6)'); rg.addColorStop(1,'rgba(255,200,50,0.4)');
        ctx.fillStyle=rg; ctx.fillRect(sx-o.w/2,sy-o.h/2,o.w,o.h);
        ctx.fillStyle='rgba(255,255,200,0.5)'; ctx.font='bold 14px sans-serif'; ctx.textAlign='center';
        ctx.fillText('⚡',sx,sy+5); ctx.restore(); break;
      }
      case 'pit':{
        ctx.beginPath(); ctx.arc(sx,sy,o.radius,0,Math.PI*2);
        const pg=ctx.createRadialGradient(sx,sy,1,sx,sy,o.radius);
        pg.addColorStop(0,'#1a1a2e'); pg.addColorStop(0.7,'#0a0a1a'); pg.addColorStop(1,'#000');
        ctx.fillStyle=pg; ctx.fill();
        ctx.strokeStyle='rgba(255,50,50,0.4)'; ctx.lineWidth=2; ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle='rgba(255,50,50,0.6)'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
        ctx.fillText('💀',sx,sy+4); break;
      }
      case 'wall':case 'splitWall':
        ctx.fillStyle='rgba(100,100,180,0.6)'; ctx.fillRect(sx-o.w/2,sy-o.h/2,o.w,o.h);
        ctx.strokeStyle='rgba(150,150,255,0.3)'; ctx.lineWidth=1; ctx.strokeRect(sx-o.w/2,sy-o.h/2,o.w,o.h); break;
      case 'movingGate':
        ctx.fillStyle='rgba(255,100,100,0.7)'; ctx.fillRect(sx-o.w/2,sy-o.h/2,o.w,o.h);
        ctx.strokeStyle='rgba(255,150,150,0.5)'; ctx.lineWidth=2; ctx.strokeRect(sx-o.w/2,sy-o.h/2,o.w,o.h); break;
      case 'finishLine':{
        for(let x=0;x<o.w;x+=40){
          for(let i=0;i<2;i++){
            ctx.fillStyle=i%2?'#000':'#FFF'; ctx.fillRect(o.x-o.w/2+x+i*20,sy,20,o.h);
          }
        }
        ctx.fillStyle='#FFD700'; ctx.font='bold 18px sans-serif'; ctx.textAlign='center';
        ctx.fillText('🏁 FINISH',o.x,sy-8); break;
      }
    }
  }
}

function drawMarbleShadow(ctx,m,camY){
  const sy=m.y-camY;
  if(sy<-50||sy>State.H+50) return;
  ctx.beginPath(); ctx.ellipse(m.x+3,sy+4,m.radius*0.8,m.radius*0.35,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fill();
}

function drawTrails(ctx,m,camY){
  if(Physics.len(m.vx,m.vy)<80||m.trail.length<2) return;
  for(const t of m.trail){
    const sy=t.y-camY;
    if(sy<-50||sy>State.H+50) continue;
    ctx.beginPath(); ctx.arc(t.x,sy,m.radius*(0.3+t.life*0.3),0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${t.life*0.3})`; ctx.fill();
  }
}

function drawMarble(ctx,m,camY){
  const sy=m.y-camY;
  if(sy<-50||sy>State.H+50) return;
  const r=m.radius;
  // Base ball
  const grad=ctx.createRadialGradient(m.x-r*0.3,sy-r*0.3,r*0.1,m.x,sy,r);
  grad.addColorStop(0,lighten(m.color1,40)); grad.addColorStop(0.6,m.color1); grad.addColorStop(1,darken(m.color1,30));
  ctx.beginPath(); ctx.arc(m.x,sy,r,0,Math.PI*2); ctx.fillStyle=grad; ctx.fill();
  // Flag pattern
  ctx.save(); ctx.beginPath(); ctx.arc(m.x,sy,r,0,Math.PI*2); ctx.clip();
  if(m.country.colors.length>=3){
    ctx.fillStyle=m.color2; ctx.fillRect(m.x-r,sy-r/2,r*2,r);
    ctx.fillStyle=m.color3; ctx.fillRect(m.x-r,sy+r/2,r*2,r);
  }else{
    ctx.beginPath(); ctx.arc(m.x,sy,r*0.55,0,Math.PI*2); ctx.fillStyle=m.color2; ctx.fill();
    if(m.color3&&m.color3!==m.color2){
      ctx.beginPath(); ctx.arc(m.x,sy,r*0.25,0,Math.PI*2); ctx.fillStyle=m.color3; ctx.fill();
    }
  }
  ctx.restore();
  ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1; ctx.stroke();
  // Shine
  ctx.beginPath(); ctx.arc(m.x-r*0.25,sy-r*0.25,r*0.25,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fill();
  // Number
  ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.font=`bold ${Math.max(8,r*0.65)}px sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(m.num,m.x,sy+0.5);
  // Name
  if(r>10){
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font=`${Math.max(7,r*0.5)}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText(m.country.name.length>12?m.country.name.slice(0,11)+'…':m.country.name,m.x,sy+r+2);
  }
}

function drawParticles(ctx,camY,H){
  for(const p of State.activeParticles){
    const sy=p.y-camY;
    if(sy<-20||sy>H+20) continue;
    ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,sy,p.size,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// Color helpers
function hexToRgb(h){ const v=parseInt(h.replace('#',''),16); return [(v>>16)&255,(v>>8)&255,v&255]; }
function rgbToHex(r,g,b){ return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1); }
function lighten(h,a){ const [r,g,b]=hexToRgb(h); return rgbToHex(Math.min(255,r+a),Math.min(255,g+a),Math.min(255,b+a)); }
function darken(h,a){ const [r,g,b]=hexToRgb(h); return rgbToHex(Math.max(0,r-a),Math.max(0,g-a),Math.max(0,b-a)); }

// ============================================================
// SECTION 10: Input Manager
// ============================================================
const Input = {
  setup(){
    document.addEventListener('keydown',e=>{
      const k=e.key;
      if(k===' '||k==='Space'||k==='Enter'){ e.preventDefault(); if(State.phase==='menu')startRace(); }
      if(k==='p'||k==='P'){ e.preventDefault(); if(State.phase==='racing')togglePause(); }
      if(k==='r'||k==='R'){ e.preventDefault(); if(State.phase==='racing'||State.phase==='finished')startRace(); }
      if(k==='f'||k==='F'){ e.preventDefault(); toggleFullscreen(); }
      if(k==='Escape'&&document.fullscreenElement) document.exitFullscreen();
    });
    document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
    document.addEventListener('touchstart',()=>AudioSystem.resume(),{once:true});
    document.addEventListener('click',()=>AudioSystem.resume(),{once:true});
  }
};

// ============================================================
// SECTION 11: Game Loop
// ============================================================
const FIXED_DT=1/60;
let accumulator=0, lastTime=0;

function gameLoop(timestamp){
  if(!lastTime)lastTime=timestamp;
  const frameTime=Math.min((timestamp-lastTime)/1000,0.05);
  lastTime=timestamp;
  if(!State.paused&&(State.phase==='racing'||State.phase==='countdown')){
    accumulator+=frameTime;
    while(accumulator>=FIXED_DT){
      if(State.phase==='racing')update(FIXED_DT);
      accumulator-=FIXED_DT;
    }
    render(); updateHUD();
  }else{
    render();
  }
  State.animFrameId=requestAnimationFrame(gameLoop);
}

function update(dt){
  State.elapsed+=dt;
  // Animate obstacles
  for(const o of State.obstacles){
    if(o.type==='rotatingBar'&&o.rotSpeed) o.angle=(o.angle||0)+o.rotSpeed*dt;
    if(o.type==='movingGate') o.y+=Math.sin(State.elapsed*2+o.x)*60*dt;
  }
  updateMarbles(dt,State.obstacles,Settings.trackLength);
  updateParticles(dt);
  updateCamera(dt);
  // Check race end
  if(State.marbles.every(m=>m.state!=='racing')&&State.raceStarted&&State.phase==='racing'){
    endRace();
  }
}

// ============================================================
// SECTION 12: UI Controller
// ============================================================
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startRace(){
  AudioSystem.init(); AudioSystem.resume();
  // Clear any running countdown
  if(State.countdownInterval){ clearInterval(State.countdownInterval); State.countdownInterval=null; }

  Settings.racerCount=parseInt(document.getElementById('racerCount').value)||12;
  Settings.speedMul=parseFloat(document.querySelector('.speed-btn[data-speed].active')?.dataset.speed)||1;
  Settings.trackLength=parseInt(document.querySelector('[data-length].active')?.dataset.length)||6000;
  Settings.gravity=800*Settings.speedMul;

  State.obstacles=generateTrack(Settings.trackLength);
  State.marbles=createMarbles(Settings.racerCount);
  State.totalRacers=Settings.racerCount; State.finishedCount=0; State.elapsed=0;
  State.paused=false; State.raceStarted=false; State.phase='countdown';
  State.camera.y=0; State.camera.targetY=0;
  State.activeParticles=[];
  accumulator=0;

  showScreen('gameScreen'); updateHUD();
  doCountdown();
}

function doCountdown(){
  const el=document.getElementById('countdown');
  let c=3; el.style.display='block'; el.className=''; el.textContent=c; AudioSystem.countBeep();
  State.countdownInterval=setInterval(()=>{
    c--;
    if(c>0){ el.textContent=c; el.className=''; AudioSystem.countBeep(); }
    else if(c===0){
      el.textContent='GO!'; el.className='go'; AudioSystem.go();
      State.phase='racing'; State.raceStarted=true;
      for(const m of State.marbles){ m.vy=50+Math.random()*30; m.vx+=(Math.random()-0.5)*30; }
      setTimeout(()=>{el.style.display='none';},800);
      clearInterval(State.countdownInterval); State.countdownInterval=null;
    }
  },800);
}

function togglePause(){
  State.paused=!State.paused;
  document.getElementById('btnPause').textContent=State.paused?'▶ Resume':'⏸ Pause';
}

function toggleFullscreen(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}

function newRace(){
  document.getElementById('racerCount').value=8+Math.floor(Math.random()*18);
  updateSettingDisplay(); startRace();
}

function endRace(){
  State.phase='finished'; showResults();
}

function updateSettingDisplay(){
  document.getElementById('racerCountVal').textContent=document.getElementById('racerCount').value;
}

function updateHUD(){
  const ms=State.elapsed*1000;
  document.getElementById('timer').textContent=
    `${String(Math.floor(ms/60000)).padStart(2,'0')}:${String(Math.floor((ms%60000)/1000)).padStart(2,'0')}.${String(Math.floor((ms%1000)/10)).padStart(2,'0')}`;
  const r=State.marbles.filter(m=>m.state==='racing').length;
  const e=State.marbles.filter(m=>m.state==='eliminated').length;
  const f=State.marbles.filter(m=>m.state==='finished').length;
  document.getElementById('remainingCount').textContent=`👥 ${r} racing · ${f} done · ${e} out`;

  // Ranking
  const sorted=[...State.marbles].sort((a,b)=>{
    const ap=a.state==='racing'?a.y:(a.state==='finished'?Settings.trackLength+1:-1);
    const bp=b.state==='racing'?b.y:(b.state==='finished'?Settings.trackLength+1:-1);
    return bp-ap;
  });
  let html='';
  for(let i=0;i<Math.min(10,sorted.length);i++){
    const m=sorted[i];
    const cls=i===0?'top1':i===1?'top2':i===2?'top3':'';
    const st=m.state==='finished'?'✅':m.state==='eliminated'?'💀':'';
    html+=`<div class="rank-item ${cls}"><span class="rank-num">#${i+1}</span><span class="rank-dot" style="background:${m.color1}"></span><span class="rank-name">${st} ${m.country.name}</span></div>`;
  }
  document.getElementById('rankingList').innerHTML=html;

  // Eliminated count on canvas
  if(e>0){
    const ctx=State.ctx;
    ctx.fillStyle='rgba(255,100,100,0.7)'; ctx.font='bold 14px sans-serif'; ctx.textAlign='left';
    ctx.fillText('💀 '+e+' eliminated',10,State.H-20);
  }
}

function showResults(){
  showScreen('resultScreen');
  const sorted=[...State.marbles].sort((a,b)=>{
    if(a.state==='finished'&&b.state==='finished') return a.finishTime-b.finishTime;
    if(a.state==='finished') return -1; if(b.state==='finished') return 1;
    if(a.state==='racing'&&b.state==='eliminated') return -1; if(b.state==='racing'&&a.state==='eliminated') return 1;
    return 0;
  });
  const w=sorted[0];
  document.getElementById('winnerName').textContent=`🥇 ${w.country.name}`;
  if(w.finishTime!==null){
    const t=w.finishTime*1000;
    document.getElementById('winnerTime').textContent=
      `Time: ${String(Math.floor(t/60000)).padStart(2,'0')}:${String(Math.floor((t%60000)/1000)).padStart(2,'0')}.${String(Math.floor((t%1000)/10)).padStart(2,'0')}`;
  }else document.getElementById('winnerTime').textContent='Last standing!';

  let html=`<div class="rt-header"><span class="rt-pos">#</span><span style="flex:1">Country</span><span class="rt-time">Time</span></div>`;
  for(let i=0;i<sorted.length;i++){
    const m=sorted[i], cls=i===0?'top1':i===1?'top2':i===2?'top3':'';
    let ts='—';
    if(m.state==='finished'&&m.finishTime!==null){
      const t=m.finishTime*1000; ts=`${Math.floor(t/1000)}.${String(Math.floor((t%1000)/10)).padStart(2,'0')}s`;
    }else if(m.state==='eliminated'){ts='💀';}
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    html+=`<div class="rt-row ${cls}"><span class="rt-pos">${medal||(i+1)}</span><span class="rt-dot" style="background:${m.color1}"></span><span class="rt-name">${m.country.name}</span><span class="rt-time">${ts}</span></div>`;
  }
  document.getElementById('resultsTable').innerHTML=html;
}

// ============================================================
// SECTION 13: Initialization
// ============================================================
function init(){
  State.canvas=document.getElementById('gameCanvas');
  State.ctx=State.canvas.getContext('2d');
  resize();
  window.addEventListener('resize',resize);

  document.getElementById('racerCount').addEventListener('input',function(){document.getElementById('racerCountVal').textContent=this.value;});
  document.querySelectorAll('.speed-btn[data-speed]').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('.speed-btn[data-speed]').forEach(x=>x.classList.remove('active'));this.classList.add('active');}));
  document.querySelectorAll('.speed-btn[data-length]').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('.speed-btn[data-length]').forEach(x=>x.classList.remove('active'));this.classList.add('active');}));

  document.getElementById('btnStartRace').addEventListener('click',startRace);
  document.getElementById('btnPause').addEventListener('click',togglePause);
  document.getElementById('btnRestart').addEventListener('click',startRace);
  document.getElementById('btnNewRace').addEventListener('click',newRace);
  document.getElementById('btnNewRace2').addEventListener('click',newRace);
  document.getElementById('btnFullscreen').addEventListener('click',toggleFullscreen);

  Input.setup();
  showScreen('preRaceScreen');
  lastTime=0; accumulator=0;
  State.animFrameId=requestAnimationFrame(gameLoop);
}

function resize(){
  State.W=window.innerWidth; State.H=window.innerHeight;
  State.canvas.width=State.W; State.canvas.height=State.H;
}

document.addEventListener('DOMContentLoaded',init);
</script>
