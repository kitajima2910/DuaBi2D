<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="application-name" content="Countries Marble Race" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.svg" />
  <link rel="icon" type="image/png" sizes="512x512" href="/assets/icons/icon-512.svg" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.svg" />
  <link rel="apple-touch-startup-image" href="/assets/icons/icon-512.svg" />
  <title>Countries Marble Race</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #0f172a; touch-action: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none; user-select: none;
    }
    #game-container { width: 100%; height: 100%; }
    canvas { display: block; }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #0f172a; color: #e2e8f0;
      font: 18px 'Segoe UI', system-ui, sans-serif; z-index: 9999;
      flex-direction: column; gap: 24px;
    }
    #loading-logo {
      font-size: 32px; font-weight: 800;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #334155; border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { color: #94a3b8; font-size: 14px; }
    #loading.hide { opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
  </style>
</head>
<body>
  <div id="loading">
    <div id="loading-logo">🏁 Countries Marble Race</div>
    <div class="spinner"></div>
    <span id="loading-text">Đang chuẩn bị đường đua...</span>
  </div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
