<html lang="en">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#111;touch-action:none;-webkit-user-select:none;user-select:none;font-family:'Segoe UI',Arial,sans-serif}
canvas{display:block;touch-action:none;width:100%;height:100%}
#game-container{position:relative;width:100%;height:100%;overflow:hidden}
#ui-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#hud{position:absolute;top:10px;left:10px;color:#fff;font-size:14px;pointer-events:none;text-shadow:0 0 5px rgba(0,0,0,.8);font-family:monospace}
#hud div{margin:2px 0}
#hud-boost-bar{width:120px;height:8px;background:rgba(255,255,255,.2);border-radius:4px;margin-top:4px;overflow:hidden}
#hud-boost-fill{height:100%;width:100%;background:linear-gradient(90deg,#f59e0b,#ef4444);border-radius:4px;transition:width .1s}
#lap-notification{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;color:#ffd700;text-shadow:0 0 30px rgba(255,200,0,.6);font-weight:bold;opacity:0;transition:opacity .5s;pointer-events:none}
#lap-notification.show{opacity:1;animation:lapPulse .8s ease-out}
@keyframes lapPulse{0%{transform:translate(-50%,-50%) scale(1.5);opacity:0}30%{opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
#mini-map{position:absolute;top:10px;right:10px;width:160px;height:160px;border:2px solid rgba(255,255,255,.4);border-radius:4px;background:rgba(0,0,0,.6);pointer-events:none}
#mobile-controls{position:absolute;bottom:20px;left:0;width:100%;display:none;pointer-events:none;justify-content:space-between;padding:0 20px;z-index:20}
.mctrl-btn{pointer-events:auto;width:64px;height:64px;border-radius:50%;border:2px solid rgba(255,255,255,.6);background:rgba(255,255,255,.15);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;touch-action:none;-webkit-tap-highlight-color:transparent;cursor:pointer}
.mctrl-btn:active{background:rgba(255,255,255,.35)}
#mctrl-left{position:absolute;left:20px;bottom:0}
#mctrl-right{position:absolute;left:100px;bottom:0}
#mctrl-boost{position:absolute;right:20px;bottom:0;width:80px;height:80px;font-size:14px;border-color:rgba(255,200,0,.6);background:rgba(255,200,0,.15)}
#mctrl-boost:active{background:rgba(255,200,0,.35)}
#mctrl-brake{position:absolute;right:110px;bottom:0;width:64px;height:64px;border-color:rgba(255,50,50,.6);background:rgba(255,50,50,.15)}
#mctrl-brake:active{background:rgba(255,50,50,.35)}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;pointer-events:none}
#overlay.active{pointer-events:auto}
#menu-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff}
#menu-screen h1{font-size:48px;margin-bottom:10px;text-shadow:0 0 20px rgba(255,200,0,.5);letter-spacing:4px}
#menu-screen .subtitle{font-size:16px;color:#aaa;margin-bottom:40px}
.menu-btn{pointer-events:auto;padding:14px 48px;margin:8px;font-size:18px;border:2px solid rgba(255,255,255,.4);border-radius:8px;background:rgba(255,255,255,.1);color:#fff;cursor:pointer;transition:all .2s;min-width:220px;text-align:center;font-family:inherit}
.menu-btn:hover{background:rgba(255,255,255,.2);transform:scale(1.05)}
.menu-btn.primary{background:#e94560;border-color:#e94560}
.menu-btn.primary:hover{background:#ff6b81}
#shop-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:40;display:none;flex-direction:column;align-items:center;color:#fff;overflow-y:auto}
#shop-screen h2{margin:20px 0;font-size:32px}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:20px;max-width:700px;width:100%}
.shop-item{border:2px solid rgba(255,255,255,.2);border-radius:8px;padding:16px;text-align:center;background:rgba(255,255,255,.05);cursor:pointer;transition:all .2s}
.shop-item:hover{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.1)}
.shop-item.owned{border-color:#4ade80}
.shop-item.equipped{border-color:#fbbf24;background:rgba(251,191,36,.15)}
.shop-item .preview{width:48px;height:48px;border-radius:50%;margin:0 auto 8px;border:2px solid rgba(255,255,255,.2)}
.shop-item .name{font-size:14px;margin-bottom:4px}
.shop-item .price{font-size:12px;color:#fbbf24}
.shop-item .badge{font-size:11px;padding:2px 8px;border-radius:4px;display:inline-block;margin-top:4px}
.shop-item .badge.owned{background:#4ade80;color:#000}
.shop-item .badge.equipped{background:#fbbf24;color:#000}
#options-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:40;display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff}
#options-screen h2{margin:20px 0;font-size:32px}
.option-row{display:flex;align-items:center;margin:12px 0;width:300px;justify-content:space-between}
.option-row label{font-size:16px}
.option-row input[type="range"]{width:150px}
#countdown-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;z-index:25;pointer-events:none}
#countdown-text{font-size:120px;color:#fff;text-shadow:0 0 40px rgba(255,200,0,.8);font-weight:bold;animation:pulse .5s ease-out}
@keyframes pulse{0%{transform:scale(2);opacity:0}50%{transform:scale(1);opacity:1}100%{transform:scale(.9);opacity:.8}}
#result-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:35;display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff}
#result-overlay h2{font-size:36px;margin-bottom:20px}
#result-list{font-size:18px;margin-bottom:30px;text-align:center}
#result-list div{margin:4px 0}
.result-pos{display:inline-block;width:30px;font-weight:bold}
.result-player{color:#fbbf24}
#pause-btn{position:absolute;top:10px;right:180px;padding:6px 14px;background:rgba(0,0,0,.5);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:4px;cursor:pointer;font-size:13px;pointer-events:auto;z-index:15;font-family:inherit}
#pause-btn:hover{background:rgba(0,0,0,.7)}
#fullscreen-btn{position:absolute;top:10px;right:90px;padding:6px 12px;background:rgba(0,0,0,.5);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:4px;cursor:pointer;font-size:13px;pointer-events:auto;z-index:15;font-family:inherit}
#fullscreen-btn:hover{background:rgba(0,0,0,.7)}
#pos-indicator{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);display:flex;gap:5px;align-items:center;padding:6px 14px;background:rgba(0,0,0,.6);border-radius:8px;border:1px solid rgba(255,255,255,.12);pointer-events:none;z-index:12}
.pos-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3);transition:all .3s;flex-shrink:0}
.pos-dot.player{width:13px;height:13px;border-color:#ffd700;box-shadow:0 0 8px rgba(255,200,0,.5)}
.pos-dot.finished{opacity:.3;transform:scale(.8)}
#controls-help{position:absolute;bottom:132px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.35);font-size:11px;text-align:center;pointer-events:none;font-family:monospace;white-space:nowrap;z-index:12}
#leaderboard{position:absolute;right:10px;top:180px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:8px 12px;color:#fff;font-size:11px;font-family:monospace;pointer-events:none;z-index:12;min-width:80px;display:none}
#leaderboard .lb-title{font-weight:bold;font-size:12px;margin-bottom:4px;color:#aaa;text-align:center;letter-spacing:1px}
#leaderboard .lb-row{display:flex;justify-content:space-between;gap:8px;padding:2px 0}
#leaderboard .lb-pos{color:#888;width:20px}
#leaderboard .lb-name{flex:1;overflow:hidden;text-overflow:ellipsis}
#leaderboard .lb-you{color:#ffd700;font-weight:bold}
#leaderboard .lb-dnf{color:#ff4444}
@media(max-width:600px){
  #menu-screen h1{font-size:32px}
  .menu-btn{padding:12px 32px;font-size:16px;min-width:180px}
  #mini-map{width:100px;height:100px;top:8px;right:8px}
  #hud{font-size:12px;top:8px;left:8px}
  #countdown-text{font-size:80px}
  #result-overlay h2{font-size:28px}
  #shop-screen h2{font-size:24px}
  .shop-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));padding:10px}
}
</style>
</head>
<body>
<div id="game-container">
<canvas id="game-canvas"></canvas>
<div id="ui-overlay">
  <div id="hud">
    <div id="hud-speed">0 km/h</div>
    <div id="hud-lap">Lap: 0/3</div>
    <div id="hud-pos">Position: 0/8</div>
    <div id="hud-coins">Coins: 0</div>
    <div>Boost</div>
    <div id="hud-boost-bar"><div id="hud-boost-fill" style="width:100%"></div></div>
  </div>
  <div id="pos-indicator"></div>
  <div id="controls-help">WASD / Arrows — Steer | Space — Boost | P — Pause</div>
  <div id="leaderboard"><div class="lb-title">STANDINGS</div></div>
  </div>
  <canvas id="mini-map" width="160" height="160"></canvas>
  <button id="pause-btn">⏸ Pause</button>
  <button id="fullscreen-btn">⛶ Full</button>
  <div id="mobile-controls">
    <div id="mctrl-left" class="mctrl-btn">◀</div>
    <div id="mctrl-right" class="mctrl-btn">▶</div>
    <div id="mctrl-boost" class="mctrl-btn">BOOST</div>
    <div id="mctrl-brake" class="mctrl-btn">BRAKE</div>
  </div>
  <div id="overlay"></div>
  <div id="lap-notification"></div>
  <div id="countdown-overlay"><div id="countdown-text">3</div></div>
  <div id="result-overlay">
    <h2>🏁 Race Complete!</h2>
    <div id="result-list"></div>
    <button class="menu-btn primary" onclick="game.showMenu()">Back to Menu</button>
  </div>
</div>
<div id="menu-screen">
  <h1>⚫ MARBLE RACING</h1>
  <div class="subtitle">2D - Pure Canvas Racing</div>
  <button class="menu-btn primary" onclick="game.startRace()">▶ PLAY</button>
  <button class="menu-btn" onclick="game.showShop()">🎨 SKINS</button>
  <button class="menu-btn" onclick="game.showOptions()">⚙ OPTIONS</button>
</div>
<div id="shop-screen">
  <h2>🎨 Skin Shop</h2>
  <div class="shop-grid" id="shop-grid"></div>
  <button class="menu-btn" onclick="game.showMenu()" style="margin:20px">← Back</button>
  <div style="color:#fbbf24;font-size:16px;margin-bottom:20px" id="shop-coins">Coins: 0</div>
</div>
<div id="options-screen">
  <h2>⚙ Options</h2>
  <div class="option-row"><label>Sound Volume</label><input type="range" id="opt-volume" min="0" max="100" value="70"></div>
  <div class="option-row"><label>Difficulty</label><select id="opt-difficulty" style="padding:4px 8px;font-size:14px">
    <option value="easy">Easy</option><option value="medium" selected>Medium</option><option value="hard">Hard</option>
  </select></div>
  <div class="option-row"><label>Reset All Data</label><button onclick="if(confirm('Reset all data?')){localStorage.removeItem('mr_save');game.loadSave();alert('Reset done!')}" style="padding:4px 12px;cursor:pointer">Reset</button></div>
  <button class="menu-btn" onclick="game.showMenu()" style="margin:30px">← Back</button>
</div>
</div>
<script>
'use strict';

// ============================================================
//  CẤU HÌNH GAME (Configuration)
//  Toàn bộ thông số game tập trung tại đây để dễ chỉnh sửa
// ============================================================
const CFG = {
  canvasW: 0, canvasH: 0,          // Kích thước canvas (sẽ được set khi resize)
  TRACK_MIN_RADIUS: 250,            // Bán kính tối thiểu của track (điều khiển độ cong)
  TRACK_MAX_RADIUS: 450,            // Bán kính tối đa — track càng to càng ít cong
  TRACK_WIDTH: 140,                 // Chiều rộng của đường đua (pixel)
  TRACK_RESOLUTION: 8,             // Số điểm nội suy giữa 2 control point (càng cao càng mượt)
  NUM_CONTROL_POINTS: 28,          // Số điểm điều khiển để sinh track (càng nhiều càng phức tạp)
  MARBLE_RADIUS: 10,                // Bán kính viên bi
  FRICTION: 0.985,                  // Hệ số ma sát (càng thấp càng trơn, 1 = không ma sát)
  WALL_BOUNCE: 0.5,                 // Hệ số nảy khi va vào tường (0 = dính, 1 = nảy hoàn toàn)
  GRAVITY: 0.0,                     // Trọng lực (chưa dùng trong top-down view)
  ACCELERATION: 0.15,               // Gia tốc cơ bản của xe
  BRAKE_FORCE: 0.08,                // Lực phanh (càng cao càng dừng nhanh)
  MAX_SPEED: 8,                     // Tốc độ tối đa (pixel/frame)
  BOOST_SPEED_MULT: 1.8,            // Hệ số nhân tốc độ khi boost
  BOOST_DRAIN: 0.5,                 // Tốc độ tiêu hao boost mỗi frame
  BOOST_REGEN: 0.15,               // Tốc độ hồi boost mỗi frame
  STEER_SPEED: 0.12,               // Tốc độ đánh lái của người chơi
  AI_STEER_SPEED: 0.10,            // Tốc độ đánh lái của AI (thấp hơn player 1 chút)
  NUM_AI: 7,                        // Số lượng AI racers (tổng = 8 racers)
  TOTAL_RACERS: 8,                  // Tổng số racers (1 player + 7 AI)
  LAPS: 3,                          // Số lap mỗi race
  NUM_CHECKPOINTS: 8,              // Số checkpoint trên track
};

// ============================================================
//  SKIN DATA — Danh sách skins cho marble
//  price: 0 = skin mặc định, free ai cũng có
//  rainbow: hiệu ứng đổi màu liên tục
// ============================================================
const SKINS = [
  { id:'red',     name:'Red Comet',         color:'#ef4444', trail:'#ef444480', price:0 },
  { id:'blue',    name:'Blue Streak',       color:'#3b82f6', trail:'#3b82f680', price:0 },
  { id:'green',   name:'Green Machine',     color:'#22c55e', trail:'#22c55e80', price:0 },
  { id:'yellow',  name:'Golden Flash',      color:'#eab308', trail:'#eab30880', price:0 },
  { id:'purple',  name:'Purple Haze',       color:'#a855f7', trail:'#a855f780', price:0 },
  { id:'orange',  name:'Orange Crush',      color:'#f97316', trail:'#f9731680', price:0 },
  { id:'pink',    name:'Pink Panther',      color:'#ec4899', trail:'#ec489980', price:100 },
  { id:'cyan',    name:'Cyan Wave',         color:'#06b6d4', trail:'#06b6d480', price:100 },
  { id:'white',   name:'White Lightning',   color:'#f8fafc', trail:'#f8fafc80', price:200 },
  { id:'rainbow', name:'Rainbow Road',      color:'#ff0000', trail:'#ff000080', price:500, rainbow:true },
  { id:'gold',    name:'Gold Emperor',      color:'#ffd700', trail:'#ffd70080', price:1000 },
  { id:'neon',    name:'Neon Night',        color:'#00ff88', trail:'#00ff8880', price:300 },
];

// ============================================================
//  SAVE SYSTEM
// ============================================================
function defaultSave() {
  return {
    coins: 0,
    ownedSkins: ['red','blue','green','yellow','purple','orange'],
    equippedSkin: 'red',
    difficulty: 'medium',
    volume: 70,
    highScores: [],
  };
}
function loadSave() {
  try {
    const d = JSON.parse(localStorage.getItem('mr_save'));
    if (d && d.ownedSkins) return d;
  } catch(e) {}
  return defaultSave();
}
function writeSave() { localStorage.setItem('mr_save', JSON.stringify(saveData)); }

let saveData = loadSave();

// ============================================================
//  HÀM TIỆN ÍCH (Utility functions)
//  Các hàm toán học và xử lý cơ bản dùng trong game
// ============================================================
function lerp(a, b, t) { return a + (b - a) * t; }           // Nội suy tuyến tính
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); } // Giới hạn giá trị
function dist(x1,y1,x2,y2) { return Math.hypot(x2-x1, y2-y1); }    // Khoảng cách Euclid
function rng(mn, mx) { return mn + Math.random() * (mx - mn); }    // Số thực ngẫu nhiên
function rngInt(mn, mx) { return Math.floor(rng(mn, mx + 1)); }    // Số nguyên ngẫu nhiên
function vecNormalize(x, y) { const l = Math.hypot(x, y); return l > 0 ? { x: x/l, y: y/l } : { x: 0, y: 0 }; } // Chuẩn hóa vector

// ============================================================
//  AUDIO ENGINE (Web Audio API — async khởi tạo khi user click)
// ============================================================
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.volume = saveData.volume / 100;
    this.initialized = false;
    this.oscillators = {};
  }
  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = this.volume;
      this.masterGain.connect(this.ctx.destination);
      this.initialized = true;
    } catch(e) { console.warn('Audio not available', e); }
  }
  setVolume(v) {
    this.volume = clamp(v, 0, 1);
    if (this.masterGain) this.masterGain.gain.value = this.volume;
  }
  playTone(freq, dur, type, vol) {
    if (!this.initialized || !this.ctx) return;
    try {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = type || 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime((vol||0.3) * this.volume, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
      osc.connect(gain);
      gain.connect(this.masterGain);
      osc.start();
      osc.stop(this.ctx.currentTime + dur);
    } catch(e) {}
  }
  beep() { this.playTone(800, 0.15, 'square', 0.2); }
  beepHigh() { this.playTone(1200, 0.15, 'sine', 0.25); }
  beepGo() { this.playTone(600, 0.4, 'square', 0.3); }
  playBoost() {
    if (!this.initialized || !this.ctx) return;
    try {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, this.ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(600, this.ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.15 * this.volume, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.4);
      osc.connect(gain);
      gain.connect(this.masterGain);
      osc.start();
      osc.stop(this.ctx.currentTime + 0.5);
    } catch(e) {}
  }
  playCrash() {
    if (!this.initialized || !this.ctx) return;
    try {
      const bufSize = this.ctx.sampleRate * 0.15;
      const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.15));
      const src = this.ctx.createBufferSource();
      const gain = this.ctx.createGain();
      src.buffer = buf;
      gain.gain.value = 0.2 * this.volume;
      src.connect(gain);
      gain.connect(this.masterGain);
      src.start();
    } catch(e) {}
  }
  playCoin() { this.playTone(1400, 0.1, 'sine', 0.2); setTimeout(() => this.playTone(1800, 0.1, 'sine', 0.2), 60); }
  playFinish() {
    [523, 659, 784, 1047].forEach((f, i) => {
      setTimeout(() => this.playTone(f, 0.3, 'sine', 0.25), i * 150);
    });
  }
  startEngine() {
    // Engine hum — continuous low oscillator
    if (!this.initialized || !this.ctx || this.oscillators.engine) return;
    try {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = 80;
      gain.gain.value = 0.04 * this.volume;
      osc.connect(gain);
      gain.connect(this.masterGain);
      osc.start();
      this.oscillators.engine = { osc, gain };
    } catch(e) {}
  }
  stopEngine() {
    if (this.oscillators.engine) {
      try { this.oscillators.engine.osc.stop(); } catch(e) {}
      this.oscillators.engine = null;
    }
  }
  updateEnginePitch(speed) {
    if (this.oscillators.engine) {
      try {
        const freq = 55 + Math.min(speed, CFG.MAX_SPEED) * 30;
        this.oscillators.engine.osc.frequency.value = freq;
        // Tăng âm lượng theo speed
        const vol = 0.02 + (speed / CFG.MAX_SPEED) * 0.06;
        if (this.oscillators.engine.gain) {
          this.oscillators.engine.gain.gain.value = vol * this.volume;
        }
      } catch(e) {}
    }
  }

  playSkid() {
    if (!this.initialized || !this.ctx) return;
    try {
      const bufSize = this.ctx.sampleRate * 0.2;
      const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.3)) * 0.5;
      }
      const src = this.ctx.createBufferSource();
      const gain = this.ctx.createGain();
      src.buffer = buf;
      gain.gain.value = 0.08 * this.volume;
      const filter = this.ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 1000;
      src.connect(filter);
      filter.connect(gain);
      gain.connect(this.masterGain);
      src.start();
    } catch(e) {}
  }

  playBoostLoop(on) {
    if (on && !this.oscillators.boostLoop) {
      try {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 400;
        gain.gain.value = 0.04 * this.volume;
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        this.oscillators.boostLoop = { osc, gain };
      } catch(e) {}
    } else if (!on && this.oscillators.boostLoop) {
      try {
        this.oscillators.boostLoop.gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.1);
        setTimeout(() => {
          try { this.oscillators.boostLoop.osc.stop(); } catch(e) {}
          this.oscillators.boostLoop = null;
        }, 150);
      } catch(e) {}
    }
  }
}

// ============================================================
//  PARTICLE SYSTEM
// ============================================================
class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = this.y = this.vx = this.vy = 0;
    this.life = this.maxLife = 0;
    this.size = 2;
    this.color = '#fff';
    this.active = false;
    this.type = 'dust'; // dust, spark, boost, coin
  }
}

class ParticleSystem {
  constructor(maxParticles = 400) {
    this.pool = [];
    this.active = [];
    for (let i = 0; i < maxParticles; i++) this.pool.push(new Particle());
  }
  acquire() {
    if (this.pool.length > 0) {
      const p = this.pool.pop();
      p.active = true;
      this.active.push(p);
      return p;
    }
    return null;
  }
  release(p) {
    p.active = false;
    const idx = this.active.indexOf(p);
    if (idx >= 0) this.active.splice(idx, 1);
    this.pool.push(p);
  }
  emit(x, y, opts = {}) {
    const count = opts.count || 3;
    for (let i = 0; i < count; i++) {
      const p = this.acquire();
      if (!p) break;
      p.x = x + rng(-2, 2);
      p.y = y + rng(-2, 2);
      p.type = opts.type || 'dust';
      p.color = opts.color || '#aaa';
      p.size = opts.size || rng(2, 5);
      p.maxLife = p.life = opts.life || rng(0.2, 0.6);
      const spd = opts.speed || rng(0.5, 2);
      const ang = opts.angle !== undefined ? opts.angle : rng(0, Math.PI * 2);
      p.vx = Math.cos(ang) * spd + (opts.driftX || 0);
      p.vy = Math.sin(ang) * spd + (opts.driftY || 0);
    }
  }
  emitDust(x, y, dx, dy, count = 2) {
    this.emit(x, y, { count, type:'dust', color:'#c8a97e', speed:rng(0.3,1), life:rng(0.2,0.4), driftX:dx, driftY:dy, size:rng(1,3) });
  }
  emitSpark(x, y, nx, ny) {
    this.emit(x, y, { count:5, type:'spark', color:'#ffdd44', speed:rng(1,3), life:rng(0.1,0.3), angle:Math.atan2(ny, nx), size:rng(1,2) });
  }
  emitBoost(x, y, dx, dy) {
    this.emit(x, y, { count:3, type:'boost', color:'#ff8800', speed:rng(2,4), life:rng(0.2,0.5), driftX:-dx*2, driftY:-dy*2, size:rng(3,6) });
  }
  emitCoin(x, y) {
    this.emit(x, y, { count:8, type:'coin', color:'#ffd700', speed:rng(1,3), life:rng(0.3,0.6), size:rng(2,4) });
  }
  update(dt) {
    for (let i = this.active.length - 1; i >= 0; i--) {
      const p = this.active[i];
      p.life -= dt;
      if (p.life <= 0) { this.release(p); continue; }
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.97;
      p.vy *= 0.97;
    }
  }
  render(ctx, camX, camY, camZoom) {
    for (const p of this.active) {
      const alpha = clamp(p.life / p.maxLife, 0, 1);
      const sx = p.x;
      const sy = p.y;
      const margin2 = 50 / camZoom;
      const halfW2 = (CFG.canvasW / 2) / camZoom + margin2;
      const halfH2 = (CFG.canvasH / 2) / camZoom + margin2;
      if (p.x < camX - halfW2 || p.x > camX + halfW2 || p.y < camY - halfH2 || p.y > camY + halfH2) continue;
      ctx.globalAlpha = alpha * 0.8;
      ctx.fillStyle = p.color;
      const sz = p.size;
      ctx.beginPath();
      ctx.arc(sx, sy, Math.max(sz, 0.5), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  clear() {
    while (this.active.length > 0) this.release(this.active[0]);
  }
}

// ============================================================
//  TRACK GENERATOR — Procedural closed circuit
// ============================================================
class TrackGenerator {
  generate(seed) {
    // Sinh control points ngẫu nhiên tạo circuit kín
    const cx = 0, cy = 0;
    const n = CFG.NUM_CONTROL_POINTS;
    const pts = [];
    const baseR = rng(CFG.TRACK_MIN_RADIUS, CFG.TRACK_MAX_RADIUS);
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2;
      const r = baseR + rng(-120, 120);
      const rx = r + rng(-40, 40) * Math.sin(a * 3);
      const ry = r + rng(-40, 40) * Math.cos(a * 2);
      pts.push({ x: cx + rx * Math.cos(a) - ry * Math.sin(a) * 0.3, y: cy + rx * Math.sin(a) + ry * Math.cos(a) * 0.3 });
    }

    // Catmull-Rom → centerline
    const cl = [];
    const segs = CFG.TRACK_RESOLUTION;
    for (let i = 0; i < n; i++) {
      const p0 = pts[(i - 1 + n) % n];
      const p1 = pts[i];
      const p2 = pts[(i + 1) % n];
      const p3 = pts[(i + 2) % n];
      for (let s = 0; s < segs; s++) {
        const t = s / segs;
        const t2 = t * t, t3 = t2 * t;
        const x = 0.5 * ((2*p1.x) + (-p0.x + p2.x)*t + (2*p0.x - 5*p1.x + 4*p2.x - p3.x)*t2 + (-p0.x + 3*p1.x - 3*p2.x + p3.x)*t3);
        const y = 0.5 * ((2*p1.y) + (-p0.y + p2.y)*t + (2*p0.y - 5*p1.y + 4*p2.y - p3.y)*t2 + (-p0.y + 3*p1.y - 3*p2.y + p3.y)*t3);
        cl.push({ x, y });
      }
    }

    // Tính normals + wall points
    const m = cl.length;
    const norms = [];
    const iw = [], ow = [];
    let totalLen = 0;
    const segLen = [];
    for (let i = 0; i < m; i++) {
      const j = (i + 1) % m;
      const dx = cl[j].x - cl[i].x;
      const dy = cl[j].y - cl[i].y;
      const len = Math.hypot(dx, dy);
      totalLen += len;
      segLen.push(len);
      const nx = len > 0 ? -dy / len : 0;
      const ny = len > 0 ? dx / len : 0;
      norms.push({ x: nx, y: ny });
    }

    // Smooth normals (moving average)
    const smoothNorms = [];
    for (let i = 0; i < m; i++) {
      const p = norms[(i - 1 + m) % m];
      const c = norms[i];
      const n = norms[(i + 1) % m];
      smoothNorms.push({ x: (p.x + c.x + n.x) / 3, y: (p.y + c.y + n.y) / 3 });
    }
    for (let i = 0; i < m; i++) {
      const n = smoothNorms[i];
      const hl = Math.hypot(n.x, n.y);
      if (hl > 0) { n.x /= hl; n.y /= hl; }
    }

    const hw = CFG.TRACK_WIDTH / 2;
    for (let i = 0; i < m; i++) {
      const n = smoothNorms[i];
      iw.push({ x: cl[i].x - n.x * hw, y: cl[i].y - n.y * hw });
      ow.push({ x: cl[i].x + n.x * hw, y: cl[i].y + n.y * hw });
    }

    // Track segments with types
    const trackSegs = [];
    const types = ['straight', 'straight', 'turn', 'straight', 'turn', 'straight', 'straight', 'hazard', 'straight', 'boost'];
    const typeTags = ['', '', '', '', '', '', '', '', '', ''];
    for (let i = 0; i < m; i += 4) {
      const ti = Math.floor(i / 4) % types.length;
      trackSegs.push({
        startIdx: i,
        endIdx: Math.min(i + 4, m - 1),
        type: types[ti],
      });
    }

    // Checkpoints — lines across track
    const cps = [];
    const cpStep = Math.floor(m / CFG.NUM_CHECKPOINTS);
    for (let i = 0; i < CFG.NUM_CHECKPOINTS; i++) {
      const idx = (i * cpStep) % m;
      const n = smoothNorms[idx];
      cps.push({
        idx,
        x1: cl[idx].x - n.x * hw,
        y1: cl[idx].y - n.y * hw,
        x2: cl[idx].x + n.x * hw,
        y2: cl[idx].y + n.y * hw,
        cx: cl[idx].x,
        cy: cl[idx].y,
        passed: false,
      });
    }

    // Obstacles — trên track
    const obs = [];
    for (let i = 0; i < 15; i++) {
      const idx = rngInt(0, m - 1);
      const n = smoothNorms[idx];
      const side = rng(-0.3, 0.3);
      const ox = cl[idx].x + n.x * side * hw;
      const oy = cl[idx].y + n.y * side * hw;
      obs.push({
        x: ox, y: oy, radius: rng(6, 12),
        type: Math.random() < 0.5 ? 'bumper' : 'hazard',
        active: true,
      });
    }

    // Boosters
    const boosters = [];
    for (let i = 0; i < 12; i++) {
      const idx = rngInt(0, m - 1);
      if (idx % 3 === 0) continue; // tránh trùng
      const n = smoothNorms[idx];
      const side = rng(-0.3, 0.3);
      boosters.push({
        x: cl[idx].x + n.x * side * hw,
        y: cl[idx].y + n.y * side * hw,
        active: true,
        respawnTime: 0,
      });
    }

    // Coins
    const coins = [];
    for (let i = 0; i < 40; i++) {
      const idx = rngInt(0, m - 1);
      const n = smoothNorms[idx];
      const side = rng(-0.35, 0.35);
      coins.push({
        x: cl[idx].x + n.x * side * hw,
        y: cl[idx].y + n.y * side * hw,
        collected: false,
      });
    }

    return {
      centerline: cl,
      innerWall: iw,
      outerWall: ow,
      normals: smoothNorms,
      numPoints: m,
      totalLength: totalLen,
      segLengths: segLen,
      segments: trackSegs,
      checkpoints: cps,
      obstacles: obs,
      boosters,
      coins,
      width: CFG.TRACK_WIDTH,
      halfWidth: hw,
      centerX: 0,
      centerY: 0,
    };
  }
}

// ============================================================
//  PHYSICS ENGINE — Circle collision, wall collision
//  Toàn bộ vật lý tự code (custom), không dùng thư viện
//  Gồm: phát hiện va chạm circle-circle, circle-line,
//  phản hồi va chạm (elastic), ràng buộc track
// ============================================================
class Physics {
  /**
   * Tìm điểm gần nhất trên centerline của track so với vị trí (px, py)
   * Dùng 2-pass: coarse scan (step = 1/200 chiều dài) → refine local
   * Trả về { index, dist, point }
   */
  static closestPointOnPath(px, py, cl) {
    let minD = Infinity, bestIdx = 0;
    const step = Math.max(1, Math.floor(cl.length / 200));
    for (let i = 0; i < cl.length; i += step) {
      const d = dist(px, py, cl[i].x, cl[i].y);
      if (d < minD) { minD = d; bestIdx = i; }
    }
    // Refine local
    const searchR = Math.max(10, Math.floor(cl.length / 50));
    const start = Math.max(0, bestIdx - searchR);
    const end = Math.min(cl.length - 1, bestIdx + searchR);
    for (let i = start; i <= end; i++) {
      const d = dist(px, py, cl[i].x, cl[i].y);
      if (d < minD) { minD = d; bestIdx = i; }
    }
    return { index: bestIdx, dist: minD, point: cl[bestIdx] };
  }

  // Kiểm tra marble có trong track không, trả về normal + overlap
  static constrainToTrack(marble, track) {
    const { x, y, radius } = marble;
    const cp = Physics.closestPointOnPath(x, y, track.centerline);
    const n = track.normals[cp.index];
    // Direction from centerline to marble
    const dx = x - cp.point.x;
    const dy = y - cp.point.y;
    const side = dx * n.x + dy * n.y; // positive = outer side
    const absD = Math.abs(side);
    const maxD = track.halfWidth - radius;
    if (absD > maxD) {
      // Push back
      const overlap = absD - maxD;
      if (side > 0) {
        marble.x -= n.x * overlap;
        marble.y -= n.y * overlap;
      } else {
        marble.x += n.x * overlap;
        marble.y += n.y * overlap;
      }
      // Reflect velocity
      const vDotN = marble.vx * n.x + marble.vy * n.y;
      if (vDotN * side > 0) {
        marble.vx -= 2 * vDotN * n.x * CFG.WALL_BOUNCE;
        marble.vy -= 2 * vDotN * n.y * CFG.WALL_BOUNCE;
      }
      return true; // collision occurred
    }
    return false;
  }

  // Circle vs Circle collision
  static circlesCollide(a, b) {
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const d = Math.hypot(dx, dy);
    const minD = a.radius + b.radius;
    if (d >= minD || d < 0.001) return false;
    const overlap = minD - d;
    const nx = dx / d, ny = dy / d;
    // Separate
    const totalM = a.mass + b.mass;
    a.x -= nx * overlap * (b.mass / totalM);
    a.y -= ny * overlap * (b.mass / totalM);
    b.x += nx * overlap * (a.mass / totalM);
    b.y += ny * overlap * (a.mass / totalM);
    // Elastic collision response
    const dvx = a.vx - b.vx;
    const dvy = a.vy - b.vy;
    const vDotN = dvx * nx + dvy * ny;
    if (vDotN > 0) {
      const imp = (2 * vDotN) / totalM;
      a.vx -= imp * b.mass * nx;
      a.vy -= imp * b.mass * ny;
      b.vx += imp * a.mass * nx;
      b.vy += imp * a.mass * ny;
    }
    return true;
  }

  // Circle vs Rect (obstacle)
  static circleRectCollide(cx, cy, cr, rx, ry, rw, rh) {
    const nearX = clamp(cx, rx - rw/2, rx + rw/2);
    const nearY = clamp(cy, ry - rh/2, ry + rh/2);
    const dx = cx - nearX, dy = cy - nearY;
    const d2 = dx*dx + dy*dy;
    if (d2 >= cr*cr) return false;
    const d = Math.sqrt(d2);
    if (d < 0.001) return { nx: 0, ny: -1, overlap: cr };
    const overlap = cr - d;
    return { nx: dx/d, ny: dy/d, overlap };
  }

  static circleCircleOverlap(cx, cy, cr, ox, oy, or) {
    const dx = ox - cx, dy = oy - cy;
    const d = Math.hypot(dx, dy);
    const minD = cr + or;
    if (d >= minD || d < 0.001) return null;
    return { nx: dx/d, ny: dy/d, overlap: minD - d };
  }
}


// ============================================================
//  MARBLE CLASS — Mỗi racer (player + AI)
//  Quản lý: vị trí, vận tốc, vật lý, lap, coins, boost, trail
//  Mỗi marble là 1 hình tròn tự do trong không gian 2D,
//  bị ràng buộc bởi track walls và các marble khác
// ============================================================
class Marble {
  constructor(id, isPlayer = false) {
    this.id = id;                       // ID duy nhất (0 = player, 1-7 = AI)
    this.isPlayer = isPlayer;           // true nếu là người chơi
    this.x = 0; this.y = 0;            // Vị trí trong không gian world
    this.vx = 0; this.vy = 0;          // Vận tốc (pixels per frame)
    this.radius = CFG.MARBLE_RADIUS;   // Bán kính hình tròn
    this.mass = 1;                      // Khối lượng (dùng cho va chạm elastic)
    this.color = '#fff';                // Màu sắc (từ skin)
    this.trailColor = '#ffffff40';      // Màu vệt trail
    this.trail = [];                   // Lưu N vị trí gần nhất để vẽ trail
    this.maxTrail = 15;                // Số điểm trail tối đa
    this.lap = 0;                      // Lap hiện tại (0-based)
    this.finished = false;             // Đã hoàn thành race?
    this.finishTime = 0;               // Thời gian hoàn thành
    this.finishOrder = 0;              // Thứ tự về đích
    this.checkpointsPassed = new Set();// Set các checkpoint đã đi qua
    this.coins = 0;                    // Số coin thu thập (tạm thời)
    this.speed = 0;                    // Tốc độ hiện tại (magnitude của velocity)
    this.boostAmount = 100;            // Lượng boost còn lại (0-100)
    this.boosting = false;             // Đang bật boost?
    this.brake = false;                // Đang phanh?
    this.steerInput = 0;               // Đầu vào lái (-1 trái, 1 phải)
    this.forwardInput = false;         // Đầu vào tiến
    this.trackIndex = 0;               // Index gần nhất trên centerline
    this.trackDist = 0;                // Khoảng cách đã đi (0-1 normalized)
    this.lastTrackIndex = 0;           // Track index ở frame trước (để phát hiện qua line)
    this.crossedFinish = false;        // Đã qua finish line?
    this.respawnTimer = 0;             // Timer hồi sinh (giây)
    this.collisionCooldown = 0;        // Cooldown va chạm marble-marble
    this.obstacleCooldown = 0;         // Cooldown va chạm obstacle (chống kẹt)
    // Skins
    this.applySkin(saveData.equippedSkin); // Áp dụng skin từ save data
  }

  applySkin(skinId) {
    const skin = SKINS.find(s => s.id === skinId) || SKINS[0];
    this.color = skin.color;
    this.trailColor = skin.trail || skin.color + '80';
    this.skinId = skinId;
    this.rainbow = skin.rainbow || false;
  }

  getProgress() {
    // Chuẩn hóa 0-1 dựa trên lap + track position
    return this.lap + this.trackDist;
  }

  reset(x, y) {
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.trail = [];
    this.lap = 0;
    this.finished = false;
    this.finishTime = 0;
    this.finishOrder = 0;
    this.checkpointsPassed = new Set();
    this.coins = 0;
    this.speed = 0;
    this.boostAmount = 100;
    this.boosting = false;
    this.brake = false;
    this.steerInput = 0;
    this.forwardInput = false;
    this.trackIndex = 0;
    this.trackDist = 0;
    this.lastTrackIndex = 0;
    this.crossedFinish = false;
    this.alive = true;
    this.respawnTimer = 0;
    this.collisionCooldown = 0;
    this.obstacleCooldown = 0;
  }

  update(dt, track, particles) {
    if (this.finished) {
      // Slow down gradually after finish
      this.vx *= 0.95;
      this.vy *= 0.95;
      this.updatePosition(dt);
      this.updateTrail();
      this.updateTrackInfo(track);
      this.speed = Math.hypot(this.vx, this.vy);
      return;
    }

    // Respawn timer
    if (this.respawnTimer > 0) {
      this.respawnTimer -= dt;
      this.vx *= 0.9;
      this.vy *= 0.9;
      if (this.respawnTimer <= 0) {
        this.respawnAtCheckpoint(track);
      }
      this.updatePosition(dt);
      this.speed = Math.hypot(this.vx, this.vy);
      return;
    }

    // Collision cooldowns
    if (this.collisionCooldown > 0) this.collisionCooldown -= dt;
    if (this.obstacleCooldown > 0) this.obstacleCooldown -= dt;

    // Player input → forces
    let ax = 0, ay = 0;

    // Forward acceleration — AI luôn chạy trừ khi brake
    if (this.forwardInput && !this.brake) {
      const idx = this.trackIndex;
      if (track.centerline && track.centerline.length > 0) {
        const nextIdx = (idx + 1) % track.numPoints;
        const dirX = track.centerline[nextIdx].x - track.centerline[idx].x;
        const dirY = track.centerline[nextIdx].y - track.centerline[idx].y;
        const dirLen = Math.hypot(dirX, dirY);
        if (dirLen > 0) {
          const fwdX = dirX / dirLen, fwdY = dirY / dirLen;
          let accel = CFG.ACCELERATION;
          if (this.boosting && this.boostAmount > 0) {
            accel *= CFG.BOOST_SPEED_MULT;
            this.boostAmount -= CFG.BOOST_DRAIN * dt * 60;
            if (this.boostAmount < 0) this.boostAmount = 0;
          }
          ax += fwdX * accel;
          ay += fwdY * accel;
        }
      }
    }

    // Brake
    if (this.brake) {
      ax -= this.vx * CFG.BRAKE_FORCE;
      ay -= this.vy * CFG.BRAKE_FORCE;
    }

    // Steering (lateral movement)
    if (this.steerInput !== 0) {
      const idx = this.trackIndex;
      const n = track.normals[idx];
      const steerStr = (this.isPlayer ? CFG.STEER_SPEED : CFG.AI_STEER_SPEED) * this.steerInput;
      ax += n.x * steerStr;
      ay += n.y * steerStr;
    }

    // Apply acceleration
    this.vx += ax;
    this.vy += ay;

    // Friction
    this.vx *= CFG.FRICTION;
    this.vy *= CFG.FRICTION;

    // Speed cap
    let maxSpd = CFG.MAX_SPEED;
    if (this.boosting && this.boostAmount > 0) maxSpd *= CFG.BOOST_SPEED_MULT;
    const spd = Math.hypot(this.vx, this.vy);
    if (spd > maxSpd) {
      this.vx = (this.vx / spd) * maxSpd;
      this.vy = (this.vy / spd) * maxSpd;
    }

    // Boost regen
    if (!this.boosting) {
      this.boostAmount = Math.min(100, this.boostAmount + CFG.BOOST_REGEN * dt * 60);
    }

    this.speed = Math.hypot(this.vx, this.vy);

    // Update position
    this.updatePosition(dt);

    // Constrain to track
    const hitWall = Physics.constrainToTrack(this, track);
    if (hitWall) {
      particles.emitDust(this.x, this.y, -this.vx*0.5, -this.vy*0.5, 3);
      if (this.speed > 3) {
        particles.emitSpark(this.x, this.y, -this.vx, -this.vy);
        audio.playCrash();
      }
    }

    // Update track info
    this.updateTrackInfo(track);

    // Check out-of-bounds (fell off track)
    this.checkOutOfBounds(track);

    // Check checkpoint crossing
    this.checkCheckpoints(track);

    // Trail
    this.updateTrail();

    // Particles from movement
    if (this.speed > 1 && Math.random() < this.speed * 0.02) {
      particles.emitDust(this.x, this.y, -this.vx*0.3, -this.vy*0.3, 1);
    }
    if (this.boosting && this.speed > 2) {
      particles.emitBoost(this.x, this.y, this.vx / this.speed, this.vy / this.speed);
    }
  }

  updatePosition(dt) {
    this.x += this.vx;
    this.y += this.vy;
  }

  updateTrail() {
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > this.maxTrail) this.trail.shift();
  }

  updateTrackInfo(track) {
    const cp = Physics.closestPointOnPath(this.x, this.y, track.centerline);
    this.trackIndex = cp.index;
    this.trackDist = cp.index / track.numPoints;

    // Track progress (handling wrap-around)
    if (this.lastTrackIndex > track.numPoints * 0.8 && cp.index < track.numPoints * 0.2) {
    if (!this.crossedFinish) {
        this.lap++;
        this.crossedFinish = true;
        if (this.isPlayer) {
          // Hiển thị thông báo lap cho người chơi
          if (this.lap >= CFG.LAPS) {
            game.showLapNotification('🏁 FINAL LAP!');
          } else {
            game.showLapNotification('Lap ' + this.lap + ' Complete!');
          }
        }
        if (this.lap >= CFG.LAPS) {
          this.finished = true;
          this.finishTime = performance.now();
          audio.playFinish();
        }
      }
    }
    if (cp.index > track.numPoints * 0.2 && this.lastTrackIndex < track.numPoints * 0.2) {
      this.crossedFinish = false;
    }
    this.lastTrackIndex = cp.index;
  }

  checkOutOfBounds(track) {
    // If too far from track
    const d = dist(this.x, this.y, track.centerline[this.trackIndex].x, track.centerline[this.trackIndex].y);
    if (d > track.halfWidth + this.radius * 3) {
      // Fell off — respawn
      this.respawnTimer = 1.0; // 1 giây penalty
      this.vx = 0; this.vy = 0;
    }
  }

  respawnAtCheckpoint(track) {
    // Tìm checkpoint gần nhất đã pass
    let bestCp = null;
    let bestDist = Infinity;
    for (let i = 0; i < track.checkpoints.length; i++) {
      const cp = track.checkpoints[i];
      if (this.checkpointsPassed.has(i)) {
        const d = dist(this.x, this.y, cp.cx, cp.cy);
        if (d < bestDist) { bestDist = d; bestCp = cp; }
      }
    }
    if (!bestCp) {
      // Fallback: checkpoint đầu tiên
      bestCp = track.checkpoints[0];
    }
    this.x = bestCp.cx;
    this.y = bestCp.cy;
    this.vx = 0; this.vy = 0;
    this.respawnTimer = 0;
  }

  checkCheckpoints(track) {
    for (let i = 0; i < track.checkpoints.length; i++) {
      const cp = track.checkpoints[i];
      if (this.checkpointsPassed.has(i)) continue;
      // Check if marble crossed this checkpoint line
      const d = dist(this.x, this.y, cp.cx, cp.cy);
      if (d < track.halfWidth * 0.5) {
        this.checkpointsPassed.add(i);
        // If this is last checkpoint before finish, allow crossing
        if (i === 0 && this.checkpointsPassed.size >= CFG.NUM_CHECKPOINTS * 0.7) {
          // Passed enough checkpoints
        }
        break;
      }
    }
  }

  collectCoin(coinIdx, coins) {
    if (!coins[coinIdx].collected) {
      coins[coinIdx].collected = true;
      this.coins++;
      return true;
    }
    return false;
  }

  render(ctx, camX, camY, camZoom, showTrail = true) {
    const sx = this.x;
    const sy = this.y;
    const sr = this.radius * camZoom;

    // Off screen check — camera viewport + margin
    const margin = 50 / camZoom;
    const halfW = (CFG.canvasW / 2) / camZoom + margin;
    const halfH = (CFG.canvasH / 2) / camZoom + margin;
    if (sx < camX - halfW || sx > camX + halfW || sy < camY - halfH || sy > camY + halfH) return;

    // Trail
    if (showTrail && this.trail.length > 2) {
      for (let i = 1; i < this.trail.length; i++) {
        const t = this.trail[i];
        const prev = this.trail[i - 1];
        const alpha = (i / this.trail.length) * 0.4;
        const tsx = t.x;
        const tsy = t.y;
        const psx = prev.x;
        const psy = prev.y;
        ctx.strokeStyle = this.trailColor;
        ctx.globalAlpha = alpha;
        ctx.lineWidth = sr * 0.6;
        ctx.beginPath();
        ctx.moveTo(psx, psy);
        ctx.lineTo(tsx, tsy);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    // Speed lines
    if (this.speed > 4) {
      const intensity = (this.speed - 4) / 4;
      ctx.globalAlpha = intensity * 0.3;
      for (let i = 0; i < 3; i++) {
        const ang = Math.atan2(this.vy, this.vx) + Math.PI + rng(-0.5, 0.5);
        const len = rng(15, 30) * intensity;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(sx + Math.cos(ang) * sr, sy + Math.sin(ang) * sr);
        ctx.lineTo(sx + Math.cos(ang) * (sr + len), sy + Math.sin(ang) * (sr + len));
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    // Marble body
    ctx.save();
    // Gradient for 3D effect
    const grad = ctx.createRadialGradient(
      sx - sr * 0.3, sy - sr * 0.3, sr * 0.1,
      sx, sy, sr
    );
    if (this.rainbow) {
      const hue = (performance.now() * 0.005 + this.id * 50) % 360;
      grad.addColorStop(0, `hsl(${hue}, 100%, 70%)`);
      grad.addColorStop(0.7, `hsl(${hue}, 100%, 50%)`);
      grad.addColorStop(1, `hsl(${hue}, 100%, 30%)`);
    } else {
      grad.addColorStop(0, '#fff');
      grad.addColorStop(0.3, this.color);
      grad.addColorStop(1, this.darkenColor(this.color, 0.5));
    }
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fill();

    // Shine highlight
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.ellipse(sx - sr * 0.25, sy - sr * 0.25, sr * 0.35, sr * 0.2, -0.5, 0, Math.PI * 2);
    ctx.fill();

    // Border
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    // Boost effect: outer glow ring + flame particles
    if (this.boosting && this.boostAmount > 0) {
      // Outer pulsing ring
      const pulse = 0.4 + 0.4 * Math.sin(performance.now() * 0.015);
      ctx.strokeStyle = `rgba(255,200,0,${pulse})`;
      ctx.lineWidth = 2.5 * camZoom;
      ctx.beginPath();
      ctx.arc(sx, sy, sr + 5 * camZoom, 0, Math.PI * 2);
      ctx.stroke();

      // Secondary glow
      ctx.strokeStyle = `rgba(255,100,0,${pulse * 0.4})`;
      ctx.lineWidth = 5 * camZoom;
      ctx.beginPath();
      ctx.arc(sx, sy, sr + 8 * camZoom, 0, Math.PI * 2);
      ctx.stroke();

      // Boost flame trail (vẽ phía sau marble theo hướng di chuyển)
      if (this.speed > 1) {
        const angle = Math.atan2(this.vy, this.vx);
        for (let f = 0; f < 3; f++) {
          const dist = sr * (0.5 + f * 0.4);
          const spread = rng(-0.3, 0.3);
          const fx = sx - Math.cos(angle + spread) * dist;
          const fy = sy - Math.sin(angle + spread) * dist;
          const size = rng(2, 5) * camZoom * (1 - f * 0.2);
          ctx.fillStyle = `rgba(255,${150 - f * 50},0,${0.5 - f * 0.15})`;
          ctx.beginPath();
          ctx.arc(fx, fy, size, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }

  darkenColor(hex, factor) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgb(${Math.floor(r*factor)},${Math.floor(g*factor)},${Math.floor(b*factor)})`;
  }
}


// ============================================================
//  AI CONTROLLER — Tự động lái cho AI racers
//  Mỗi AI có 3 cấp độ: easy / medium / hard
//  - easy: chậm, phản xạ kém, hay mắc lỗi
//  - medium: trung bình, thi đấu công bằng
//  - hard: nhanh, phản xạ tốt, ít sai sót
//  AI lái bằng cách nhắm vào điểm phía trước trên centerline
//  và tự động tránh tường + dùng boost hợp lý
// ============================================================
class AIController {
  constructor(marble, difficulty) {
    this.marble = marble;                      // Marble cần điều khiển
    this.difficulty = difficulty;               // 'easy', 'medium', 'hard'
    // === THÔNG SỐ KỸ NĂNG ===
    this.speedMult = difficulty === 'easy' ? 0.7 : difficulty === 'medium' ? 0.9 : 1.1; // Hệ số tốc độ
    this.reactionTime = difficulty === 'easy' ? 0.3 : difficulty === 'medium' ? 0.15 : 0.05; // Thời gian phản xạ
    this.mistakeChance = difficulty === 'easy' ? 0.02 : difficulty === 'medium' ? 0.008 : 0.003; // Xác suất mắc lỗi
    this.mistakeTimer = 0;                     // Timer giữ lỗi hiện tại
    this.currentMistake = 0;                   // 0 = bình thường, -1 = lệch trái, 1 = lệch phải
    this.lookAhead = difficulty === 'easy' ? 5 : difficulty === 'medium' ? 10 : 20; // Số điểm nhìn trước trên track
    this.boostTimer = 0;                       // Timer quản lý boost
    this.aggression = difficulty === 'easy' ? 0.3 : difficulty === 'medium' ? 0.6 : 0.9; // Mức độ quyết đoán
  }

  update(dt, track, allMarbles) {
    const m = this.marble;
    if (m.finished || m.respawnTimer > 0) return;

    const idx = m.trackIndex;

    // Check for mistakes
    this.mistakeTimer -= dt;
    if (this.mistakeTimer <= 0 && Math.random() < this.mistakeChance) {
      this.currentMistake = Math.random() < 0.5 ? -1 : 1;
      this.mistakeTimer = rng(0.3, 1.0) * (this.difficulty === 'easy' ? 2 : 1);
    }
    if (this.mistakeTimer < -0.5) {
      this.currentMistake = 0;
    }

    // Look ahead on track
    const lookIdx = Math.min(idx + this.lookAhead, track.numPoints - 1);
    const target = track.centerline[lookIdx];

    // Calculate desired direction
    const dx = target.x - m.x;
    const dy = target.y - m.y;
    const d = Math.hypot(dx, dy);
    if (d < 0.1) { m.steerInput = 0; return; }

    // Check if we're near walls
    const cp = Physics.closestPointOnPath(m.x, m.y, track.centerline);
    const n = track.normals[cp.index];
    const side = (m.x - cp.point.x) * n.x + (m.y - cp.point.y) * n.y;
    const wallDist = track.halfWidth - Math.abs(side);

    // Steer toward target + avoid walls
    const tgtAngle = Math.atan2(dy, dx);
    const currentAngle = Math.atan2(m.vy, m.vx);
    let angleDiff = tgtAngle - currentAngle;
    if (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
    if (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

    let steer = clamp(angleDiff * 2, -1, 1);

    // Wall avoidance
    if (wallDist < 20) {
      const wallAvoid = side > 0 ? -0.5 : 0.5;
      steer = steer * 0.5 + wallAvoid * 0.5;
    }

    // Mistake
    if (this.currentMistake !== 0) {
      steer += this.currentMistake * 0.5;
    }

    m.steerInput = clamp(steer, -1, 1);

    // Forward movement — always on for AI
    // Obstacle stun: giảm lái + tiến để marble bay ra khỏi obstacle
    if (m.obstacleCooldown > 0) {
      m.steerInput *= 0.3;     // Giảm lái để không quay đầu vào obstacle
      m.forwardInput = true;   // Vẫn tiến để thoát
      m.brake = false;
    } else {
      m.forwardInput = true;
      m.brake = false;
    }

    // Boost usage
    this.boostTimer -= dt;
    if (this.boostTimer <= 0 && m.boostAmount > 50 && wallDist > 30) {
      m.boosting = true;
      this.boostTimer = rng(0.5, 1.5);
    } else if (m.boostAmount < 20 || wallDist < 15) {
      m.boosting = false;
    }

    // Speed modulation based on track ahead
    if (this.difficulty === 'hard' && wallDist < 15) {
      m.brake = true; // Brake in tight spots (hard AI is more cautious)
    }
  }
}

// ============================================================
//  CAMERA — Follow player with lerp + auto-zoom
// ============================================================
class Camera {
  constructor() {
    this.x = 0; this.y = 0;
    this.zoom = 1;
    this.targetZoom = 1;
  }

  follow(target, speed) {
    // Lerp position
    this.x = lerp(this.x, target.x, 0.08);
    this.y = lerp(this.y, target.y, 0.08);

    // Auto-zoom based on speed — zoom ra khi chạy nhanh (zoom < 1 = zoom out)
    const speedFactor = clamp(speed / CFG.MAX_SPEED, 0, 1);
    this.targetZoom = 1 - speedFactor * 0.25; // Zoom out = 0.75x khi max speed
    if (this.targetZoom < 0.5) this.targetZoom = 0.5;
    this.zoom = lerp(this.zoom, this.targetZoom, 0.03);
  }

  reset(x, y) {
    this.x = x; this.y = y;
    this.zoom = 1;
    this.targetZoom = 1;
  }
}

// ============================================================
//  MINI MAP
// ============================================================
class MiniMap {
  constructor(canvasId) {
    this.canvas = document.getElementById(canvasId);
    this.ctx = this.canvas.getContext('2d');
    this.size = 160;
  }

  render(track, marbles, camX, camY) {
    const ctx = this.ctx;
    const w = this.size, h = this.size;
    ctx.clearRect(0, 0, w, h);

    // Background
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, w, h);

    // Calculate bounding box of track
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const p of track.innerWall) {
      if (p.x < minX) minX = p.x;
      if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.y > maxY) maxY = p.y;
    }
    for (const p of track.outerWall) {
      if (p.x < minX) minX = p.x;
      if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.y > maxY) maxY = p.y;
    }

    const pad = 10;
    const mapW = maxX - minX + pad * 2;
    const mapH = maxY - minY + pad * 2;
    const scale = Math.min((w - 8) / mapW, (h - 8) / mapH);
    const ox = -(minX - pad) * scale + 4;
    const oy = -(minY - pad) * scale + 4;

    function mx(x) { return x * scale + ox; }
    function my(y) { return y * scale + oy; }

    // Draw track outline
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < track.innerWall.length; i++) {
      const p = track.innerWall[i];
      i === 0 ? ctx.moveTo(mx(p.x), my(p.y)) : ctx.lineTo(mx(p.x), my(p.y));
    }
    ctx.closePath();
    ctx.stroke();

    ctx.beginPath();
    for (let i = 0; i < track.outerWall.length; i++) {
      const p = track.outerWall[i];
      i === 0 ? ctx.moveTo(mx(p.x), my(p.y)) : ctx.lineTo(mx(p.x), my(p.y));
    }
    ctx.closePath();
    ctx.stroke();

    // Track centerline (dashed)
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 3]);
    ctx.beginPath();
    for (let i = 0; i < track.centerline.length; i++) {
      const p = track.centerline[i];
      i === 0 ? ctx.moveTo(mx(p.x), my(p.y)) : ctx.lineTo(mx(p.x), my(p.y));
    }
    ctx.closePath();
    ctx.stroke();
    ctx.setLineDash([]);

    // Camera viewport
    const hw = CFG.canvasW / 2 / scale;
    const hh = CFG.canvasH / 2 / scale;
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.strokeRect(mx(camX - hw), my(camY - hh), hw * 2 * scale, hh * 2 * scale);

    // Marbles
    for (const m of marbles) {
      const r = Math.max(2, m.radius * scale * 1.5);
      ctx.fillStyle = m.color;
      ctx.beginPath();
      ctx.arc(mx(m.x), my(m.y), r, 0, Math.PI * 2);
      ctx.fill();
      if (m.isPlayer) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(mx(m.x), my(m.y), r + 1.5, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // Checkpoints
    ctx.fillStyle = 'rgba(255,255,100,0.3)';
    for (const cp of track.checkpoints) {
      ctx.beginPath();
      ctx.arc(mx(cp.cx), my(cp.cy), 2, 0, Math.PI * 2);
      ctx.fill();
    }

    // Finish line highlight
    if (track.checkpoints.length > 0) {
      const cp = track.checkpoints[0];
      ctx.strokeStyle = '#ff4444';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(mx(cp.x1), my(cp.y1));
      ctx.lineTo(mx(cp.x2), my(cp.y2));
      ctx.stroke();
    }
  }
}


// ============================================================
//  GAME CLASS — Main game loop, state management, rendering
// ============================================================
class Game {
  constructor() {
    this.canvas = document.getElementById('game-canvas');
    this.ctx = this.canvas.getContext('2d');
    this.miniMap = new MiniMap('mini-map');

    this.state = 'menu'; // menu, countdown, racing, paused, result
    this.track = null;
    this.marbles = [];
    this.aiControllers = [];
    this.camera = new Camera();
    this.particles = new ParticleSystem(400);
    this.raceTime = 0;
    this.finishOrder = 0;
    this.countdownValue = 3;
    this.countdownTimer = 0;
    this.animationId = null;
    this.lastTime = 0;

    // Track generator
    this.trackGen = new TrackGenerator();

    // Input state
    this.keys = {};
    this.touchInput = { left: false, right: false, boost: false, brake: false };
    this.setupInput();
    this.setupResponsive();

    // Bind
    this.loop = this.loop.bind(this);
  }

  setupInput() {
    // Keyboard
    document.addEventListener('keydown', (e) => {
      this.keys[e.key] = true;
      if (e.key === 'p' || e.key === 'P') this.togglePause();
    });
    document.addEventListener('keyup', (e) => {
      this.keys[e.key] = false;
    });

    // Touch controls
    const setupTouch = (id, key) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('touchstart', (e) => { e.preventDefault(); this.touchInput[key] = true; }, { passive: false });
      el.addEventListener('touchend', (e) => { e.preventDefault(); this.touchInput[key] = false; }, { passive: false });
      el.addEventListener('touchcancel', (e) => { this.touchInput[key] = false; });
      el.addEventListener('mousedown', () => { this.touchInput[key] = true; });
      el.addEventListener('mouseup', () => { this.touchInput[key] = false; });
      el.addEventListener('mouseleave', () => { this.touchInput[key] = false; });
    };
    setupTouch('mctrl-left', 'left');
    setupTouch('mctrl-right', 'right');
    setupTouch('mctrl-boost', 'boost');
    setupTouch('mctrl-brake', 'brake');

    // Pause button
    document.getElementById('pause-btn').addEventListener('click', () => this.togglePause());
    // Fullscreen button
    document.getElementById('fullscreen-btn').addEventListener('click', () => {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        document.body.requestFullscreen().catch(() => {});
      }
    });

    // Detect mobile
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
      document.getElementById('mobile-controls').style.display = 'flex';
    }

    // Anti-scroll
    document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
  }

  setupResponsive() {
    const resize = () => {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const dpr = window.devicePixelRatio || 1;
      this.canvas.width = w * dpr;
      this.canvas.height = h * dpr;
      this.canvas.style.width = w + 'px';
      this.canvas.style.height = h + 'px';
      CFG.canvasW = w;
      CFG.canvasH = h;
      this.ctx.scale(dpr, dpr);
      // Adjust mini-map size
      const mm = document.getElementById('mini-map');
      if (w < 600) {
        mm.style.width = '100px';
        mm.style.height = '100px';
        this.miniMap.size = 100;
        mm.width = 100; mm.height = 100;
      } else {
        mm.style.width = '160px';
        mm.style.height = '160px';
        this.miniMap.size = 160;
        mm.width = 160; mm.height = 160;
      }
    };
    window.addEventListener('resize', resize);
    resize();
    // Handle orientation change
    window.addEventListener('orientationchange', () => setTimeout(resize, 300));
  }

  // ===================== MENU BACKGROUND ANIMATION =====================
  menuParticles() {
    const canvas = this.canvas;
    const ctx = this.ctx;
    const animParticles = [];
    for (let i = 0; i < 30; i++) {
      animParticles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: 3 + Math.random() * 6,
        vx: rng(-0.5, 0.5),
        vy: rng(-0.3, 0.3),
        color: `hsl(${Math.random() * 60 + 200}, 50%, ${40 + Math.random() * 30}%)`,
        alpha: 0.1 + Math.random() * 0.3,
      });
    }
    const animate = () => {
      if (this.state !== 'menu') return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // Background
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, '#1a1a2e');
      grad.addColorStop(0.5, '#16213e');
      grad.addColorStop(1, '#0f3460');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Track-like path
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 2;
      for (let t = 0; t < Math.PI * 2; t += 0.05) {
        const px = canvas.width/2 + 200 * Math.cos(t) + 50 * Math.sin(t * 3);
        const py = canvas.height/2 + 150 * Math.sin(t) + 30 * Math.cos(t * 2);
        ctx.fillStyle = 'rgba(255,200,100,0.03)';
        ctx.beginPath();
        ctx.arc(px, py, 40, 0, Math.PI * 2);
        ctx.fill();
      }

      // Particles
      for (const p of animParticles) {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      requestAnimationFrame(animate);
    };
    animate();
  }

  // ===================== STATE MANAGEMENT =====================

  showMenu() {
    this.state = 'menu';
    document.getElementById('menu-screen').style.display = 'flex';
    document.getElementById('shop-screen').style.display = 'none';
    // Kích hoạt hiệu ứng nền menu
    this.menuParticles();
    document.getElementById('options-screen').style.display = 'none';
    document.getElementById('result-overlay').style.display = 'none';
    document.getElementById('countdown-overlay').style.display = 'none';
    document.getElementById('pause-btn').style.display = 'none';
    document.getElementById('overlay').classList.remove('active');
    document.getElementById('mobile-controls').style.display = 'none';
    audio.stopEngine();
    if (this.animationId) { cancelAnimationFrame(this.animationId); this.animationId = null; }
  }

  showShop() {
    document.getElementById('menu-screen').style.display = 'none';
    const shop = document.getElementById('shop-screen');

  }

  showOptions() {
    document.getElementById('menu-screen').style.display = 'none';

    document.getElementById('opt-difficulty').value = saveData.difficulty;
