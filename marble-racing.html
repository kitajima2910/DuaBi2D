  renderShop() {
    const grid = document.getElementById('shop-grid');
    grid.innerHTML = '';
    document.getElementById('shop-coins').textContent = 'Coins: ' + saveData.coins;

    for (const skin of SKINS) {
      const item = document.createElement('div');
      item.className = 'shop-item';
      const owned = saveData.ownedSkins.includes(skin.id);
      const equipped = saveData.equippedSkin === skin.id;

      if (owned) item.classList.add('owned');
      if (equipped) item.classList.add('equipped');

      const preview = document.createElement('div');
      preview.className = 'preview';
      preview.style.background = skin.color;
      if (skin.rainbow) {
        preview.style.background = 'linear-gradient(90deg, #ff0000, #ff8800, #ffff00, #00ff00, #0088ff, #8800ff)';
      }
      item.appendChild(preview);

      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = skin.name;
      item.appendChild(name);

      const price = document.createElement('div');
      price.className = 'price';
      if (owned) {
        price.innerHTML = equipped ? '<span class="badge equipped">EQUIPPED</span>' : '<span class="badge owned">OWNED</span>';
      } else {
        price.textContent = skin.price + ' coins';
      }
      item.appendChild(price);

      item.onclick = () => {
        if (equipped) return;
        if (owned) {
          saveData.equippedSkin = skin.id;
          writeSave();
          this.renderShop();
          return;
        }
        if (saveData.coins >= skin.price) {
          saveData.coins -= skin.price;
          saveData.ownedSkins.push(skin.id);
          saveData.equippedSkin = skin.id;
          writeSave();
          this.renderShop();
          audio.playCoin();
        } else {
          alert('Not enough coins! Need ' + (skin.price - saveData.coins) + ' more.');
        }
      };

      grid.appendChild(item);
    }

    // Thêm coins từ save vào shop
    document.getElementById('shop-coins').textContent = 'Coins: ' + saveData.coins;
  }

  togglePause() {
    if (this.state === 'racing') {
      this.state = 'paused';
      document.getElementById('overlay').classList.add('active');
      document.getElementById('overlay').innerHTML = '<div style="background:rgba(0,0,0,0.8);padding:40px;border-radius:12px;text-align:center"><h2 style="color:#fff;margin-bottom:20px">⏸ PAUSED</h2><button class="menu-btn primary" onclick="game.resume()">▶ Resume</button><button class="menu-btn" onclick="game.restart()">🔄 Restart</button><button class="menu-btn" onclick="game.showMenu()">🏠 Menu</button></div>';
    } else if (this.state === 'paused') {
      this.resume();
    }
  }

  resume() {
    this.state = 'racing';
    document.getElementById('overlay').classList.remove('active');
    document.getElementById('overlay').innerHTML = '';
  }

  restart() {
    cancelAnimationFrame(this.animationId);
    document.getElementById('overlay').classList.remove('active');
    this.startRace();
  }

  // ===================== RACE START =====================

  startRace() {
    audio.init();

    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('shop-screen').style.display = 'none';
    document.getElementById('options-screen').style.display = 'none';
    document.getElementById('result-overlay').style.display = 'none';
    document.getElementById('pause-btn').style.display = 'block';

    // Show mobile controls if touch device
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
      document.getElementById('mobile-controls').style.display = 'flex';
    }

    // Generate track
    this.track = this.trackGen.generate();

    // Create marbles
    this.marbles = [];
    this.aiControllers = [];
    const playerMarble = new Marble(0, true);
    playerMarble.color = SKINS.find(s => s.id === saveData.equippedSkin)?.color || '#ef4444';
    playerMarble.trailColor = (SKINS.find(s => s.id === saveData.equippedSkin)?.trail) || '#ef444480';
    playerMarble.skinId = saveData.equippedSkin;
    playerMarble.rainbow = SKINS.find(s => s.id === saveData.equippedSkin)?.rainbow || false;

    // Position marbles at start (checkpoint 0)
    const startCp = this.track.checkpoints[0];
    const startX = startCp.cx;
    const startY = startCp.cy;

    playerMarble.reset(startX, startY);
    this.marbles.push(playerMarble);

    // AI marbles
    const aiColors = ['#ef4444', '#3b82f6', '#22c55e', '#eab308', '#a855f7', '#f97316', '#ec4899'];
    const aiNames = ['AI-1', 'AI-2', 'AI-3', 'AI-4', 'AI-5', 'AI-6', 'AI-7'];
    const difficulties = this.getAIDifficulties();
    const diffNames = ['easy', 'medium', 'hard'];

    for (let i = 0; i < CFG.NUM_AI; i++) {
      const m = new Marble(i + 1, false);
      m.color = aiColors[i];
      m.trailColor = aiColors[i] + '80';
      const offset = (i + 1) * 20;
      // Spread AI along start line
      const frac = (i + 1) / (CFG.NUM_AI + 1);
      const sx = startCp.x1 + (startCp.x2 - startCp.x1) * frac;
      const sy = startCp.y1 + (startCp.y2 - startCp.y1) * frac;
      m.reset(sx, sy);
      m.aiName = aiNames[i];
      this.marbles.push(m);

      const diff = diffNames[difficulties[i]];
      const ai = new AIController(m, diff);
      this.aiControllers.push(ai);
    }

    // Camera
    this.camera.reset(startX, startY);

    // Particles
    this.particles.clear();

    // Race state
    this.raceTime = 0;
    this.finishOrder = 0;
    this.state = 'countdown';
    this.countdownValue = 3;
    this.countdownTimer = 1.0;

    // HUD
    this.updateHUD();

    // Show countdown overlay
    const cdOverlay = document.getElementById('countdown-overlay');
    cdOverlay.style.display = 'flex';
    document.getElementById('countdown-text').textContent = '3';

    // Start engine audio
    audio.startEngine();

    // Start loop
    this.lastTime = performance.now();
    if (this.animationId) cancelAnimationFrame(this.animationId);
    this.animationId = requestAnimationFrame(this.loop);
  }

  getAIDifficulties() {
    const diffSettings = [];
    const diff = saveData.difficulty || 'medium';

    if (diff === 'easy') {
      // Mostly easy, some medium
      for (let i = 0; i < CFG.NUM_AI; i++) {
        diffSettings.push(Math.random() < 0.3 ? 1 : 0); // 0=easy, 1=medium
      }
    } else if (diff === 'hard') {
      for (let i = 0; i < CFG.NUM_AI; i++) {
        diffSettings.push(Math.random() < 0.3 ? 1 : 2); // 1=medium, 2=hard
      }
    } else {
      // Medium — mix
      for (let i = 0; i < CFG.NUM_AI; i++) {
        const r = Math.random();
        diffSettings.push(r < 0.3 ? 0 : r < 0.7 ? 1 : 2);
      }
    }
    return diffSettings;
  }

  // ===================== MAIN LOOP =====================

  loop(timestamp) {
    const dt = Math.min((timestamp - this.lastTime) / 1000, 0.05); // Cap at 50ms
    this.lastTime = timestamp;

    if (this.state === 'countdown') {
      this.updateCountdown(dt);
    } else if (this.state === 'racing' || this.state === 'paused') {
      if (this.state === 'racing') {
        this.updateRace(dt);
      }
    }

    this.render();
    this.updateHUD();

    this.animationId = requestAnimationFrame(this.loop);
  }

  updateCountdown(dt) {
    this.countdownTimer -= dt;
    if (this.countdownTimer <= 0) {
      this.countdownValue--;
      if (this.countdownValue > 0) {
        document.getElementById('countdown-text').textContent = String(this.countdownValue);
        this.countdownTimer = 1.0;
        audio.beep();
      } else if (this.countdownValue === 0) {
        document.getElementById('countdown-text').textContent = 'GO!';
        this.countdownTimer = 0.5;
        audio.beepGo();
      } else {
        // GO done
        document.getElementById('countdown-overlay').style.display = 'none';
        this.state = 'racing';
        // Apply player skin to marble 0
        this.marbles[0].applySkin(saveData.equippedSkin);
      }
    }
  }

  updateRace(dt) {
    this.raceTime += dt;

    // Get player input
    const player = this.marbles[0];
    this.processInput(player);

    // Update AI
    for (const ai of this.aiControllers) {
      ai.update(dt, this.track, this.marbles);
    }

    // Update all marbles
    for (const m of this.marbles) {
      m.update(dt, this.track, this.particles);
    }

    // Marble-marble collisions
    this.checkMarbleCollisions();

    // Coins
    this.checkCoinCollection();

    // Boosters
    this.checkBoosters();

    // Obstacles
    this.checkObstacles();

    // Check finish
    this.checkFinish();

    // Update particles
    this.particles.update(dt);

    // Update camera
    this.camera.follow(player, player.speed);

    // Audio
    audio.updateEnginePitch(player.speed);
    if (player.boosting && player.boostAmount > 0) {
      audio.playBoostLoop(true);
    } else {
      audio.playBoostLoop(false);
    }
  }

  processInput(m) {
    // Keyboard
    const left = this.keys['ArrowLeft'] || this.keys['a'] || this.keys['A'];
    const right = this.keys['ArrowRight'] || this.keys['d'] || this.keys['D'];
    const up = this.keys['ArrowUp'] || this.keys['w'] || this.keys['W'];
    const down = this.keys['ArrowDown'] || this.keys['s'] || this.keys['S'];
    const space = this.keys[' '];

    // Touch
    const tLeft = this.touchInput.left;
    const tRight = this.touchInput.right;
    const tBoost = this.touchInput.boost;
    const tBrake = this.touchInput.brake;

    m.steerInput = 0;
    if (left || tLeft) m.steerInput = -1;
    if (right || tRight) m.steerInput = 1;

    m.forwardInput = (up || space || !down) && !tBrake;
    m.brake = down || tBrake;
    m.boosting = (space || tBoost) && m.boostAmount > 0;

    // Auto-forward if no input
    if (!up && !down && !space && !tBoost) {
      m.forwardInput = true;
    }
  }

  checkMarbleCollisions() {
    for (let i = 0; i < this.marbles.length; i++) {
      for (let j = i + 1; j < this.marbles.length; j++) {
        const a = this.marbles[i];
        const b = this.marbles[j];
        if (a.finished && b.finished) continue;
        if (a.collisionCooldown > 0 || b.collisionCooldown > 0) continue;
        if (Physics.circlesCollide(a, b)) {
          a.collisionCooldown = 0.1;
          b.collisionCooldown = 0.1;
          // Sound + particles
          const mx = (a.x + b.x) / 2;
          const my = (a.y + b.y) / 2;
          this.particles.emitSpark(mx, my, 0, 0);
          if (Math.hypot(a.vx - b.vx, a.vy - b.vy) > 2) {
            audio.playCrash();
          }
        }
      }
    }
  }

  checkCoinCollection() {
    const player = this.marbles[0];
    for (let i = 0; i < this.track.coins.length; i++) {
      const coin = this.track.coins[i];
      if (coin.collected) continue;
      // Check all marbles (but only player gets coins added to save)
      for (const m of this.marbles) {
        if (m.finished) continue;
        const d = dist(m.x, m.y, coin.x, coin.y);
        if (d < m.radius + 8) {
          if (!coin.collected) {
            coin.collected = true;
            if (m.isPlayer) {
              saveData.coins++;
              writeSave();
              audio.playCoin();
              this.particles.emitCoin(coin.x, coin.y);
            }
          }
          break;
        }
      }
    }
  }

  checkBoosters() {
    for (const b of this.track.boosters) {
      if (!b.active) {
        b.respawnTime -= 0.016;
        if (b.respawnTime <= 0) { b.active = true; }
        continue;
      }
      for (const m of this.marbles) {
        if (m.finished) continue;
        const d = dist(m.x, m.y, b.x, b.y);
        if (d < m.radius + 12) {
          m.boostAmount = Math.min(100, m.boostAmount + 30);
          m.boosting = true;
          b.active = false;
          b.respawnTime = 3.0; // Respawn sau 3s
          this.particles.emitBoost(b.x, b.y, 0, 0);
          audio.playBoost();
          break;
        }
      }
    }
  }

  checkObstacles() {
    for (const obs of this.track.obstacles) {
      if (!obs.active) continue;
      for (const m of this.marbles) {
        if (m.finished || m.respawnTimer > 0) continue;
        // Skip if still in obstacle cooldown (tránh kẹt liên tục)
        if (m.obstacleCooldown > 0) continue;
        const overlap = Physics.circleCircleOverlap(m.x, m.y, m.radius, obs.x, obs.y, obs.radius);
        if (overlap) {
          // overlap.nx, overlap.ny hướng từ marble → obstacle
          // Đẩy marble ra xa obstacle gấp 3 lần overlap để đảm bảo không còn dính
          const pushStr = 3;
          m.x -= overlap.nx * overlap.overlap * pushStr;
          m.y -= overlap.ny * overlap.overlap * pushStr;

          if (obs.type === 'bumper') {
            // Bật marble ra xa với tốc độ mạnh hơn vận tốc hiện tại
            const spd = Math.max(Math.hypot(m.vx, m.vy), 5);
            // overlap.nx, overlap.ny hướng từ marble → obstacle → đảo chiều
            m.vx = -overlap.nx * spd * 1.5;
            m.vy = -overlap.ny * spd * 1.5;
            // Cooldown 300ms tránh kẹt
            m.obstacleCooldown = 0.3;
            audio.playCrash();
            this.particles.emitSpark(obs.x, obs.y, -overlap.nx, -overlap.ny);
          } else {
            // Hazard — slow down + đẩy nhẹ ra
            m.vx = -overlap.nx * 2;
            m.vy = -overlap.ny * 2;
            m.boostAmount = Math.max(0, m.boostAmount - 10);
            m.obstacleCooldown = 0.2;
            audio.playCrash();
            this.particles.emitSpark(obs.x, obs.y, -overlap.nx, -overlap.ny);
          }
          break;
        }
      }
    }
  }

  checkFinish() {
    const allFinished = this.marbles.every(m => m.finished);
    if (allFinished && this.state === 'racing') {
      this.showResults();
    }

    // Assign finish order
    for (const m of this.marbles) {
      if (m.finished && m.finishOrder === 0) {
        this.finishOrder++;
        m.finishOrder = this.finishOrder;
      }
    }
  }

  // === CELEBRATION FIREWORKS ===
  celebrationParticles() {
    const colors = ['#ff0','#f0f','#0ff','#f00','#0f0','#ff8800','#ff0088'];
    for (let i = 0; i < 5; i++) {
      const x = rng(-300, 300);
      const y = rng(-300, -100);
      const color = colors[Math.floor(Math.random() * colors.length)];
      for (let j = 0; j < 12; j++) {
        this.particles.emit(x, y, {
          count: 1,
          type: 'spark',
          color: color,
          speed: rng(2, 6),
          life: rng(0.5, 1.2),
          angle: rng(0, Math.PI * 2),
          size: rng(2, 4),
        });
      }
    }
  }

  showResults() {
    this.state = 'result';
    audio.stopEngine();

    // Pháo hoa ăn mừng nếu người chơi về nhất
    const playerPos = [...this.marbles].sort((a, b) => {
      if (a.finished && b.finished) return a.finishOrder - b.finishOrder;
      if (a.finished) return -1;
      if (b.finished) return 1;
      return b.getProgress() - a.getProgress();
    }).findIndex(m => m.isPlayer);
    if (playerPos === 0) {
      for (let f = 0; f < 3; f++) {
        setTimeout(() => this.celebrationParticles(), f * 400);
      }
    }

    // Sort by finish order
    const sorted = [...this.marbles].sort((a, b) => {
      if (a.finished && b.finished) return a.finishOrder - b.finishOrder;
      if (a.finished) return -1;
      if (b.finished) return 1;
      return b.getProgress() - a.getProgress();
    });

    const list = document.getElementById('result-list');
    list.innerHTML = '';
    const medals = ['🥇', '🥈', '🥉'];
    const trophy = ['🏆', '🥈', '🥉'];

    // Thống kê cho người chơi
    const player = this.marbles[0];
    // playerPos đã được tính ở trên (dòng playerPos = ...findIndex)
    const avgSpeed = player.speed;

    // Hiển thị kết quả
    sorted.forEach((m, i) => {
      const div = document.createElement('div');
      const medal = i < 3 ? medals[i] : `${i+1}.`;
      const isPlayer = m.isPlayer ? 'result-player' : '';
      const extra = m.isPlayer ? ' ⭐' : '';
      div.innerHTML = `<span class="result-pos">${medal}</span> <span class="${isPlayer}">${m.isPlayer ? 'YOU' : (m.aiName || 'AI Racer ' + m.id)}</span>${extra}`;
      list.appendChild(div);
    });

    // Player stats
    const statsDiv = document.createElement('div');
    statsDiv.style.cssText = 'margin-top:15px;padding:10px;border-top:1px solid rgba(255,255,255,.2);font-size:14px;color:#aaa';
    const coinBonus = playerPos === 0 ? 50 : playerPos === 1 ? 30 : playerPos === 2 ? 20 : Math.max(0, 10 - playerPos);
    statsDiv.innerHTML = `
      Position: <b>${playerPos + 1}</b> / ${CFG.TOTAL_RACERS}<br>
      Coins earned: <b style="color:#ffd700">+${coinBonus}</b><br>
      Total coins: <b style="color:#ffd700">${saveData.coins + coinBonus}</b><br>
      Laps completed: ${player.lap + 1}<br>
      Coins collected: ${player.coins}
    `;
    list.appendChild(statsDiv);

    // Award bonus coins for position
    if (playerPos === 0) { saveData.coins += 50; writeSave(); }
    else if (playerPos === 1) { saveData.coins += 30; writeSave(); }
    else if (playerPos === 2) { saveData.coins += 20; writeSave(); }
    else { saveData.coins += Math.max(0, 10 - playerPos); writeSave(); }

    document.getElementById('result-overlay').style.display = 'flex';
    audio.playFinish();
  }

  // ===================== RENDERING =====================

  render() {
    const ctx = this.ctx;
    const w = CFG.canvasW, h = CFG.canvasH;
    const cam = this.camera;

    // Clear
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, w, h);

    // Background gradient
    const bgGrad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h) * 0.7);
    bgGrad.addColorStop(0, '#2a2a4e');
    bgGrad.addColorStop(1, '#0a0a1e');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, w, h);

    // Save context for camera transform
    ctx.save();

    // Apply camera
    const zoom = cam.zoom;
    const cx = w / 2 - cam.x * zoom;
    const cy = h / 2 - cam.y * zoom;
    ctx.translate(cx, cy);
    ctx.scale(zoom, zoom);

    // Draw track
    if (this.track) {
      this.renderTrack(ctx);
    }

    // Draw obstacles
    if (this.track) {
      this.renderObstacles(ctx);
      this.renderBoosters(ctx);
      this.renderCoins(ctx);
    }

    // Draw marble shadows
    for (const m of this.marbles) {
      const sx = m.x;
      const sy = m.y;
      const sr = m.radius * zoom;
      const margin3 = 50 / zoom;
      const halfW3 = (CFG.canvasW / 2) / zoom + margin3;
      const halfH3 = (CFG.canvasH / 2) / zoom + margin3;
      if (m.x < cam.x - halfW3 || m.x > cam.x + halfW3 || m.y < cam.y - halfH3 || m.y > cam.y + halfH3) continue;
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.ellipse(sx + 2, sy + 3, sr * 0.9, sr * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Draw marbles
    for (const m of this.marbles) {
      m.render(ctx, cam.x, cam.y, zoom);
    }

    // Draw particles (in world space)
    this.particles.render(ctx, cam.x, cam.y, zoom);

    // Restore context
    ctx.restore();

    // Draw mini-map (screen space)
    if (this.track && this.state !== 'menu' && this.state !== 'result') {
      this.miniMap.render(this.track, this.marbles, cam.x, cam.y);
    }

    // Speed lines (screen space overlay effect)
    if (this.marbles.length > 0) {
      const player = this.marbles[0];
      if (player && player.speed > 4 && (this.state === 'racing' || this.state === 'countdown')) {
        ctx.globalAlpha = (player.speed - 4) / 8 * 0.15;
        ctx.fillStyle = '#fff';
        for (let i = 0; i < 5; i++) {
          const x = Math.random() * w;
          const y = Math.random() * h;
          const len = 20 + Math.random() * 60;
          const ang = Math.atan2(player.vy, player.vx) + Math.PI + rng(-0.3, 0.3);
          ctx.fillRect(x, y, Math.cos(ang) * len, 1);
        }
        ctx.globalAlpha = 1;
      }
    }
  }

  renderTrack(ctx) {
    const tr = this.track;

    // === BACKGROUND (cỏ / ground) ===
    // Vẽ nền xanh đậm với hiệu ứng gradient radial
    const bgGrad = ctx.createRadialGradient(0, 0, 100, 0, 0, 2000);
    bgGrad.addColorStop(0, '#2d5a2d');
    bgGrad.addColorStop(0.5, '#1e3a1e');
    bgGrad.addColorStop(1, '#0d1a0d');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(-3000, -3000, 6000, 6000);

    // Grass detail — các chấm cỏ ngẫu nhiên
    ctx.fillStyle = 'rgba(50,120,50,0.3)';
    const grassSeed = 12345;
    for (let i = 0; i < 200; i++) {
      const gx = ((i * 137 + grassSeed) % 4000) - 2000;
      const gy = ((i * 269 + grassSeed * 2) % 4000) - 2000;
      // Chỉ vẽ cỏ ở ngoài track
      let onTrack = false;
      for (let j = 0; j < 8; j++) {
        const idx = Math.floor(j * tr.centerline.length / 8);
        if (dist(gx, gy, tr.centerline[idx].x, tr.centerline[idx].y) < tr.halfWidth + 30) {
          onTrack = true; break;
        }
      }
      if (!onTrack) {
        ctx.beginPath();
        ctx.arc(gx, gy, 1 + Math.random() * 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // === TRACK SURFACE ===
    // Vẽ track surface như filled polygon giữa outerWall và innerWall
    ctx.beginPath();
    // Trace outer wall
    for (let i = 0; i < tr.outerWall.length; i++) {
      if (i === 0) ctx.moveTo(tr.outerWall[i].x, tr.outerWall[i].y);
      else ctx.lineTo(tr.outerWall[i].x, tr.outerWall[i].y);
    }
    ctx.closePath();
    // Trace inner wall ngược chiều để tạo hole
    for (let i = tr.innerWall.length - 1; i >= 0; i--) {
      ctx.lineTo(tr.innerWall[i].x, tr.innerWall[i].y);
    }
    ctx.closePath();

    // Track surface gradient
    const surfGrad = ctx.createLinearGradient(-500, -500, 500, 500);
    surfGrad.addColorStop(0, '#4a4a5a');
    surfGrad.addColorStop(0.5, '#5a5a6a');
    surfGrad.addColorStop(1, '#3a3a4a');
    ctx.fillStyle = surfGrad;
    ctx.fill();

    // Track border glow
    ctx.shadowColor = 'rgba(100,100,255,0.1)';
    ctx.shadowBlur = 20;
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // === TRACK MARKINGS ===
    // Centerline dashed
    ctx.strokeStyle = 'rgba(255,255,200,0.12)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 10]);
    ctx.beginPath();
    for (let i = 0; i < tr.centerline.length; i++) {
      if (i === 0) ctx.moveTo(tr.centerline[i].x, tr.centerline[i].y);
      else ctx.lineTo(tr.centerline[i].x, tr.centerline[i].y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.setLineDash([]);

    // Edge lines — vạch trắng mép trong và ngoài
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let i = 0; i < tr.innerWall.length; i++) {
      // Offset vào trong một chút
      const n = tr.normals[i];
      const ix = tr.innerWall[i].x + n.x * 4;
      const iy = tr.innerWall[i].y + n.y * 4;
      if (i === 0) ctx.moveTo(ix, iy);
      else ctx.lineTo(ix, iy);
    }
    ctx.closePath();
    ctx.stroke();

    ctx.beginPath();
    for (let i = 0; i < tr.outerWall.length; i++) {
      const n = tr.normals[i];
      const ox = tr.outerWall[i].x - n.x * 4;
      const oy = tr.outerWall[i].y - n.y * 4;
      if (i === 0) ctx.moveTo(ox, oy);
      else ctx.lineTo(ox, oy);
    }
    ctx.closePath();
    ctx.stroke();

    // === SEGMENT TYPE INDICATORS ===
    for (const seg of tr.segments) {
      const idx = seg.startIdx;
      const p = tr.centerline[idx];
      if (seg.type === 'boost') {
        // Boost lane — màu vàng cam
        ctx.fillStyle = 'rgba(255,200,0,0.12)';
        const nextIdx = Math.min(idx + 4, tr.numPoints - 1);
        const p2 = tr.centerline[nextIdx];
        const angle = Math.atan2(p2.y - p.y, p2.x - p.x);
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(angle);
        ctx.fillRect(-tr.halfWidth, -6, tr.halfWidth * 2, 12);
        // Mũi tên boost
        ctx.fillStyle = 'rgba(255,200,0,0.2)';
        for (let t = -tr.halfWidth + 10; t < tr.halfWidth - 10; t += 20) {
          ctx.beginPath();
          ctx.moveTo(t - 5, 0); ctx.lineTo(t + 5, -4);
          ctx.lineTo(t + 5, 4); ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
      } else if (seg.type === 'hazard') {
        // Hazard zone — màu đỏ
        ctx.fillStyle = 'rgba(255,0,0,0.08)';
        const w = tr.halfWidth;
        ctx.beginPath();
        ctx.arc(p.x, p.y, w * 0.6, 0, Math.PI * 2);
        ctx.fill();
        // Warning stripes
        ctx.strokeStyle = 'rgba(255,0,0,0.15)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 6]);
        ctx.beginPath();
        ctx.arc(p.x, p.y, w * 0.5, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    // === CHECKPOINTS ===
    for (let i = 0; i < tr.checkpoints.length; i++) {
      const cp = tr.checkpoints[i];
      const isFinish = (i === 0);
      // Checkpoint line
      ctx.strokeStyle = isFinish ? '#ff4444' : `rgba(255,255,100,${0.15 + 0.1 * Math.sin(performance.now() * 0.003 + i)})`;
      ctx.lineWidth = isFinish ? 4 : 2;
      ctx.setLineDash(isFinish ? [] : [4, 6]);
      ctx.beginPath();
      ctx.moveTo(cp.x1, cp.y1);
      ctx.lineTo(cp.x2, cp.y2);
      ctx.stroke();
      ctx.setLineDash([]);

      if (isFinish) {
        // Start/Finish line — checkered pattern
        const dx = cp.x2 - cp.x1, dy = cp.y2 - cp.y1;
        const len = Math.hypot(dx, dy);
        const ux = dx / len, uy = dy / len;
        const step = 10;
        for (let s = 0; s < len; s += step) {
          for (let t = -1; t <= 1; t += 2) {
            const checkX = cp.x1 + ux * s;
            const checkY = cp.y1 + uy * s;
            const nX = -uy, nY = ux;
            const parity = (Math.floor(s / step) + (t + 1) / 2) % 2;
            ctx.fillStyle = parity === 0 ? '#fff' : '#222';
            ctx.fillRect(
              checkX + nX * t * 5 - 4,
              checkY + nY * t * 5 - 4,
              8, 8
            );
          }
        }
        // Label
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('START / FINISH', cp.cx, cp.cy - tr.halfWidth - 8);
      }
    }

    // === WALL BORDERS (đậm hơn, có bóng) ===
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = 8;
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let i = 0; i < tr.innerWall.length; i++) {
      if (i === 0) ctx.moveTo(tr.innerWall[i].x, tr.innerWall[i].y);
      else ctx.lineTo(tr.innerWall[i].x, tr.innerWall[i].y);
    }
    ctx.closePath();
    ctx.stroke();

    ctx.beginPath();
    for (let i = 0; i < tr.outerWall.length; i++) {
      if (i === 0) ctx.moveTo(tr.outerWall[i].x, tr.outerWall[i].y);
      else ctx.lineTo(tr.outerWall[i].x, tr.outerWall[i].y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.shadowBlur = 0;

    // === OUTSIDE WALL SHADOWS (tạo depth) ===
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    for (let i = 0; i < tr.outerWall.length; i++) {
      const n = tr.normals[i];
      ctx.beginPath();
      ctx.arc(tr.outerWall[i].x + n.x * 3, tr.outerWall[i].y + n.y * 3, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // === AMBIENT DECORATIONS ===
    // Đèn track nhấp nháy
    const time = performance.now() * 0.001;
    for (let i = 0; i < tr.checkpoints.length; i++) {
      const cp = tr.checkpoints[i];
      if (i === 0) continue; // Skip finish line
      const blink = Math.sin(time * 2 + i * 1.5) > 0 ? 1 : 0.3;
      ctx.fillStyle = `rgba(255,200,0,${blink * 0.4})`;
      ctx.beginPath();
      ctx.arc(cp.cx, cp.cy, 5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  renderObstacles(ctx) {
    for (const obs of this.track.obstacles) {
      if (!obs.active) continue;
      // Glow effect
      ctx.shadowColor = obs.type === 'bumper' ? '#ff8844' : '#ff4444';
      ctx.shadowBlur = 15;

      // Outer ring
      ctx.fillStyle = obs.type === 'bumper' ? 'rgba(255,136,68,0.2)' : 'rgba(255,68,68,0.2)';
      ctx.beginPath();
      ctx.arc(obs.x, obs.y, obs.radius + 5, 0, Math.PI * 2);
      ctx.fill();

      // Main body
      ctx.fillStyle = obs.type === 'bumper' ? '#ff8844' : '#ff4444';
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.shadowBlur = 0;

      // Icon
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${obs.radius}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(obs.type === 'bumper' ? '↯' : '☠', obs.x + 0.5, obs.y + 0.5);
    }
  }

  renderBoosters(ctx) {
    for (const b of this.track.boosters) {
      if (!b.active) {
        // Respawn indicator
        ctx.globalAlpha = 0.3;
      }
      const pulse = 0.7 + 0.3 * Math.sin(performance.now() * 0.005 + b.x);
      ctx.fillStyle = `rgba(255,200,0,${pulse * 0.5})`;
      ctx.beginPath();
      ctx.arc(b.x, b.y, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffcc00';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⚡', b.x, b.y);
      ctx.globalAlpha = 1;
    }
  }

  renderCoins(ctx) {
    const time = performance.now() * 0.001;
    for (let i = 0; i < this.track.coins.length; i++) {
      const c = this.track.coins[i];
      if (c.collected) continue;
      // Coin animation: xoay (mô phỏng qua scale) + nhảy lên xuống
      const bob = Math.sin(time * 3 + i * 1.2) * 3;
      const scaleX = Math.abs(Math.cos(time * 2 + i * 0.7));
      const coinR = 5 * (0.5 + scaleX * 0.5);

      // Outer glow
      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.arc(c.x, c.y + bob, coinR, 0, Math.PI * 2);
      ctx.fill();

      // Inner highlight
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff8dc';
      ctx.beginPath();
      ctx.arc(c.x - coinR * 0.25, c.y + bob - coinR * 0.25, coinR * 0.4, 0, Math.PI * 2);
      ctx.fill();

      // Dollar sign
      ctx.fillStyle = '#b8860b';
      ctx.font = `bold ${coinR * 1.2}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('$', c.x, c.y + bob + 0.5);
    }
    ctx.shadowBlur = 0;
  }

  // ===================== HUD =====================

  updateHUD() {
    if (!this.marbles || this.marbles.length === 0) return;
    const player = this.marbles[0];

    document.getElementById('hud-speed').textContent = `Speed: ${Math.round(player.speed * 15)} km/h`;
    document.getElementById('hud-lap').textContent = `Lap: ${Math.min(player.lap + 1, CFG.LAPS)}/${CFG.LAPS}`;
    document.getElementById('hud-coins').textContent = `Coins: ${saveData.coins}`;

    // Boost bar
    const boostPct = player.boostAmount;
    document.getElementById('hud-boost-fill').style.width = boostPct + '%';
    if (boostPct > 50) {
      document.getElementById('hud-boost-fill').style.background = 'linear-gradient(90deg,#22c55e,#16a34a)';
    } else if (boostPct > 20) {
      document.getElementById('hud-boost-fill').style.background = 'linear-gradient(90deg,#f59e0b,#d97706)';
    } else {
      document.getElementById('hud-boost-fill').style.background = 'linear-gradient(90deg,#ef4444,#dc2626)';
    }

    // Position ranking
    const finished = this.marbles.filter(m => m.finished);
    const racing = [...this.marbles].filter(m => !m.finished).sort((a, b) => {
      return b.getProgress() - a.getProgress();
    });
    let pos = finished.length + 1;
    for (const m of racing) {
      if (m.isPlayer) break;
      pos++;
    }
    document.getElementById('hud-pos').textContent = `Position: ${pos}/${CFG.TOTAL_RACERS}`;

    // Update position indicator bar + leaderboard
    this.updatePosIndicator();
    this.updateLeaderboard();
  }

  updateLeaderboard() {
    const el = document.getElementById('leaderboard');
    if (!el) return;
    if (this.state !== 'racing' && this.state !== 'countdown') { el.style.display = 'none'; return; }
    el.style.display = 'block';

    const sorted = [...this.marbles].sort((a, b) => {
      if (a.finished && b.finished) return a.finishOrder - b.finishOrder;
      if (a.finished) return -1;
      if (b.finished) return 1;
      return b.getProgress() - a.getProgress();
    });

    // Chỉ hiển thị tối đa 8 dòng
    let html = '<div class="lb-title">STANDINGS</div>';
    sorted.forEach((m, i) => {
      const pos = i + 1;
      const name = m.isPlayer ? 'YOU' : (m.aiName || 'R' + m.id);
      const youClass = m.isPlayer ? 'lb-you' : '';
      const dnf = m.finished ? '' : '';
      const status = m.finished ? 'FIN' : (m.respawnTimer > 0 ? 'RES' : `L${Math.min(m.lap+1, CFG.LAPS)}`);
      html += `<div class="lb-row"><span class="lb-pos">${pos}.</span><span class="lb-name ${youClass}">${name}</span><span style="color:#888">${status}</span></div>`;
    });
    el.innerHTML = html;
  }

  updatePosIndicator() {
    const container = document.getElementById('pos-indicator');
    if (!container) return;
    // Sắp xếp marbles theo progress
    const sorted = [...this.marbles].sort((a, b) => {
      if (a.finished && b.finished) return a.finishOrder - b.finishOrder;
      if (a.finished) return -1;
      if (b.finished) return 1;
      return b.getProgress() - a.getProgress();
    });
    container.innerHTML = '';
    for (const m of sorted) {
      const dot = document.createElement('div');
      dot.className = 'pos-dot';
      if (m.isPlayer) dot.classList.add('player');
      if (m.finished) dot.classList.add('finished');
      dot.style.background = m.color;
      container.appendChild(dot);
    }
  }

  showLapNotification(text) {
    const el = document.getElementById('lap-notification');
    if (!el) return;
    el.textContent = text;
    el.classList.remove('show');
    // Force reflow
    void el.offsetWidth;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1200);
  }
}

// ============================================================
//  INITIALIZATION
// ============================================================
let game = null;
window.addEventListener('DOMContentLoaded', () => {
  game = new Game();
  // Show menu initially
  game.showMenu();

  // Init audio on first interaction
  document.addEventListener('click', () => audio.init(), { once: true });
  document.addEventListener('touchstart', () => audio.init(), { once: true });
});

// Handle page visibility change — pause when tab hidden
document.addEventListener('visibilitychange', () => {
  if (document.hidden && game && game.state === 'racing') {
    game.state = 'paused';
    document.getElementById('overlay').classList.add('active');
    document.getElementById('overlay').innerHTML = '<div style="background:rgba(0,0,0,0.8);padding:40px;border-radius:12px;text-align:center"><h2 style="color:#fff;margin-bottom:20px">⏸ PAUSED</h2><button class="menu-btn primary" onclick="game.resume()">▶ Resume</button></div>';
  }
});

console.log('🏁 Marble Racing 2D loaded!');
